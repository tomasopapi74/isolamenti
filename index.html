<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsolamenTom v3.2.4 - DATA ARMOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map-container { height: calc(100vh - 60px); width: 100%; position: relative; background: #e2e8f0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; transform-origin: center center; }
        #statusPanel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 6000; max-height: 85vh; transform: translateY(calc(100% - 75px)); }
        #statusPanel.expanded { transform: translateY(0) !important; }
        .drag-handle { width: 40px; height: 4px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 8px auto; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #adminConsole { position: fixed; inset: 0; background: #f8fafc; z-index: 10000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .cp-icon-wrapper { display: flex; align-items: center; justify-content: center; width: 44px !important; height: 44px !important; }
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .modal-higher { z-index: 8000 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- Schermata Accesso -->
    <div id="loginOverlay">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-md space-y-6 border border-slate-100">
            <div class="text-center">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i data-lucide="shield" class="text-white w-8 h-8"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">IsolamenTom</h1>
                <p class="text-blue-600 text-[9px] font-black uppercase tracking-[0.2em] mt-2">Versione 3.2.4 Data Armor</p>
            </div>
            <div class="space-y-3">
                <input type="text" id="projectInput" placeholder="ID TEAM / ADMIN" class="w-full border-2 border-slate-50 rounded-xl p-3 text-base outline-none focus:border-blue-600 bg-slate-50 font-bold uppercase transition-all">
                <input type="password" id="passwordInput" placeholder="PASSWORD" class="w-full border-2 border-slate-50 rounded-xl p-3 text-base outline-none focus:border-blue-600 bg-slate-50 font-bold transition-all">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-base shadow-lg active:scale-95 transition-all uppercase tracking-widest">Entra nel Team</button>
                <button onclick="handleLocalMode()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all text-xs uppercase text-white/70">Lavora Locale</button>
            </div>
        </div>
    </div>

    <!-- Console Admin -->
    <div id="adminConsole">
        <div class="w-full max-w-4xl mx-auto space-y-6 pb-12">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3"><div class="bg-red-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="shield-check"></i></div><h2 class="text-xl font-black text-slate-800 uppercase">Gestione Sicurezza</h2></div>
                <button onclick="closeAdminConsole()" class="bg-white p-2 rounded-xl border shadow-sm active:scale-90"><i data-lucide="x" class="text-slate-400"></i></button>
            </div>
            <div id="adminTeamList" class="space-y-3"></div>
        </div>
    </div>

    <!-- UI Header -->
    <header class="bg-white shadow-md px-3 sticky top-0 z-50 border-b h-[60px] flex items-center gap-3">
        <div class="flex items-center gap-2 shrink-0">
            <div class="bg-green-600 p-1.5 rounded-lg shadow-md"><i data-lucide="sprout" class="text-white w-5 h-5"></i></div>
            <div class="hidden xs:flex flex-col"><h1 class="text-sm font-black text-slate-900 leading-none">IsolamenTom</h1><span id="displayProjName" class="text-[8px] font-black text-blue-600 uppercase mt-0.5 tracking-tight">Recupero dati...</span></div>
        </div>
        <div class="flex-1 flex gap-1.5">
            <input type="text" id="searchInput" placeholder="Cerca..." class="flex-1 pl-3 py-1.5 border border-slate-100 rounded-lg text-xs bg-slate-50 outline-none focus:border-blue-500 transition-all">
            <button onclick="handleSearch()" class="bg-blue-600 text-white px-3 rounded-lg font-bold shadow active:bg-blue-700 uppercase text-[10px]">Cerca</button>
        </div>
        <button onclick="logoutProject()" class="bg-slate-50 text-slate-400 p-2 rounded-lg active:bg-red-50 active:text-red-600 transition-all"><i data-lucide="log-out" class="w-4 h-4"></i></button>
    </header>

    <main class="relative">
        <div id="map-container"><div id="map"></div></div>
        
        <div class="absolute top-3 left-3 z-[1000] flex flex-col gap-2">
            <button onclick="recenterOnUser()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="crosshair" class="w-5 h-5"></i></button>
            <button id="rotationToggle" onclick="toggleMapRotation()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="compass" class="w-5 h-5"></i></button>
            <button id="lapToggle" onclick="toggleLapMode()" class="bg-white p-3 rounded-xl shadow-lg border-2 border-slate-50 active:scale-90 transition-all flex flex-col items-center">
                <i data-lucide="repeat" id="lapIcon" class="w-5 h-5 text-slate-400"></i>
                <span id="lapLabel" class="text-[7px] font-black mt-0.5 text-slate-400 uppercase">Auto</span>
            </button>
        </div>

        <div id="telemetryPanel" class="absolute top-3 right-3 z-[1000] flex flex-col gap-2 items-end">
            <div class="bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl border border-slate-100 text-[9px] font-black text-slate-600 flex items-center gap-2 shadow-lg">
                <div class="flex flex-col items-center"><span class="text-blue-600 leading-none" id="accuracyVal">--m</span><span class="text-[7px] text-slate-400 font-bold uppercase mt-0.5">GPS</span></div>
                <div id="syncIndicator" class="flex flex-col items-center border-l pl-2 border-slate-200"><i data-lucide="cloud-off" id="syncIcon" class="w-3.5 h-3.5 text-slate-300"></i><span id="lastSyncTime" class="text-[7px] text-slate-400 font-bold uppercase mt-0.5">Sync</span></div>
            </div>
        </div>

        <div id="statusPanel" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-[32px] flex flex-col overflow-hidden border-t border-slate-100">
            <div id="dragArea" class="cursor-pointer p-4 pb-2" onclick="togglePanel()">
                <div class="drag-handle"></div>
                <div class="flex items-center justify-between">
                    <div class="flex flex-col"><span class="text-[10px] font-black uppercase text-slate-800 tracking-wider">Dashboard</span><span id="fieldCount" class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">0 Aree</span></div>
                    <div class="bg-slate-50 p-1.5 rounded-lg text-slate-400"><i data-lucide="chevron-up" class="w-4 h-4 transition-transform duration-500" id="panelChevron"></i></div>
                </div>
            </div>
            <div id="panelContent" class="space-y-4 overflow-y-auto px-5 pb-10 transition-opacity duration-300 h-[70vh]">
                <div id="adminTools" class="hidden p-4 bg-red-50 rounded-2xl border border-red-200 space-y-3"><div class="flex items-center justify-between"><p class="text-[10px] font-black text-red-700 uppercase tracking-widest flex items-center gap-2"><i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Admin Active</p><button onclick="window.openAdminConsole()" class="bg-red-600 text-white text-[8px] font-black px-3 py-1.5 rounded-full uppercase">Gestisci Team</button></div></div>
                <div id="fieldsSection" class="space-y-4"></div>
                <div class="p-4 bg-slate-50 rounded-[24px] border border-slate-100 text-center"><p class="text-[8px] font-black text-slate-300 uppercase tracking-[0.2em] mb-0.5">V3.2.4 - DATI PROTETTI</p></div>
            </div>
        </div>
    </main>

    <!-- Modali (Semplificati per scopi tecnici) -->
    <div id="fieldModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 id="fieldModalTitle" class="text-xl font-black text-green-700 mb-5">Nuova Area</h2>
            <div class="space-y-3">
                <input type="text" id="fieldNameInput" placeholder="Nome" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-sm outline-none">
                <input type="text" id="fieldCodeInput" placeholder="Codice" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-sm outline-none uppercase">
                <select id="fieldCategoryInput" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-black text-sm"><option value="cipolle">Cipolle</option><option value="bunching">Bunching</option><option value="brassiche">Brassiche</option><option value="altro">Altro</option></select>
                <input type="number" id="fieldRadiusInput" value="300" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-sm">
                <div class="flex gap-3 pt-3"><button onclick="document.getElementById('fieldModal').classList.add('hidden')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Annulla</button><button onclick="confirmAddField()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-black text-xs uppercase shadow-md">Salva</button></div>
            </div>
        </div>
    </div>

    <div id="checkpointModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 class="text-xl font-black text-blue-800 mb-5">Nota</h2>
            <input type="number" id="checkpointNumberInput" placeholder="Numero" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-base outline-none mb-3">
            <textarea id="checkpointNoteInput" rows="3" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 text-sm outline-none mb-4" placeholder="Dettagli..."></textarea>
            <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl mb-6 border border-slate-100"><input type="checkbox" id="checkpointCheckedInput" class="w-6 h-6 rounded-lg text-blue-600"><label for="checkpointCheckedInput" class="text-xs font-black text-slate-700 uppercase">Isolamento OK</label></div>
            <div class="flex gap-3"><button onclick="document.getElementById('checkpointModal').classList.add('hidden')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Chiudi</button><button onclick="confirmAddCheckpoint()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs shadow-md">Salva</button></div>
        </div>
    </div>

    <div id="actionChoiceModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[40px] w-full max-w-xs p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-slate-900">Azione Mappa</h2>
            <div class="flex flex-col gap-3">
                <button onclick="selectNewFieldAction()" class="flex items-center justify-between bg-green-50 text-green-700 p-6 rounded-[24px] border-2 border-green-100">Nuova Area <i data-lucide="plus"></i></button>
                <button onclick="selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-6 rounded-[24px] border-2 border-blue-100">Aggiungi Nota <i data-lucide="clipboard-check"></i></button>
                <button onclick="document.getElementById('actionChoiceModal').classList.add('hidden')" class="mt-4 text-slate-400 font-black uppercase text-[10px]">Annulla</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE", authDomain: "isolamenti-923d0.firebaseapp.com", projectId: "isolamenti-923d0", storageBucket: "isolamenti-923d0.firebasestorage.app", messagingSenderId: "907661900494", appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f" };
        const appId = 'isolamenti-923d0';

        const categoryColors = { cipolle: '#f97316', bunching: '#22c55e', brassiche: '#a855f7', altro: '#64748b' };
        let db, auth, map, userMarker, watchId = null, fields = [], searchIndicator = null; 
        let isTracking = false, isFollowing = true, currentProjectName = null, isLocalMode = false, mapReady = false;
        let isSaving = false, isInitialized = false, mapRotationEnabled = false;
        let tempFieldCoords = null, tempCheckpointCoords = null, isExpanded = false, tempFieldId = null;
        let isAdmin = false, currentLap = 1;

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        // --- AUTH & AUTO-START ---
        window.handleLogin = async function() {
            const name = document.getElementById('projectInput').value.trim().toLowerCase(), pass = document.getElementById('passwordInput').value.trim();
            if (!name || !pass) return showNotification("Dati Mancanti");
            try { await signInAnonymously(auth); currentProjectName = name.replace(/[^a-z0-9_]/g, ''); localStorage.setItem('isolamenti_last_session', JSON.stringify({ name: currentProjectName, pass })); isInitialized = true; enterApp(pass); }
            catch (err) { handleLocalMode(); }
        };

        window.handleLocalMode = () => { const name = document.getElementById('projectInput').value.trim() || 'locale', pass = document.getElementById('passwordInput').value.trim(); currentProjectName = name.toLowerCase(); isLocalMode = true; isInitialized = true; enterApp(pass); };

        function enterApp(pass) {
            const disp = document.getElementById('displayProjName'), adminBox = document.getElementById('adminTools');
            const currentPass = pass || JSON.parse(localStorage.getItem('isolamenti_last_session') || '{}').pass;
            isAdmin = (currentProjectName === 'admin' && currentPass === 'master25');
            disp.innerText = currentProjectName.toUpperCase();
            if (isAdmin) { disp.innerHTML = `<span class="flex items-center gap-1 text-red-600">ADMIN: ${currentProjectName.toUpperCase()} <i data-lucide="shield-check" class="w-2.5 h-2.5"></i></span>`; adminBox.classList.remove('hidden'); }
            else registerTeamInRegistry(currentPass);
            document.getElementById('loginOverlay').style.display = 'none';
            if (mapReady) { loadLocalCache(); if (!isLocalMode) startSync(); setTimeout(() => { if(!isTracking) window.toggleTracking(); }, 2000); }
            lucide.createIcons();
        }

        async function registerTeamInRegistry(pass) { if (!currentProjectName || isAdmin || currentProjectName === 'locale') return; try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_registry', currentProjectName), { teamId: currentProjectName, password: pass, lastSeen: Date.now() }); } catch(e) {} }

        // --- DATA PROTECTION LOGIC ---
        function mergeData(newData, isInitialLoad) {
            if (!mapReady || !Array.isArray(newData)) return;
            const localMap = new Map(fields.map(f => [f.id.toString(), f]));
            newData.forEach(cloudField => {
                const id = cloudField.id.toString(), existing = localMap.get(id);
                const cloudTS = cloudField.lastUpdated || 0, localTS = existing ? (existing.lastUpdated || 0) : 0;
                
                if (!existing || cloudTS >= localTS || isInitialLoad) {
                    const merged = { ...cloudField };
                    const p1_cloud = parsePath(cloudField.pathCoords), p1_local = existing ? parsePath(existing.pathCoords) : [];
                    const p2_cloud = parsePath(cloudField.pathCoords2), p2_local = existing ? parsePath(existing.pathCoords2) : [];
                    
                    // SCELTA BLINDATA: Se le coordinate nel cloud mancano ma esistono localmente, tieni le locali
                    merged.pathCoords = (p1_cloud.length >= p1_local.length) ? p1_cloud : p1_local;
                    merged.pathCoords2 = (p2_cloud.length >= p2_local.length) ? p2_cloud : p2_local;
                    localMap.set(id, merged);
                }
            });
            fields.forEach(f => clearMapField(f));
            fields = Array.from(localMap.values()).map(f => { renderFieldOnMap(f); return f; });
            window.updateFieldUI(); saveToLocalStorage();
        }

        function parsePath(p) { if (typeof p === 'string') { try { return JSON.parse(p); } catch(e) { return []; } } return p || []; }
        function clearMapField(f) { if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline); if(f.polyline2) map.removeLayer(f.polyline2); if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); }); }
        function saveToLocalStorage() { localStorage.setItem('isolamenti_db_' + currentProjectName, JSON.stringify(fields.map(f => { const c = {...f}; delete c.marker; delete c.circle; delete c.polyline; delete c.polyline2; delete c.wasInside; if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; }); return c; }))); }
        
        async function saveFieldToCloud(field) {
            if (isLocalMode || !isInitialized || isSaving) return;
            isSaving = true; field.lastUpdated = Date.now(); saveToLocalStorage();
            try { 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, field.id.toString()), { 
                    id: field.id.toString(), name: field.name, code: field.code || "---", category: field.category || "altro", 
                    latlng: field.latlng, radius: field.radius || 300, 
                    pathCoords: JSON.stringify(field.pathCoords || []), pathCoords2: JSON.stringify(field.pathCoords2 || []), 
                    checkpoints: (field.checkpoints || []).map(cp => ({ id: cp.id, latlng: cp.latlng, note: cp.note, checked: !!cp.checked, customNumber: cp.customNumber })), 
                    lastUpdated: field.lastUpdated 
                }); 
            } catch(e) {} finally { isSaving = false; }
        }

        // --- GPS & RENDERING ---
        function toggleTracking() {
            if (isTracking) { navigator.geolocation.clearWatch(watchId); isTracking = false; document.getElementById('trackLabel').innerText = 'AVVIA GPS'; return; }
            isTracking = true; document.getElementById('trackLabel').innerText = 'STOP GPS';
            watchId = navigator.geolocation.watchPosition((pos) => {
                const ll = L.latLng(pos.coords.latitude, pos.coords.longitude); document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                if (!userMarker) userMarker = L.marker(ll, { icon: L.divIcon({ className: 'gps-arrow-container', html: `<div class="gps-arrow-icon" style="transform: rotate(${pos.coords.heading || 0}deg)"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37,99,235,0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` }) }).addTo(map);
                else { userMarker.setLatLng(ll); userMarker.setIcon(L.divIcon({ className: 'gps-arrow-container', html: `<div class="gps-arrow-icon" style="transform: rotate(${pos.coords.heading || 0}deg)"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37,99,235,0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` })); }
                if(isFollowing) { map.panTo(ll); if (mapRotationEnabled) document.getElementById('map').style.transform = `scale(1.4) rotate(${-pos.coords.heading}deg)`; }
                updateTrajectory(ll);
            }, null, { enableHighAccuracy: true });
        }

        function updateTrajectory(up) {
            fields.forEach(f => {
                if (f.id === 'field_gen') return;
                const dist = up.distanceTo(L.latLng(f.latlng));
                if (dist <= f.radius) {
                    if (!f.wasInside) { f.wasInside = true; currentLap = (f.pathCoords && f.pathCoords.length > 5) ? 2 : 1; updateLapUI(); }
                    let ck = (currentLap === 1) ? 'pathCoords' : 'pathCoords2', pk = (currentLap === 1) ? 'polyline' : 'polyline2';
                    f[ck] = f[ck] || [];
                    if (!f[ck].length || up.distanceTo(L.latLng(f[ck][f[ck].length-1][0], f[ck][f[ck].length-1][1])) > 5) { f[ck].push([up.lat, up.lng]); ensurePolyline(f, currentLap); f[pk].setLatLngs(f[ck]); saveFieldToCloud(f); }
                } else if (dist > f.radius + 15) f.wasInside = false;
            });
        }

        function ensurePolyline(f, lap) {
            if (lap === 1 && !f.polyline) f.polyline = L.polyline(f.pathCoords, { color: '#64748b', weight: 4, opacity: 0.6, dashArray: '10, 10' }).addTo(map);
            if (lap === 2 && !f.polyline2) f.polyline2 = L.polyline(f.pathCoords2, { color: '#000000', weight: 4, opacity: 0.8 }).addTo(map);
        }

        function renderFieldOnMap(f) {
            if (f.latlng[0] !== 0) {
                const color = categoryColors[f.category] || '#64748b';
                f.marker = L.marker(f.latlng, { icon: L.divIcon({ html: `<div style="background:${color};border-radius:30px;width:30px;height:30px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.2);"><i data-lucide="sprout" style="width:16px;height:16px;"></i></div>`, className: 'f-icon', iconSize:[30,30] }) }).addTo(map);
                f.circle = L.circle(f.latlng, { radius: f.radius, color: color, fillOpacity: 0.05, weight: 1.5, dashArray: '5,8' }).addTo(map);
                if (f.pathCoords?.length) ensurePolyline(f, 1); if (f.pathCoords2?.length) ensurePolyline(f, 2);
            }
            if (f.checkpoints) f.checkpoints.forEach((cp, i) => renderCheckpointOnMap(cp, i, f.id));
            lucide.createIcons();
        }

        function renderCheckpointOnMap(cp, index, fieldId = 'field_gen') {
            const pinColor = cp.checked ? '#10b981' : '#ef4444'; 
            cp.marker = L.marker(cp.latlng, { icon: L.divIcon({ html: `<div class="cp-icon-wrapper"><svg viewBox="0 0 24 24" width="36" height="36"><path d="M12 2 L22 21 L2 21 Z" fill="${pinColor}" stroke="#fff" stroke-width="2"/><text x="12" y="17" font-size="8" font-weight="900" fill="white" text-anchor="middle">${cp.customNumber || index+1}</text></svg></div>`, className: 'cp-marker', iconSize:[40,40], iconAnchor:[20,34] }) }).addTo(map);
            cp.marker.on('click', () => { tempCheckpointCoords = { checkpointId: cp.id, fieldId: fieldId, cpRef: cp }; document.getElementById('checkpointNumberInput').value = cp.customNumber || ""; document.getElementById('checkpointNoteInput').value = cp.note || ""; document.getElementById('checkpointCheckedInput').checked = !!cp.checked; document.getElementById('checkpointModal').classList.remove('hidden'); });
        }

        // --- UTILS ---
        window.loadLocalCache = () => { const raw = localStorage.getItem('isolamenti_db_' + currentProjectName); if (raw) mergeData(JSON.parse(raw), true); };
        window.startSync = () => { onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName), (snap) => { if (isSaving || snap.metadata.hasPendingWrites) return; mergeData(snap.docs.map(d => d.data()), false); }); };
        window.toggleLapMode = () => { currentLap = (currentLap === 1) ? 2 : 1; updateLapUI(); };
        function updateLapUI() { const btn = document.getElementById('lapToggle'), label = document.getElementById('lapLabel'); if (currentLap === 2) { btn.classList.add('border-slate-900', 'bg-slate-50'); label.innerText = "Giro 2"; } else { btn.classList.remove('border-slate-900', 'bg-slate-50'); label.innerText = "Auto"; } }
        window.togglePanel = () => { isExpanded = !isExpanded; document.getElementById('statusPanel').classList.toggle('expanded', isExpanded); document.getElementById('panelChevron').style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0)'; };
        window.recenterOnUser = () => { isFollowing = true; if(userMarker) map.flyTo(userMarker.getLatLng(), 17); };
        window.showNotification = (t) => { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = t; el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000); };
        window.updateFieldUI = () => {
            const container = document.getElementById('fieldsSection'); container.innerHTML = ""; 
            fields.filter(f => f.id !== 'field_gen').forEach(f => {
                const div = document.createElement('div'); div.className = "p-3 bg-slate-50 rounded-xl flex justify-between items-center shadow-sm";
                div.onclick = () => { isFollowing = false; map.flyTo(f.latlng, 17); togglePanel(); };
                div.innerHTML = `<div class="flex items-center gap-2.5"><div class="bg-white p-1.5 rounded-lg shadow-sm" style="color:${categoryColors[f.category]}"><i data-lucide="sprout" class="w-4 h-4"></i></div><div class="text-[11px] font-black text-slate-800 tracking-tight">${f.name} <span class="text-slate-400 font-normal">(${f.code})</span></div></div>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        };
        window.toggleTracking = toggleTracking;
        window.onload = () => { map = L.map('map', { zoomControl: false, tap: false }).setView([44.5, 11.5], 6); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map); map.on('dragstart', () => { isFollowing = false; }); map.on('click', (e) => { tempFieldCoords = e.latlng; document.getElementById('actionChoiceModal').classList.remove('hidden'); lucide.createIcons(); }); mapReady = true; const s = localStorage.getItem('isolamenti_last_session'); if(s) { const d = JSON.parse(s); document.getElementById('projectInput').value = d.name; document.getElementById('passwordInput').value = d.pass; handleLogin(); } lucide.createIcons(); };
    </script>
</body>
</html>
