<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsolamenTom - Report & Isolamenti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        #map { 
            height: calc(100vh - 80px); 
            width: 100%; 
            z-index: 1; 
            background: #cbd5e1;
        }
        /* FIX: Assicura che i marker siano sempre interattivi e sopra la mappa */
        .leaflet-marker-icon { 
            cursor: pointer !important; 
            pointer-events: auto !important; 
            z-index: 600 !important;
        }
        
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .gps-arrow-container { display: flex !important; align-items: center; justify-content: center; width: 44px !important; height: 44px !important; pointer-events: none; }
        
        #statusPanel { 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
            touch-action: none; 
            z-index: 1001; 
            max-height: 85vh;
            transform: translateY(calc(100% - 85px));
        }
        #statusPanel.expanded { transform: translateY(0) !important; }
        .drag-handle { width: 40px; height: 5px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 4px auto; }
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #16a34a; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .photo-preview { width: 100%; height: 120px; border-radius: 12px; object-fit: cover; background: #f1f5f9; border: 2px dashed #cbd5e1; }
        .chevron-rotate { transition: transform 0.4s ease; }
        #statusPanel.expanded .chevron-rotate { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- Login Overlay -->
    <div id="loginOverlay">
        <div class="bg-white p-6 sm:p-8 rounded-[32px] shadow-2xl w-full max-w-md space-y-6 border border-slate-100">
            <div class="text-center space-y-2">
                <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><i data-lucide="shield-check" class="text-blue-600 w-8 h-8"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">IsolamenTom</h1>
                <p class="text-slate-500 text-sm italic">Gestione Campi & GPS</p>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border border-slate-100">
                    <input type="text" id="projectInput" placeholder="ID Team / Admin" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm">

                </div>
                <button id="localBtn" onclick="handleLocalMode()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-sm shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all"><i data-lucide="smartphone" class="w-4 h-4"></i> MODALITÀ LOCALE</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->

        <header class="bg-white p-4 border-b flex items-center justify-between shadow-sm">

            <button onclick="logoutProject()" class="text-slate-400 font-bold text-sm px-4 py-2 bg-slate-100 rounded-xl">Esci</button>

    <!-- Header App -->

            </div>

                    <input type="text" id="searchInput" placeholder="Cerca isolamento o codice..." class="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50 shadow-inner">

    <!-- Checkpoint Modal -->

        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl max-h-[90vh] overflow-y-auto">

            <div class="space-y-4">
                <div class="flex items-center gap-4 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <div class="flex-1"><label class="text-[10px] font-bold text-blue-400 uppercase pl-1">Numero Nota</label></div>
                    <input type="number" id="checkpointNumberInput" class="w-16 border-2 border-blue-200 rounded-xl p-2 text-center font-black text-blue-700">

                <textarea id="checkpointNoteInput" rows="3" class="w-full border rounded-2xl p-4 text-sm bg-slate-50 outline-none" placeholder="Note..."></textarea>

                </div>
                <div class="space-y-2">
                    <div class="relative"><img id="checkpointPhotoPreview" src="" class="photo-preview hidden"><button id="removeCheckpointPhotoBtn" onclick="removeCheckpointPhoto()" class="absolute top-2 right-2 bg-red-600 text-white p-2 rounded-full hidden shadow-lg"><i data-lucide="x" class="w-4 h-4"></i></button></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="document.getElementById('checkpointCameraInput').click()" class="py-3.5 bg-slate-900 text-white rounded-2xl text-[11px] font-bold uppercase">Foto</button>
                        <button onclick="document.getElementById('checkpointPhotoInput').click()" class="py-3.5 bg-white text-slate-700 rounded-2xl text-[11px] font-bold border-2 uppercase">Galleria</button>

                    <input type="file" id="checkpointPhotoInput" accept="image/*" class="hidden" onchange="previewPhoto(event, 'checkpointPhotoPreview', 'removeCheckpointPhotoBtn')">

                        <button onclick="closeCheckpointModal()" class="flex-1 py-4 border-2 rounded-2xl font-bold text-slate-400">Esci</button>

                    <button id="deleteCheckpointBtn" onclick="deleteCheckpoint()" class="w-full py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-[11px] hidden"><i data-lucide="trash-2" class="w-4 h-4"></i> ELIMINA NOTA</button>

                    <div class="flex items-center gap-4"><i data-lucide="plus-circle" class="w-8 h-8"></i><span class="font-bold text-lg">Isolamento</span></div><i data-lucide="chevron-right"></i>
                </button>
                <button onclick="selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-6 rounded-3xl border border-blue-100 active:scale-95">
                    <div class="flex items-center gap-4"><i data-lucide="clipboard-check" class="w-8 h-8"></i><span class="font-bold text-lg">Nota</span></div><i data-lucide="chevron-right"></i>

    <!-- Field Modal -->

        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-xl font-bold text-green-700 mb-4 flex items-center gap-2"><i data-lucide="plus-circle"></i> Registra Isolamento</h2>

                    <input type="text" id="fieldNameInput" placeholder="Nome Campo" class="w-full border rounded-xl p-3 text-sm bg-slate-50 outline-none">
                    <input type="text" id="fieldCodeInput" placeholder="Codice" class="w-full border rounded-xl p-3 text-sm bg-slate-50 outline-none">
                </div>
                <select id="fieldCategoryInput" class="w-full border rounded-xl p-3 text-sm bg-slate-50 font-bold">
                    <option value="cipolle">Cipolle</option><option value="bunching">Bunching</option><option value="brassiche">Brassiche</option><option value="cavoli">Cavoli</option><option value="cicoria">Cicoria</option><option value="altro">Altro</option>

                <div class="flex flex-col gap-2 pt-2">

    <!-- Manual Search Modal -->
    <div id="manualCoordModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-lg font-bold mb-4 text-slate-800">Cerca Posizione</h2>
            <div class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Indirizzo</label>
                    <div class="flex gap-2">
                        <input type="text" id="manualAddress" placeholder="Es: Via Roma 1, Bologna" class="flex-1 border rounded-xl p-3 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="searchAddress()" class="bg-blue-600 text-white px-4 rounded-xl shadow-md active:scale-95"><i data-lucide="search" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="flex items-center gap-3"><hr class="flex-1 border-slate-100"><span class="text-[10px] font-bold text-slate-300 uppercase">O COORD</span><hr class="flex-1 border-slate-100"></div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="manualLat" step="any" placeholder="Lat" class="w-full border rounded-xl p-3 text-sm bg-slate-50 outline-none">
                    <input type="number" id="manualLon" step="any" placeholder="Lon" class="w-full border rounded-xl p-3 text-sm bg-slate-50 outline-none">
                </div>
                <div class="space-y-2 pt-2">
                    <button onclick="locateManualCoords()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-lg active:scale-95 flex items-center justify-center gap-2"><i data-lucide="map"></i> VAI AL PUNTO</button>
                    <button onclick="confirmManualCoords()" class="w-full py-4 bg-green-50 text-green-700 border-2 border-green-100 rounded-2xl font-bold text-sm flex items-center justify-center gap-2"><i data-lucide="plus-circle"></i> CREA ISOLAMENTO QUI</button>
                    <button onclick="closeManualCoordModal()" class="w-full py-2 text-slate-400 font-bold text-xs uppercase mt-2">Annulla</button>
                </div>
            </div>
        </div>

    <div id="notification" class="fixed top-24 left-1/2 -translate-x-1/2 z-[3000] transform -translate-y-24 opacity-0 transition-all duration-500 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl text-xs font-bold text-center min-w-[250px]"><span id="notifText"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE",
          authDomain: "isolamenti-923d0.firebaseapp.com",
          projectId: "isolamenti-923d0",
          storageBucket: "isolamenti-923d0.firebasestorage.app",
          messagingSenderId: "907661900494",
          appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f"
        };
        const appId = 'isolamenti-923d0';
        const ADMIN_ID = "admin", ADMIN_MASTER_KEY = "master2025";

        let db, auth, map, userMarker, watchId = null, fields = []; 
        let isTracking = false, isFollowing = true, tempFieldCoords = null, tempCheckpointCoords = null, tempFieldId = null;
        let currentProjectName = "locale", isLocalMode = false, mapReady = false, isAdmin = false;
        let isSaving = false, isInitialized = false, lastLocalEditTime = 0, wakeLock = null;
        let isExpanded = false;

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        const requestWakeLock = async () => { if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} };
        const releaseWakeLock = async () => { if (wakeLock !== null) { try { await wakeLock.release(); wakeLock = null; } catch (err) {} } };

        window.handleLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const nameRaw = document.getElementById('projectInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            if (!nameRaw || !pass) return showNotification("Dati mancanti.");
            btn.disabled = true; btn.innerHTML = '<span class="loader"></span>...';
            try {
                await signInAnonymously(auth);
                if (nameRaw.toLowerCase() === ADMIN_ID && pass === ADMIN_MASTER_KEY) {
                    isAdmin = true; enterAdminMode(); return;
                }
                const name = nameRaw.toLowerCase().replace(/[^a-z0-9_]/g, ''); 
                const projRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', name);
                const docSnap = await getDoc(projRef);
                if (docSnap.exists() && docSnap.data().password !== pass) throw new Error("Credenziali errate.");
                else if (!docSnap.exists()) await setDoc(projRef, { password: pass, lastSync: new Date().toISOString() });
                currentProjectName = name;
                localStorage.setItem('isolamenti_last_session', JSON.stringify({ name, pass, mode: 'cloud' }));
                isInitialized = true; enterApp(name, pass, false);
            } catch (err) { showNotification(err.message); btn.disabled = false; btn.innerText = "ACCEDI"; }
        };

        function enterAdminMode() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminConsole').classList.remove('hidden');
            const listEl = document.getElementById('adminProjectList');
            const projectsCol = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
            onSnapshot(projectsCol, (snap) => {
                listEl.innerHTML = "";
                snap.docs.forEach(d => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-3xl border mb-3 shadow-sm";
                    div.innerHTML = `<div class="flex justify-between font-black uppercase text-slate-800"><span>${d.id}</span><span class="text-blue-600">${d.data().password}</span></div>
                    <div class="flex gap-2 mt-4"><button onclick="adminDeleteProject('${d.id}')" class="flex-1 bg-red-50 text-red-600 py-2.5 rounded-xl text-xs font-bold uppercase active:bg-red-100 transition-all">Elimina Team</button></div>`;
                    listEl.appendChild(div);
                });
                lucide.createIcons();
            });
        }

        window.adminDeleteProject = async (id) => { 
            if (confirm(`Eliminare team ${id}?`)) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', id)); 
                showNotification("Team rimosso.");
            }
        };

        function enterApp(name, pass, local) {
            isLocalMode = local; currentProjectName = name;
            document.getElementById('displayProjName').innerText = name.toUpperCase();
            document.getElementById('loginOverlay').style.display = 'none';
            if (mapReady) { if (local) loadForensicData(); else startCloudSync(); setTimeout(() => toggleTracking(true), 800); }
        }

        function loadForensicData() { const raw = localStorage.getItem('isolamenti_local_db'); if (raw) mergeData(JSON.parse(raw)); }

        function startCloudSync() {
            if (isLocalMode || !currentProjectName) return;
            const fieldsCol = collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName);
            onSnapshot(fieldsCol, (snap) => {
                if (isSaving || (Date.now() - lastLocalEditTime < 3000)) return;
                mergeData(snap.docs.map(doc => doc.data()));
                document.getElementById('syncIndicator').className = "text-green-500";
            });
        }

        function mergeData(newData) {
            if (!mapReady) return;
            fields.forEach(f => {
                if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline);
                if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
            });
            fields = []; 
            if (Array.isArray(newData)) {
                newData.forEach(fData => {
                    fData.id = fData.id?.toString() || "f_" + Date.now();
                    if (typeof fData.pathCoords === 'string') try { fData.pathCoords = JSON.parse(fData.pathCoords); } catch(e) { fData.pathCoords = []; }
                    if (fData.checkpoints) fData.checkpoints.sort((a, b) => (parseInt(a.customNumber) || 0) - (parseInt(b.customNumber) || 0));
                    fields.push(fData); addFieldToMap(fData);
                });
            }
            window.updateFieldUI();
        }

        async function saveField(field) {
            if (!isInitialized) return;
            lastLocalEditTime = Date.now(); isSaving = true;
            try {
                const prepared = await prepareFieldForSave(field);
                localStorage.setItem('isolamenti_local_db', JSON.stringify(fields.map(f => {
                    const c = {...f}; delete c.marker; delete c.circle; delete c.polyline;
                    if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; }); return c;
                })));
                if (!isLocalMode) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, prepared.id), prepared);
                window.updateFieldUI();
            } finally { setTimeout(() => isSaving = false, 1500); }
        }

        async function prepareFieldForSave(f) {
            const checkpointsComp = await Promise.all((f.checkpoints || []).map(async cp => ({
                id: cp.id?.toString() || "cp_" + Math.random().toString(36).substr(2, 9), 
                latlng: Array.isArray(cp.latlng) ? cp.latlng : [cp.latlng.lat, cp.latlng.lng], 
                note: cp.note || "", date: cp.date || new Date().toLocaleString(), checked: !!cp.checked, photo: cp.photo, customNumber: cp.customNumber || ""
            })));
            return {
                id: f.id.toString(), name: f.name || "Punto", code: f.code || "---", category: f.category || "altro", 
                latlng: Array.isArray(f.latlng) ? f.latlng : [f.latlng.lat, f.latlng.lng], radius: Number(f.radius) || 1000,
                pathCoords: JSON.stringify(f.pathCoords || []), checkpoints: checkpointsComp
            };
        }

        window.confirmAddField = async function() {
            const name = document.getElementById('fieldNameInput').value.trim() || "Punto", code = document.getElementById('fieldCodeInput').value.trim() || "---",
                  cat = document.getElementById('fieldCategoryInput').value.toLowerCase(), rad = parseInt(document.getElementById('fieldRadiusInput').value) || 1000;
            let f;
            if (tempFieldId) {
                f = fields.find(x => x.id.toString() === tempFieldId.toString());
                if (f) { f.name = name; f.code = code; f.category = cat; f.radius = rad; if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); addFieldToMap(f); }
            } else {
                f = { id: "f_" + Date.now(), name, code, category: cat, latlng: [tempFieldCoords.lat, tempFieldCoords.lng], radius: rad, pathCoords: [], checkpoints: [] };
                fields.push(f); addFieldToMap(f);
            }
            await saveField(f); closeFieldModal(); showNotification("Dati isolamento salvati.");
        };

        window.confirmAddCheckpoint = async function() {
            const note = document.getElementById('checkpointNoteInput').value.trim(), 
                  checked = document.getElementById('checkpointCheckedInput').checked,
                  photo = document.getElementById('checkpointPhotoPreview').src.startsWith('data:') ? document.getElementById('checkpointPhotoPreview').src : null,
                  customNum = document.getElementById('checkpointNumberInput').value;
            let field = fields.find(f => f.id.toString() === tempCheckpointCoords.fieldId.toString());
            if (!field) { field = { id: 'field_gen', name: 'Note Libere', code: 'GEN', category: 'altro', latlng: [0,0], radius: 0, pathCoords: [], checkpoints: [] }; fields.push(field); }
            if (tempCheckpointCoords.checkpointId) {
                const cp = field.checkpoints.find(c => c.id.toString() === tempCheckpointCoords.checkpointId.toString());
                if (cp) { cp.note = note; cp.checked = checked; cp.photo = photo; cp.customNumber = customNum; if (cp.marker) map.removeLayer(cp.marker); }
            } else {
                const cpData = { id: "cp_" + Date.now(), latlng: [tempCheckpointCoords.latlng.lat, tempCheckpointCoords.latlng.lng], note, date: new Date().toLocaleString('it-IT'), checked, photo, customNumber: customNum }; 
                field.checkpoints.push(cpData); 
            }
            field.checkpoints.sort((a, b) => (parseInt(a.customNumber) || 0) - (parseInt(b.customNumber) || 0));
            field.checkpoints.forEach(c => { if(c.marker) map.removeLayer(c.marker); });
            field.checkpoints.forEach((c, i) => renderCheckpointOnMap(c, i));
            await saveField(field); closeCheckpointModal(); showNotification("Rilevamento salvato.");
        };

        window.deleteCheckpoint = async () => {
            if (!confirm("Eliminare questa nota?")) return;
            const fid = tempCheckpointCoords.fieldId, cpid = tempCheckpointCoords.checkpointId;
            const fIdx = fields.findIndex(f => f.id.toString() === fid.toString());
            if (fIdx !== -1) {
                const cpIdx = fields[fIdx].checkpoints.findIndex(cp => cp.id.toString() === cpid.toString());
                if (cpIdx !== -1) {
                    if (fields[fIdx].checkpoints[cpIdx].marker) map.removeLayer(fields[fIdx].checkpoints[cpIdx].marker);
                    fields[fIdx].checkpoints.splice(cpIdx, 1);
                    fields[fIdx].checkpoints.forEach(c => { if(c.marker) map.removeLayer(c.marker); });
                    fields[fIdx].checkpoints.forEach((c, i) => renderCheckpointOnMap(c, i));
                    await saveField(fields[fIdx]); closeCheckpointModal(); showNotification("Nota rimossa.");
                }
            }
        };

        window.deleteField = async (id) => {
            if (!confirm("Eliminare definitivamente questo isolamento e tutte le note associate?")) return;
            const idx = fields.findIndex(f => f.id.toString() === id.toString());
            if (idx !== -1) {
                const f = fields[idx];
                if (f.marker) map.removeLayer(f.marker);
                if (f.circle) map.removeLayer(f.circle);
                if (f.polyline) map.removeLayer(f.polyline);
                if (f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
                if (!isLocalMode) { try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, id.toString())); } catch(e) {} }
                fields.splice(idx, 1);
                localStorage.setItem('isolamenti_local_db', JSON.stringify(fields));
                window.updateFieldUI();
                showNotification("Isolamento eliminato.");
            }
        };

        window.handleSearch = () => {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!q) return;
            const f = fields.find(x => x.name.toLowerCase().includes(q) || x.code.toLowerCase().includes(q));
            if (f && f.latlng[0] !== 0) {
                map.flyTo(f.latlng, 17);
                if (f.marker) setTimeout(() => f.marker.openPopup(), 500);
            } else { showNotification("Punto non trovato o senza coordinate."); }
        };

        window.navigateFromModal = (t) => {
            let ll;
            if (t === 'field') { const f = fields.find(x => x.id.toString() === tempFieldId.toString()); ll = f ? f.latlng : null; }
            else { ll = tempCheckpointCoords ? [tempCheckpointCoords.latlng.lat, tempCheckpointCoords.latlng.lng] : null; }
            if (ll && ll[0] !== 0) window.open(`https://www.google.com/maps/dir/?api=1&destination=${ll[0]},${ll[1]}`);
            else showNotification("Coordinate non valide per la navigazione.");
        };

        window.toggleTracking = () => {
            if (isTracking) { 
                if (watchId) navigator.geolocation.clearWatch(watchId); watchId = null; isTracking = false; releaseWakeLock(); 
                document.getElementById('trackBtn').innerHTML = '<i data-lucide="navigation"></i> GPS';
                document.getElementById('statusText').innerText = "GPS Spento";
                document.getElementById('telemetryPanel').classList.add('hidden');
            } else { 
                document.getElementById('trackBtn').innerHTML = '<span class="loader"></span> GPS...';
                document.getElementById('telemetryPanel').classList.remove('hidden');
                requestWakeLock(); isFollowing = true; 
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                    if (!userMarker) { 
                        userMarker = L.marker(ll, { icon: L.divIcon({ className: 'gps-arrow-container', html: `<svg viewBox="0 0 24 24" width="44" height="44"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2.5"/></svg>` }) }).addTo(map); 
                        map.setView(ll, 17);
                    } else { userMarker.setLatLng(ll); if (isFollowing) map.panTo(ll); }
                    updateTrajectory(ll); isTracking = true; 
                    document.getElementById('trackBtn').innerHTML = '<i data-lucide="square"></i> FERMA'; 
                    lucide.createIcons();
                }, null, { enableHighAccuracy: true });
            }
        };

        function updateTrajectory(up) {
            let active = []; fields.forEach(f => { if(f.id!=='field_gen' && up.distanceTo(L.latLng(f.latlng)) <= f.radius) { active.push(f.name); if (!f.pathCoords) f.pathCoords = []; const last = f.pathCoords[f.pathCoords.length - 1]; if (!last || up.distanceTo(L.latLng(last[0], last[1])) > 10) { f.pathCoords.push([up.lat, up.lng]); if(f.polyline) f.polyline.setLatLngs(f.pathCoords); saveField(f); } } });
            const st = document.getElementById('statusText'); if (active.length) st.innerText = "Area: " + active.join(", "); else st.innerText = "In transito...";
        }

        window.updateFieldUI = function() {
            const container = document.getElementById('fieldsSection'); container.innerHTML = "";
            const cats = ['cipolle', 'bunching', 'brassiche', 'cavoli', 'cicoria', 'altro'];
            cats.forEach(c => {
                const cfs = fields.filter(f => f.category === c);
                if (cfs.length) {
                    const sec = document.createElement('div');
                    sec.innerHTML = `<h3 class="text-xs font-black uppercase text-slate-600 mb-2 border-l-4 border-slate-400 pl-2 tracking-widest">${c.toUpperCase()}</h3><div id="list-${c}" class="space-y-2"></div>`;
                    container.appendChild(sec);
                    const list = sec.querySelector(`#list-${c}`);
                    cfs.forEach(f => {
                        const i = document.createElement('div'); i.className = "flex items-center gap-3 p-4 bg-slate-50 border rounded-2xl mb-2 cursor-pointer active:bg-slate-100 transition-all shadow-sm";
                        i.onclick = () => { map.flyTo(f.latlng, 15); if(f.marker) f.marker.openPopup(); };
                        i.innerHTML = `<div class="flex-1 font-black text-[11px] uppercase text-slate-700">${f.name} <span class="text-[9px] text-slate-400 font-normal">(${f.code})</span></div>
                        <div class="flex gap-1">
                            <button onclick="event.stopPropagation(); window.openEditField('${f.id}')" class="p-2 text-slate-400 hover:text-slate-900"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="event.stopPropagation(); window.deleteField('${f.id}')" class="p-2 text-red-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>`;
                        list.appendChild(i);
                    });
                }
            });
            if (!fields.length) container.innerHTML = '<div class="text-center py-10 text-slate-400 text-xs italic">Nessun punto in archivio.</div>';
            lucide.createIcons();
        }

        window.searchAddress = async () => {
            const addr = document.getElementById('manualAddress').value.trim();
            if (!addr) return showNotification("Inserisci un indirizzo.");
            showNotification("Ricerca in corso...");
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
                const data = await res.json();
                if (data && data.length > 0) {
                    document.getElementById('manualLat').value = parseFloat(data[0].lat).toFixed(6);
                    document.getElementById('manualLon').value = parseFloat(data[0].lon).toFixed(6);
                    showNotification("Indirizzo trovato!");
                    locateManualCoords();
                } else { showNotification("Nessun risultato trovato."); }
            } catch (err) { showNotification("Errore di connessione."); }
        };

        window.onload = () => { 
            map = L.map('map', { zoomControl: false }).setView([44.5, 11.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('dragstart', () => { isFollowing = false; });
            
            // FIX: Filtro click sulla mappa. Se l'utente clicca un marker, non apriamo il menu.
            map.on('click', (e) => { 
                if(!isInitialized) return; 
                // Leaflet propaga i click dai marker alla mappa se non gestito bene.
                // Controlliamo l'originalEvent per vedere se il target è l'area della mappa o un marker.
                if (e.originalEvent.target.id !== 'map' && !e.originalEvent.target.classList.contains('leaflet-container')) {
                    return; 
                }

                tempFieldCoords = e.latlng; 
                const t = fields.find(f => f.id !== 'field_gen' && e.latlng.distanceTo(L.latLng(f.latlng)) <= f.radius); 
                tempCheckpointCoords = { latlng: e.latlng, fieldId: t ? t.id : 'field_gen', checkpointId: null };
                document.getElementById('checkpointNumberInput').value = t ? (t.checkpoints.length + 1) : "1";
                document.getElementById('navCheckpointBtn').classList.add('hidden');
                document.getElementById('deleteCheckpointBtn').classList.add('hidden');
                document.getElementById('checkpointNoteInput').value = "";
                document.getElementById('checkpointCheckedInput').checked = false;
                removeCheckpointPhoto();
                document.getElementById('actionChoiceModal').classList.remove('hidden'); 
                lucide.createIcons();
            });
            
            mapReady = true; 
            const s = localStorage.getItem('isolamenti_last_session'); 
            if(s) { const d = JSON.parse(s); enterApp(d.name, d.pass, d.mode === 'cloud'); isInitialized=true; }
            document.getElementById('dragArea').onclick = togglePanel; 
            lucide.createIcons();
        };

        // UI Helpers
        window.togglePanel = () => { isExpanded = !isExpanded; const p = document.getElementById('statusPanel'), c = document.getElementById('panelContent'); if (isExpanded) { p.classList.add('expanded'); c.style.opacity = '1'; } else { p.classList.remove('expanded'); c.style.opacity = '0'; } };
        window.closeActionChoiceModal = () => document.getElementById('actionChoiceModal').classList.add('hidden');
        window.selectNewField = () => { closeActionChoiceModal(); document.getElementById('navFieldBtn').classList.add('hidden'); document.getElementById('fieldNameInput').value=""; document.getElementById('fieldCodeInput').value=""; document.getElementById('fieldModal').classList.replace('hidden', 'flex'); lucide.createIcons(); };
        window.selectNewCheckpoint = () => { closeActionChoiceModal(); document.getElementById('checkpointModal').classList.replace('hidden', 'flex'); lucide.createIcons(); };
        window.openManualCoordModal = () => document.getElementById('manualCoordModal').classList.replace('hidden', 'flex');
        window.closeManualCoordModal = () => document.getElementById('manualCoordModal').classList.add('hidden');
        window.recenterOnUser = () => { if(userMarker) { isFollowing = true; map.flyTo(userMarker.getLatLng(), 17); } };
        window.handleLocalMode = () => { isInitialized = true; enterApp("LOCALE", "", true); };
        window.locateManualCoords = () => { const lat = parseFloat(document.getElementById('manualLat').value), lon = parseFloat(document.getElementById('manualLon').value); if (!isNaN(lat) && !isNaN(lon)) { map.flyTo([lat, lon], 17); closeManualCoordModal(); } };
        window.confirmManualCoords = () => { const lat = parseFloat(document.getElementById('manualLat').value), lon = parseFloat(document.getElementById('manualLon').value); if (!isNaN(lat) && !isNaN(lon)) { tempFieldCoords = { lat, lng: lon }; closeManualCoordModal(); selectNewField(); } };
        window.previewPhoto = (e, imgId, btnId) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { const p = document.getElementById(imgId); p.src = ev.target.result; p.classList.remove('hidden'); document.getElementById(btnId).classList.remove('hidden'); }; r.readAsDataURL(f); };
        window.removeCheckpointPhoto = () => { document.getElementById('checkpointPhotoPreview').src = ""; document.getElementById('checkpointPhotoPreview').classList.add('hidden'); document.getElementById('removeCheckpointPhotoBtn').classList.add('hidden'); };
        window.closeCheckpointModal = () => { document.getElementById('checkpointModal').classList.add('hidden'); };
        window.closeFieldModal = () => { tempFieldId = null; document.getElementById('fieldModal').classList.add('hidden'); };
        window.logoutProject = () => { if(confirm("Chiudere la sessione attuale?")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        function showNotification(t) { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = t; el.classList.replace('opacity-0', 'opacity-100'); el.classList.replace('-translate-y-24', 'translate-y-0'); setTimeout(() => { el.classList.replace('opacity-100', 'opacity-0'); el.classList.replace('translate-y-0', '-translate-y-24'); }, 3000); }

        function addFieldToMap(f) {
            const cats = { cipolle: '#f97316', bunching: '#22c55e', brassiche: '#a855f7', cavoli: '#3b82f6', cicoria: '#059669', altro: '#64748b' };
            const color = cats[f.category] || '#64748b';
            if (f.id !== 'field_gen' && f.latlng[0] !== 0) {
                // FIX: Opzione bubblingMouseEvents: false impedisce al click di passare alla mappa
                f.marker = L.marker(f.latlng, { 
                    bubblingMouseEvents: false,
                    icon: L.divIcon({ html: `<div style="background:${color};border-radius:50%;width:34px;height:34px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 10px rgba(0,0,0,0.15);"><i data-lucide="sprout" style="width:16px;height:16px;"></i></div>`, className: '', iconSize: [34, 34], iconAnchor: [17, 17] }) 
                }).addTo(map);
                
                f.circle = L.circle(f.latlng, { radius: f.radius || 1000, color, fillOpacity: 0.1, weight: 2, dashArray: '5, 5' }).addTo(map);
                f.polyline = L.polyline(f.pathCoords || [], { color: '#334155', weight: 4, opacity: 0.5 }).addTo(map);
                
                // FIX: stopPropagation obbligatorio per non triggerare map.on('click')
                f.marker.on('click', (e) => { 
                    L.DomEvent.stopPropagation(e); 
                    // Apriamo il popup manualmente per sicurezza
                    f.marker.openPopup();
                });
                
                f.marker.bindPopup(`<div class="p-1"><b class="text-slate-800">${f.name}</b><br><span class="text-[10px] text-slate-400 font-bold uppercase">${f.code}</span><button onclick="window.openEditField('${f.id}')" class="w-full mt-3 bg-slate-900 text-white py-2 rounded-xl text-[10px] font-bold uppercase">Gestisci</button></div>`);
            }
            if (f.checkpoints) f.checkpoints.forEach((cp, idx) => renderCheckpointOnMap(cp, idx));
        }

        function renderCheckpointOnMap(cp, index) {
            const label = cp.customNumber || (index + 1);
            const x = cp.checked ? '<path d="M7 10 L17 20 M17 10 L7 20" stroke="black" stroke-width="3" stroke-linecap="round" opacity="0.5" />' : '';
            
            // FIX: bubblingMouseEvents: false anche qui
            cp.marker = L.marker(cp.latlng, { 
                bubblingMouseEvents: false,
                icon: L.divIcon({ html: `<svg viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))"><path d="M12 2 L22 21 L2 21 Z" fill="#ef4444" stroke="#ffffff" stroke-width="2.5"/>${x}<text x="12" y="18" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">${label}</text></svg>`, className: '', iconSize: [32, 32], iconAnchor: [16, 32] }) 
            }).addTo(map);
            
            cp.marker.on('click', (e) => { 
                L.DomEvent.stopPropagation(e); 
                openEditCheckpoint(cp); 
            });
        }
    </script>
</body>
</html>
