<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsolamenTom v3.3.1 - LOGIN FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map-container { height: calc(100vh - 60px); width: 100%; position: relative; background: #e2e8f0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; transform-origin: center center; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        #statusPanel { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 6000; 
            max-height: 85vh; 
            transform: translateY(calc(100% - 75px)); 
        }
        #statusPanel.expanded { transform: translateY(0) !important; }
        
        .drag-handle { width: 40px; height: 4px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 8px auto; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #adminConsole { position: fixed; inset: 0; background: #f8fafc; z-index: 10000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        
        .cp-icon-wrapper { display: flex; align-items: center; justify-content: center; width: 44px !important; height: 44px !important; }
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .modal-higher { z-index: 8000 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- Schermata di Accesso -->
    <div id="loginOverlay">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-md space-y-6 border border-slate-100">
            <div class="text-center">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i data-lucide="shield" class="text-white w-8 h-8"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">IsolamenTom</h1>
                <p class="text-blue-600 text-[9px] font-black uppercase tracking-[0.2em] mt-2">Versione 3.3.1 Stable</p>
            </div>
            <div class="space-y-3">
                <input type="text" id="projectInput" placeholder="ID TEAM / ADMIN" class="w-full border-2 border-slate-50 rounded-xl p-3 text-base outline-none focus:border-blue-600 bg-slate-50 font-bold uppercase transition-all">
                <input type="password" id="passwordInput" placeholder="PASSWORD" class="w-full border-2 border-slate-50 rounded-xl p-3 text-base outline-none focus:border-blue-600 bg-slate-50 font-bold transition-all">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-base shadow-lg hover:bg-blue-700 active:scale-95 transition-all">Accedi al Cloud</button>
                <button onclick="handleLocalMode()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold active:scale-95 transition-all text-xs uppercase text-white/70">Lavora solo in Locale</button>
            </div>
            <div id="loginError" class="hidden p-3 bg-red-50 border border-red-100 rounded-xl text-[10px] text-red-600 font-bold text-center uppercase tracking-tighter"></div>
        </div>
    </div>

    <!-- Resto della UI (Invariato per stabilità) -->
    <div id="adminConsole">
        <div class="w-full max-w-4xl mx-auto space-y-6 pb-12">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3"><div class="bg-red-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="shield-check"></i></div><h2 class="text-xl font-black text-slate-800 uppercase">Amministrazione</h2></div>
                <button onclick="window.closeModal('adminConsole')" class="bg-white p-2 rounded-xl border shadow-sm active:scale-90"><i data-lucide="x"></i></button>
            </div>
            <div id="adminTeamList" class="space-y-3"></div>
        </div>
    </div>

    <header class="bg-white shadow-md px-3 sticky top-0 z-50 border-b h-[60px] flex items-center gap-3">
        <div class="flex items-center gap-2 shrink-0">
            <div class="bg-green-600 p-1.5 rounded-lg shadow-md"><i data-lucide="sprout" class="text-white w-5 h-5"></i></div>
            <div class="hidden xs:flex flex-col"><h1 class="text-sm font-black text-slate-900 leading-none">IsolamenTom</h1><span id="displayProjName" class="text-[8px] font-black text-blue-600 uppercase tracking-tight">Sync...</span></div>
        </div>
        <div class="flex-1"></div>
        <button onclick="logoutProject()" class="bg-slate-50 text-slate-400 p-2 rounded-lg active:bg-red-50 active:text-red-600 transition-all"><i data-lucide="log-out" class="w-4 h-4"></i></button>
    </header>

    <main class="relative">
        <div id="map-container"><div id="map"></div></div>
        
        <!-- Pulsanti Flottanti -->
        <div class="absolute top-3 left-3 z-[1000] flex flex-col gap-2">
            <button onclick="recenterOnUser()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="crosshair" class="w-5 h-5"></i></button>
            <button id="rotationToggle" onclick="toggleMapRotation()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="compass" class="w-5 h-5"></i></button>
            <button onclick="window.openModal('searchModal')" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-blue-600"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
        </div>

        <div id="telemetryPanel" class="absolute top-3 right-3 z-[1000] flex flex-col gap-2 items-end">
            <div class="bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl border border-slate-100 text-[9px] font-black text-slate-600 flex items-center gap-2 shadow-lg">
                <div class="flex flex-col items-center"><span class="text-blue-600 leading-none" id="accuracyVal">--m</span><span class="text-[7px] text-slate-400 font-bold uppercase mt-0.5">GPS</span></div>
                <div id="syncIndicator" class="flex flex-col items-center border-l pl-2 border-slate-200"><i data-lucide="cloud-off" id="syncIcon" class="w-3.5 h-3.5 text-slate-300"></i><span id="lastSyncTime" class="text-[7px] text-slate-400 font-bold uppercase mt-0.5">Sync</span></div>
            </div>
        </div>

        <div id="statusPanel" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-[32px] flex flex-col overflow-hidden border-t border-slate-100">
            <div id="dragArea" class="cursor-pointer p-4 pb-2" onclick="togglePanel()">
                <div class="drag-handle"></div>
                <div class="flex items-center justify-between">
                    <div class="flex flex-col"><span class="text-[10px] font-black uppercase text-slate-800 tracking-wider">Dashboard Isolamenti</span><span id="fieldCount" class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">0 Aree</span></div>
                    <div class="bg-slate-50 p-1.5 rounded-lg text-slate-400"><i data-lucide="chevron-up" class="w-4 h-4 transition-transform duration-500" id="panelChevron"></i></div>
                </div>
            </div>
            <div id="panelContent" class="space-y-4 overflow-y-auto px-5 pb-10 transition-opacity duration-300 h-[70vh]">
                <div class="flex flex-col gap-2">
                    <button id="trackBtn" onclick="toggleTracking()" class="bg-slate-900 text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                        <i data-lucide="play" id="trackIcon" class="fill-white w-5 h-5"></i> <span id="trackLabel">Avvia GPS</span>
                    </button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportBackupJSON()" class="bg-blue-50 text-blue-700 py-3 rounded-xl font-bold text-[10px] uppercase active:scale-95">Backup</button>
                        <button onclick="document.getElementById('importFile').click()" class="bg-slate-50 text-slate-500 py-3 rounded-xl font-bold text-[10px] uppercase active:scale-95">Import</button>
                        <input type="file" id="importFile" class="hidden" onchange="importBackupJSON(event)">
                    </div>
                </div>
                <div id="adminTools" class="hidden p-4 bg-red-50 rounded-2xl border border-red-200"><button onclick="window.openAdminConsole()" class="w-full bg-red-600 text-white py-2 rounded-xl font-black text-[10px] uppercase">Console Admin</button></div>
                <div id="fieldsSection" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <!-- Modali Standardizzati con CSS Touch Fix -->
    <div id="searchModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[32px] w-full max-w-xs p-8 shadow-2xl text-center">
            <h2 class="text-xl font-black text-slate-900 mb-5 uppercase tracking-tight">Cerca Luogo</h2>
            <input type="text" id="manualSearchInput" placeholder="Via o Coordinate..." class="w-full border border-slate-100 rounded-xl p-3.5 bg-slate-50 text-sm outline-none mb-5">
            <div class="flex gap-3"><button onclick="window.closeModal('searchModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase cursor-pointer">Esci</button><button onclick="executeManualSearch()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition-all cursor-pointer">Trova</button></div>
        </div>
    </div>

    <div id="fieldModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 id="fieldModalTitle" class="text-xl font-black text-green-700 mb-5">Dettagli Isolamento</h2>
            <div class="space-y-3">
                <input type="text" id="fieldNameInput" placeholder="Nome Campo" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-sm outline-none focus:border-green-600">
                <input type="text" id="fieldCodeInput" placeholder="Codice" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-sm outline-none uppercase">
                <select id="fieldCategoryInput" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-black text-sm"><option value="cipolle">Cipolle</option><option value="bunching">Bunching</option><option value="brassiche">Brassiche</option><option value="altro">Altro</option></select>
                <input type="number" id="fieldRadiusInput" value="300" class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-sm">
                <div class="flex gap-3 pt-3"><button onclick="window.closeModal('fieldModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase cursor-pointer">Annulla</button><button onclick="confirmAddField()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-black text-xs uppercase shadow-md cursor-pointer">Salva</button></div>
            </div>
        </div>
    </div>

    <div id="checkpointModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 class="text-xl font-black text-blue-800 mb-5">Nota Tecnica</h2>
            <input type="number" id="checkpointNumberInput" placeholder="N." class="w-full border border-slate-100 rounded-xl p-3 bg-slate-50 font-bold text-base outline-none mb-3">
            <textarea id="checkpointNoteInput" rows="3" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 text-sm outline-none mb-4" placeholder="Note..."></textarea>
            <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl mb-6 border border-slate-100"><input type="checkbox" id="checkpointCheckedInput" class="w-6 h-6 rounded-lg text-blue-600"><label for="checkpointCheckedInput" class="text-xs font-black text-slate-700 uppercase">Isolamento OK</label></div>
            <div class="flex flex-col gap-2">
                <div class="flex gap-3"><button onclick="window.closeModal('checkpointModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase cursor-pointer">Chiudi</button><button onclick="confirmAddCheckpoint()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs shadow-md cursor-pointer">Salva</button></div>
                <button id="deleteCPBtn" onclick="deleteCheckpoint()" class="hidden py-3 text-red-500 font-bold text-[10px] uppercase border-t transition-colors">Elimina Nota</button>
            </div>
        </div>
    </div>

    <div id="actionChoiceModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6 modal-higher">
        <div class="bg-white rounded-[40px] w-full max-w-xs p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-slate-900">Azione Mappa</h2>
            <div class="flex flex-col gap-3">
                <button onclick="selectNewFieldAction()" class="flex items-center justify-between bg-green-50 text-green-700 p-6 rounded-[24px] border-2 border-green-100 font-black uppercase text-xs cursor-pointer">Nuovo Isolamento <i data-lucide="plus"></i></button>
                <button id="addNoteBtnAction" onclick="selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-6 rounded-[24px] border-2 border-blue-100 font-black uppercase text-xs cursor-pointer">Aggiungi Nota <i data-lucide="clipboard-check"></i></button>
                <button onclick="window.closeModal('actionChoiceModal')" class="mt-4 text-slate-400 font-black uppercase text-[10px] cursor-pointer">Annulla</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE", 
            authDomain: "isolamenti-923d0.firebaseapp.com", 
            projectId: "isolamenti-923d0", 
            storageBucket: "isolamenti-923d0.firebasestorage.app", 
            messagingSenderId: "907661900494", 
            appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f" 
        };
        const appId = 'isolamenti-923d0';

        const categoryColors = { cipolle: '#f97316', bunching: '#22c55e', brassiche: '#a855f7', altro: '#64748b' };
        let db, auth, map, userMarker, watchId = null, fields = [], searchIndicator = null; 
        let isTracking = false, isFollowing = true, currentProjectName = null, isLocalMode = false, mapReady = false;
        let isSaving = false, isInitialized = false, mapRotationEnabled = false;
        let tempFieldCoords = null, tempCheckpointCoords = null, isExpanded = false, tempFieldId = null;
        let ignoreMapClick = false; 
        let lastLatlng = null;

        // Gestore visivo modali
        window.openModal = (id) => {
            const el = document.getElementById(id);
            if (el) { el.classList.remove('hidden'); el.classList.add('flex'); }
        };
        window.closeModal = (id) => {
            const el = document.getElementById(id);
            if (el) { el.classList.add('hidden'); el.classList.remove('flex'); }
        };

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        // --- AUTH ---
        window.handleLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('loginError');
            const name = document.getElementById('projectInput').value.trim().toLowerCase(), pass = document.getElementById('passwordInput').value.trim();
            
            if (!name || !pass) {
                errBox.innerText = "Inserisci ID e Password";
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Accesso...';

            try { 
                // Priorità al token personalizzato se fornito dall'ambiente
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                currentProjectName = name.replace(/[^a-z0-9_]/g, ''); 
                localStorage.setItem('isolamenti_last_session', JSON.stringify({ name: currentProjectName, pass })); 
                isInitialized = true; 
                enterApp(pass); 
            }
            catch (err) { 
                console.error("Login fallito:", err);
                errBox.innerText = "Errore Server: Assicurati che 'Anonymous Login' sia attivo su Firebase";
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Accedi al Cloud";
                // In caso di errore cloud critico, non forziamo la modalità locale se l'utente vuole il cloud
            }
        };

        window.handleLocalMode = () => { 
            const name = document.getElementById('projectInput').value.trim() || 'locale', pass = document.getElementById('passwordInput').value.trim(); 
            currentProjectName = name.toLowerCase(); 
            isLocalMode = true; 
            isInitialized = true; 
            enterApp(pass); 
        };

        function enterApp(pass) {
            const disp = document.getElementById('displayProjName'), adminBox = document.getElementById('adminTools');
            const currentPass = pass || JSON.parse(localStorage.getItem('isolamenti_last_session') || '{}').pass;
            isAdmin = (currentProjectName === 'admin' && currentPass === 'master25');
            disp.innerText = currentProjectName.toUpperCase();
            if (isAdmin) { disp.innerHTML = `<span class="flex items-center gap-1 text-red-600">ADMIN: ${currentProjectName.toUpperCase()} <i data-lucide="shield-check" class="w-2.5 h-2.5"></i></span>`; adminBox.classList.remove('hidden'); }
            else registerTeamInRegistry(currentPass);
            window.closeModal('loginOverlay');
            if (mapReady) { loadLocalCache(); if (!isLocalMode) startSync(); setTimeout(() => { if(!isTracking) window.toggleTracking(); }, 1500); }
            try { lucide.createIcons(); } catch(e) {}
        }

        async function registerTeamInRegistry(pass) { if (!currentProjectName || isAdmin || currentProjectName === 'locale') return; try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_registry', currentProjectName), { teamId: currentProjectName, password: pass, lastSeen: Date.now() }); } catch(e) {} }

        // --- DASHBOARD LISTA ISOLAMENTI ---
        window.updateFieldUI = () => {
            const container = document.getElementById('fieldsSection'); 
            if (!container) return;
            container.innerHTML = ""; 
            const valid = fields.filter(f => f && f.id && f.id !== 'field_gen');
            document.getElementById('fieldCount').innerText = valid.length + " Aree";
            valid.forEach(f => {
                const div = document.createElement('div'); div.className = "p-3 bg-slate-50 rounded-xl flex justify-between items-center shadow-sm cursor-pointer hover:bg-slate-100 transition-colors";
                div.onclick = () => { 
                    isFollowing = false; 
                    if (f.latlng) {
                        map.flyTo(f.latlng, 17); 
                    }
                    togglePanel(); 
                };
                const catColor = (f.category && categoryColors[f.category]) ? categoryColors[f.category] : '#64748b';
                div.innerHTML = `<div class="flex items-center gap-2.5"><div class="bg-white p-1.5 rounded-lg shadow-sm" style="color:${catColor}"><i data-lucide="sprout" class="w-4 h-4"></i></div><div class="text-[11px] font-black text-slate-800 tracking-tight">${f.name || 'Senza Nome'} <span class="text-slate-400 font-normal">(${f.code || '---'})</span></div></div><div class="flex gap-1"><button onclick="event.stopPropagation(); window.editField('${f.id}')" class="p-2 text-blue-600 bg-white rounded-lg shadow-sm cursor-pointer"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button><button onclick="event.stopPropagation(); window.deleteField('${f.id}')" class="p-2 text-red-500 bg-white rounded-lg shadow-sm cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></div>`;
                container.appendChild(div);
            });
            try { lucide.createIcons(); } catch(e) {}
        };

        // --- FUSIONE RECUPERO STORICO COMPLETO ---
        function mergeData(newData, isInitialLoad) {
            if (!mapReady || !Array.isArray(newData)) return;
            const localMap = new Map(fields.map(f => [f.id.toString(), f]));
            newData.forEach(cloudField => {
                if (!cloudField || !cloudField.id) return;
                const id = cloudField.id.toString(), existing = localMap.get(id);
                if (!existing || cloudField.lastUpdated > (existing.lastUpdated || 0) || isInitialLoad) {
                    const merged = { ...cloudField };
                    const p1 = parsePath(cloudField.pathCoords);
                    const p2 = parsePath(cloudField.pathCoords2);
                    const combined = [];
                    const set = new Set();
                    const addPoint = (pt) => {
                        if (!pt || pt.length < 2) return;
                        const key = `${pt[0].toFixed(5)},${pt[1].toFixed(5)}`;
                        if (!set.has(key)) { set.add(key); combined.push(pt); }
                    };
                    p1.forEach(addPoint); p2.forEach(addPoint);
                    const pLocal = existing ? parsePath(existing.pathCoords) : [];
                    merged.pathCoords = (pLocal.length > combined.length && !isInitialLoad) ? pLocal : combined;
                    merged.checkpoints = merged.checkpoints || [];
                    localMap.set(id, merged);
                }
            });
            fields.forEach(f => clearMapField(f));
            fields = Array.from(localMap.values()).map(f => { renderFieldOnMap(f); return f; });
            window.updateFieldUI(); saveToLocalStorage();
        }

        function parsePath(p) { if (!p) return []; if (Array.isArray(p)) return p; if (typeof p === 'string') { try { const parsed = JSON.parse(p); if (Array.isArray(parsed)) return parsed; } catch(e) {} } return []; }
        function clearMapField(f) { if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline); if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); }); }
        function saveToLocalStorage() { localStorage.setItem('isolamenti_db_' + currentProjectName, JSON.stringify(fields.map(f => { const c = {...f}; delete c.marker; delete c.circle; delete c.polyline; if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; }); return c; }))); updateStorageInfo(); }
        
        async function saveFieldToCloud(field) {
            if (isLocalMode || !isInitialized || isSaving) return;
            if (!auth.currentUser) return;
            isSaving = true; field.lastUpdated = Date.now(); saveToLocalStorage();
            try { 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, field.id.toString()), { 
                    id: field.id.toString(), name: field.name, code: field.code || "---", category: field.category || "altro", 
                    latlng: field.latlng, radius: field.radius || 300, 
                    pathCoords: JSON.stringify(field.pathCoords || []), 
                    checkpoints: (field.checkpoints || []).map(cp => ({ id: cp.id, latlng: cp.latlng, note: cp.note, checked: !!cp.checked, customNumber: cp.customNumber })), 
                    lastUpdated: field.lastUpdated 
                }); 
            } catch(e) { console.error("Cloud Save error:", e); } finally { isSaving = false; }
        }

        // --- GPS E BUSSOLA ---
        window.toggleMapRotation = () => {
            mapRotationEnabled = !mapRotationEnabled;
            const btn = document.getElementById('rotationToggle');
            if (mapRotationEnabled) {
                btn.classList.add('text-blue-600', 'bg-blue-50', 'border-blue-200');
                isFollowing = true;
                showNotification("Bussola attiva");
            } else {
                btn.classList.remove('text-blue-600', 'bg-blue-50', 'border-blue-200');
                document.getElementById('map').style.transform = 'scale(1) rotate(0deg)';
                showNotification("Bussola disattivata");
            }
        };

        window.toggleTracking = () => {
            if (isTracking) { navigator.geolocation.clearWatch(watchId); isTracking = false; document.getElementById('trackLabel').innerText = 'Avvia GPS'; return; }
            isTracking = true; document.getElementById('trackLabel').innerText = 'Stop GPS';
            watchId = navigator.geolocation.watchPosition((pos) => {
                const ll = L.latLng(pos.coords.latitude, pos.coords.longitude); document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                
                let heading = pos.coords.heading;
                if (heading === null || heading === undefined || Number.isNaN(heading)) {
                    if (lastLatlng) {
                        const dLon = (ll.lng - lastLatlng.lng) * Math.PI / 180;
                        const lat1 = lastLatlng.lat * Math.PI / 180, lat2 = ll.lat * Math.PI / 180;
                        const y = Math.sin(dLon) * Math.cos(lat2), x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
                        heading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
                    } else heading = 0;
                }
                lastLatlng = ll;

                if (!userMarker) { 
                    userMarker = L.marker(ll, { icon: L.divIcon({ className: 'gps-arrow-container', html: `<div class="gps-arrow-icon" style="transform: rotate(${heading}deg); transition: transform 0.3s"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37, 99, 235, 0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` }) }).addTo(map); 
                } else { 
                    userMarker.setLatLng(ll); 
                    userMarker.setIcon(L.divIcon({ className: 'gps-arrow-container', html: `<div class="gps-arrow-icon" style="transform: rotate(${heading}deg); transition: transform 0.3s"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37, 99, 235, 0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` }));
                }

                if(isFollowing) { 
                    map.panTo(ll); 
                    if (mapRotationEnabled) {
                        document.getElementById('map').style.transform = `scale(1.3) rotate(${-heading}deg)`; 
                    }
                }
                
                fields.forEach(f => {
                    if (!f || f.id === 'field_gen') return;
                    if (!f.latlng) return;
                    const dist = ll.distanceTo(L.latLng(f.latlng));
                    if (dist <= f.radius) {
                        f.pathCoords = f.pathCoords || [];
                        if (!f.pathCoords.length || ll.distanceTo(L.latLng(f.pathCoords[f.pathCoords.length-1][0], f.pathCoords[f.pathCoords.length-1][1])) > 5) {
                            f.pathCoords.push([ll.lat, ll.lng]); ensurePolyline(f); f.polyline.setLatLngs(f.pathCoords); saveFieldToCloud(f);
                        }
                    }
                });
            }, null, { enableHighAccuracy: true });
        };

        function ensurePolyline(f) {
            if (!f.polyline) f.polyline = L.polyline(f.pathCoords, { color: '#334155', weight: 4, opacity: 0.7, dashArray: '8, 8' }).addTo(map);
        }

        // --- MAP RENDER & TOUCH FIX ---
        function renderFieldOnMap(f) {
            if (!f) return;
            try {
                if (f.latlng && Array.isArray(f.latlng) && f.latlng.length === 2 && !isNaN(f.latlng[0]) && !isNaN(f.latlng[1])) {
                    if (f.id !== 'field_gen') {
                        const color = categoryColors[f.category] || '#64748b';
                        f.marker = L.marker(f.latlng, { icon: L.divIcon({ html: `<div style="background:${color};border-radius:30px;width:30px;height:30px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.2);"><i data-lucide="sprout" style="width:16px;height:16px;"></i></div>`, className: 'f-icon', iconSize:[30,30] }) }).addTo(map);
                        
                        f.marker.on('click', (ev) => { 
                            ignoreMapClick = true;
                            setTimeout(() => { ignoreMapClick = false; }, 300);
                        }); 
                        
                        f.marker.bindPopup(`<div class="p-1 min-w-[140px] text-center"><h3 class="font-black text-slate-800 text-[11px] uppercase mb-1">${f.name}</h3><div class="flex gap-1.5"><button onclick="window.openNavigation(${f.latlng[0]}, ${f.latlng[1]})" class="flex-1 bg-blue-600 text-white p-1.5 rounded-lg text-[9px] font-black uppercase cursor-pointer">Vai</button><button onclick="window.editField('${f.id}')" class="bg-slate-100 text-slate-600 p-1.5 rounded-lg cursor-pointer"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button><button onclick="window.deleteField('${f.id}')" class="bg-red-50 text-red-600 p-1.5 rounded-lg cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></div></div>`, { className: 'custom-popup' });
                        f.circle = L.circle(f.latlng, { radius: f.radius || 300, color: color, fillOpacity: 0.05, weight: 1.5, dashArray: '5,8' }).addTo(map);
                        if (f.pathCoords?.length) ensurePolyline(f);
                    }
                }
                if (f.checkpoints && Array.isArray(f.checkpoints)) {
                    f.checkpoints.forEach((cp, i) => { if (cp && cp.latlng) renderCheckpointOnMap(cp, i, f.id); });
                }
            } catch (err) {}
        }

        function renderCheckpointOnMap(cp, index, fieldId) {
            const pinColor = cp.checked ? '#10b981' : '#ef4444';
            cp.marker = L.marker(cp.latlng, { icon: L.divIcon({ html: `<div class="cp-icon-wrapper"><svg viewBox="0 0 24 24" width="36" height="36" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))"><path d="M12 2 L22 21 L2 21 Z" fill="${pinColor}" stroke="#fff" stroke-width="2"/><text x="12" y="17" font-size="8" font-weight="900" fill="white" text-anchor="middle">${cp.customNumber || index+1}</text></svg></div>`, className: 'cp-marker', iconSize:[40,40], iconAnchor:[20,34] }) }).addTo(map);
            cp.marker.on('click', (ev) => { 
                L.DomEvent.stopPropagation(ev);
                ignoreMapClick = true;
                setTimeout(() => { ignoreMapClick = false; }, 300);
                tempCheckpointCoords = { checkpointId: cp.id, fieldId: fieldId, cpRef: cp }; 
                document.getElementById('checkpointNumberInput').value = cp.customNumber || ""; 
                document.getElementById('checkpointNoteInput').value = cp.note || ""; 
                document.getElementById('checkpointCheckedInput').checked = !!cp.checked; 
                document.getElementById('deleteCPBtn').classList.remove('hidden'); 
                window.openModal('checkpointModal'); 
            });
        }

        // --- UTILS ---
        window.loadLocalCache = () => { const raw = localStorage.getItem('isolamenti_db_' + currentProjectName); if (raw) mergeData(JSON.parse(raw), true); };
        window.startSync = () => { onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName), (snap) => { if (isSaving || snap.metadata.hasPendingWrites) return; mergeData(snap.docs.map(d => d.data()), false); }); };
        window.executeManualSearch = async () => { 
            const q = document.getElementById('manualSearchInput').value.trim(); if(!q) return;
            try { 
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`); 
                const d = await res.json(); 
                if(d.length) { 
                    if(searchIndicator) map.removeLayer(searchIndicator); 
                    const starIcon = L.divIcon({ html: `<div class="search-star-container"><svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#ef4444" stroke="white" stroke-width="2"/></svg></div>`, iconSize:[40,40], iconAnchor:[20,20] }); 
                    searchIndicator = L.marker([d[0].lat, d[0].lon], { icon: starIcon }).addTo(map); 
                    isFollowing = false; 
                    map.flyTo([d[0].lat, d[0].lon], 17); 
                    window.closeModal('searchModal'); 
                } 
            } catch(e) {} 
        };
        window.editField = (id) => { const f = fields.find(field => field.id == id); if (!f) return; tempFieldId = id; document.getElementById('fieldModalTitle').innerText = "Modifica Area"; document.getElementById('fieldNameInput').value = f.name; document.getElementById('fieldCodeInput').value = f.code; document.getElementById('fieldCategoryInput').value = f.category; document.getElementById('fieldRadiusInput').value = f.radius; window.openModal('fieldModal'); map.closePopup(); };
        window.confirmAddField = async () => { const name = document.getElementById('fieldNameInput').value.trim(), code = document.getElementById('fieldCodeInput').value.trim(), cat = document.getElementById('fieldCategoryInput').value, rad = parseInt(document.getElementById('fieldRadiusInput').value) || 300; if(!tempFieldCoords) return; const f = { id: Date.now(), name, code, category: cat, latlng: [tempFieldCoords.lat, tempFieldCoords.lng], radius: rad, pathCoords: [], checkpoints: [], lastUpdated: Date.now() }; fields.push(f); renderFieldOnMap(f); await saveFieldToCloud(f); window.closeModal('fieldModal'); window.closeModal('actionChoiceModal'); window.updateFieldUI(); };
        window.confirmAddCheckpoint = async () => { 
            const note = document.getElementById('checkpointNoteInput').value.trim(), checked = !!document.getElementById('checkpointCheckedInput').checked, num = document.getElementById('checkpointNumberInput').value; 
            let tid = tempCheckpointCoords?.fieldId || 'field_gen', f = fields.find(x => x.id === tid); 
            if(!f) { f = { id: 'field_gen', name: 'NOTE', latlng: [0,0], radius: 0, pathCoords: [], checkpoints: [] }; fields.push(f); } 
            if(tempCheckpointCoords?.checkpointId) { const cp = f.checkpoints.find(c => c.id === tempCheckpointCoords.checkpointId); if(cp) { cp.note = note; cp.checked = checked; cp.customNumber = num; } } 
            else { f.checkpoints.push({ id: Date.now(), latlng: [tempCheckpointCoords.lat, tempCheckpointCoords.lng], note, checked, customNumber: num }); } 
            f.checkpoints.forEach(c => { if(c && c.marker) map.removeLayer(c.marker); }); 
            f.checkpoints.forEach((c, i) => { if(c) renderCheckpointOnMap(c, i, f.id); }); 
            await saveFieldToCloud(f); 
            window.closeModal('checkpointModal'); 
        };
        window.deleteField = async (id) => { if (!confirm("Eliminare?")) return; const idx = fields.findIndex(f => f.id == id); if (idx !== -1) { const f = fields[idx]; clearMapField(f); if (!isLocalMode) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, id.toString())); fields.splice(idx, 1); saveToLocalStorage(); window.updateFieldUI(); } };
        window.deleteCheckpoint = async () => { if(!confirm("Eliminare nota?")) return; let tid = tempCheckpointCoords?.fieldId || 'field_gen', f = fields.find(x => x.id === tid); if(f && f.checkpoints) { const idx = f.checkpoints.findIndex(c => c.id === tempCheckpointCoords.checkpointId); if(idx !== -1) { map.removeLayer(f.checkpoints[idx].marker); f.checkpoints.splice(idx, 1); await saveFieldToCloud(f); window.closeModal('checkpointModal'); } } };
        window.logoutProject = () => { if(confirm("Esci?")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        window.togglePanel = () => { isExpanded = !isExpanded; document.getElementById('statusPanel').classList.toggle('expanded', isExpanded); document.getElementById('panelChevron').style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0)'; };
        window.showNotification = (t) => { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = t; el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000); };
        window.selectNewFieldAction = () => { tempFieldId = null; document.getElementById('fieldModalTitle').innerText = "Dettagli Isolamento"; document.getElementById('fieldNameInput').value = ""; document.getElementById('fieldCodeInput').value = ""; window.openModal('fieldModal'); };
        window.selectNewCheckpoint = () => { tempCheckpointCoords = { lat: tempFieldCoords.lat, lng: tempFieldCoords.lng, fieldId: 'field_gen' }; document.getElementById('checkpointNumberInput').value = ""; document.getElementById('checkpointNoteInput').value = ""; document.getElementById('checkpointCheckedInput').checked = false; document.getElementById('deleteCPBtn').classList.add('hidden'); window.closeModal('actionChoiceModal'); window.openModal('checkpointModal'); };
        window.exportBackupJSON = () => { const d = localStorage.getItem('isolamenti_db_' + currentProjectName); if (!d) return; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d], {type: 'application/json'})); a.download = `Backup_${currentProjectName}.json`; a.click(); };
        window.importBackupJSON = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = (ev) => { try { mergeData(JSON.parse(ev.target.result), true); } catch(err) {} }; r.readAsText(file); };
        function updateStorageInfo() { document.getElementById('storageSize').innerText = (JSON.stringify(localStorage).length / 1024).toFixed(1); }
        window.openNavigation = (lat, lng) => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank'); };
        window.openAdminConsole = () => { if (!isAdmin) return; onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'team_registry'), (snap) => { const listEl = document.getElementById('adminTeamList'); listEl.innerHTML = ""; snap.docs.forEach(docSnap => { const d = docSnap.data(); const item = document.createElement('div'); item.className = "flex flex-col p-4 bg-slate-50 rounded-2xl border border-slate-100 gap-3"; item.innerHTML = `<div class="flex items-center justify-between"><div class="flex flex-col"><span class="text-xs font-black text-slate-700 uppercase">${d.teamId}</span><span class="text-[8px] text-slate-400">Visto: ${new Date(d.lastSeen).toLocaleString()}</span></div><button onclick="window.switchAdminTeam('${d.teamId}')" class="bg-blue-600 px-3 py-1.5 rounded-lg text-[9px] font-black text-white uppercase shadow-sm cursor-pointer">Gestisci</button></div>`; listEl.appendChild(item); }); lucide.createIcons(); }); window.openModal('adminConsole'); };
        window.switchAdminTeam = (newTeam) => { currentProjectName = newTeam; fields.forEach(f => clearMapField(f)); fields = []; loadLocalCache(); if (!isLocalMode) startSync(); window.closeModal('adminConsole'); };

        window.onload = () => { 
            map = L.map('map', { zoomControl: false, tap: false }).setView([44.5, 11.5], 6); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map); 
            map.on('dragstart', () => { isFollowing = false; if (mapRotationEnabled) { document.getElementById('map').style.transform = 'scale(1) rotate(0deg)'; } }); 
            map.on('click', (e) => { if (ignoreMapClick) return; tempFieldCoords = e.latlng; isFollowing = false; window.openModal('actionChoiceModal'); try { lucide.createIcons(); } catch(err) {} }); 
            mapReady = true; 
            const s = localStorage.getItem('isolamenti_last_session'); 
            if(s) { const d = JSON.parse(s); document.getElementById('projectInput').value = d.name; document.getElementById('passwordInput').value = d.pass; handleLogin(); } 
            try { lucide.createIcons(); } catch(e) {}
        };
    </script>
</body>
</html>
