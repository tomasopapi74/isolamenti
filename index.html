<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsolamenTom v3.4.5 - FIELD RESCUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map-container { height: calc(100vh - 60px); width: 100%; position: relative; background: #e2e8f0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; transform-origin: center center; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        #statusPanel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 6000; max-height: 85vh; transform: translateY(calc(100% - 75px)); }
        #statusPanel.expanded { transform: translateY(0) !important; }
        .drag-handle { width: 40px; height: 4px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 8px auto; }
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #adminConsole { position: fixed; inset: 0; background: #f8fafc; z-index: 10000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .cp-icon-wrapper { display: flex; align-items: center; justify-content: center; width: 44px !important; height: 44px !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- Login -->
    <div id="loginOverlay">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-md space-y-6 border border-slate-100">
            <div class="text-center">
                <div class="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i data-lucide="shield-alert" class="text-white w-8 h-8"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">IsolamenTom</h1>
                <p class="text-red-600 text-[9px] font-black uppercase tracking-widest mt-2">v3.4.5 Field Rescue</p>
            </div>
            <div id="loginStatus" class="hidden text-center py-3 bg-red-50 text-red-700 text-[10px] font-black rounded-xl uppercase">Caricamento in corso...</div>
            <div class="space-y-3">
                <input type="text" id="projectInput" placeholder="ID TEAM" class="w-full border-2 border-slate-100 rounded-xl p-4 text-base outline-none focus:border-red-600 font-bold uppercase transition-all">
                <input type="password" id="passwordInput" placeholder="PASSWORD" class="w-full border-2 border-slate-100 rounded-xl p-4 text-base outline-none focus:border-red-600 font-bold transition-all">
                <button id="loginBtn" onclick="window.handleLogin()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-base shadow-lg active:scale-95 transition-all uppercase tracking-widest">Sblocca Mappa</button>
            </div>
        </div>
    </div>

    <!-- Admin Console -->
    <div id="adminConsole">
        <div class="w-full max-w-4xl mx-auto space-y-6 pb-12">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3"><div class="bg-red-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="shield-check"></i></div><h2 class="text-xl font-black text-slate-800 uppercase">Amministrazione</h2></div>
                <button onclick="window.closeModal('adminConsole')" class="bg-white p-2 rounded-xl border shadow-sm active:scale-90"><i data-lucide="x"></i></button>
            </div>
            <div id="adminTeamList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- UI Header -->
    <header class="bg-white shadow-md px-3 sticky top-0 z-50 border-b h-[60px] flex items-center gap-3">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 p-1.5 rounded-lg shadow-md"><i data-lucide="sprout" class="text-white w-5 h-5"></i></div>
            <div class="flex flex-col"><h1 class="text-sm font-black text-slate-900 leading-none">IsolamenTom</h1><span id="displayProjName" class="text-[8px] font-black text-blue-600 uppercase tracking-tight">Sync...</span></div>
        </div>
        <div class="flex-1"></div>
        <button onclick="window.logoutProject()" class="bg-slate-50 text-slate-400 p-2 rounded-lg active:bg-red-50 active:text-red-600 transition-all"><i data-lucide="log-out" class="w-4 h-4"></i></button>
    </header>

    <main class="relative">
        <div id="map-container"><div id="map"></div></div>
        
        <div class="absolute top-3 left-3 z-[1000] flex flex-col gap-2">
            <button onclick="window.recenterOnUser()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="crosshair" class="w-5 h-5"></i></button>
            <button id="rotationToggle" onclick="window.toggleMapRotation()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="compass" class="w-5 h-5"></i></button>
            <button onclick="window.openModal('searchModal')" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-blue-600"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
        </div>

        <div id="telemetryPanel" class="absolute top-3 right-3 z-[1000] flex flex-col gap-2 items-end">
            <div class="bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl border border-slate-100 text-[9px] font-black text-slate-600 flex items-center gap-2 shadow-lg">
                <div class="flex flex-col items-center"><span class="text-blue-600 leading-none" id="accuracyVal">--m</span><span class="text-[7px] text-slate-400 font-bold uppercase mt-0.5">GPS</span></div>
                <div id="syncIndicator" class="flex flex-col items-center border-l pl-2 border-slate-200"><i data-lucide="cloud-off" id="syncIcon" class="w-3.5 h-3.5 text-slate-300"></i><span id="lastSyncTime" class="text-[7px] text-slate-400 font-bold uppercase mt-0.5">Sync</span></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="statusPanel" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-[32px] flex flex-col border-t border-slate-100">
            <div id="dragArea" class="cursor-pointer p-4 pb-2" onclick="window.togglePanel()">
                <div class="drag-handle"></div>
                <div class="flex items-center justify-between px-2">
                    <div class="flex flex-col"><span class="text-[10px] font-black uppercase text-slate-800 tracking-wider">Mappa Isolamenti</span><span id="fieldCount" class="text-[8px] font-bold text-slate-400 uppercase">Recupero...</span></div>
                    <div class="bg-slate-50 p-1.5 rounded-lg text-slate-400"><i data-lucide="chevron-up" class="w-4 h-4 transition-transform duration-500" id="panelChevron"></i></div>
                </div>
            </div>
            <div id="panelContent" class="space-y-4 overflow-y-auto px-5 pb-10 transition-opacity duration-300 h-[70vh]">
                <div id="adminTools" class="hidden p-4 bg-red-50 rounded-2xl border border-red-200 mb-2"><button onclick="window.openAdminConsole()" class="w-full bg-red-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">Console Amministratore</button></div>
                <button id="trackBtn" onclick="window.toggleTracking()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-base shadow-lg active:scale-95 transition-all uppercase tracking-widest"><i data-lucide="play" id="trackIcon" class="fill-white w-5 h-5"></i> <span id="trackLabel">GPS</span></button>
                <div id="fieldsSection" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- Modali Creazione -->
    <div id="actionChoiceModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[40px] w-full max-w-xs p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-slate-900">Azione Mappa</h2>
            <div class="flex flex-col gap-3">
                <button onclick="window.selectNewFieldAction()" class="flex items-center justify-between bg-green-50 text-green-700 p-6 rounded-[24px] border-2 border-green-100 font-black uppercase text-xs">Crea Isolamento <i data-lucide="plus"></i></button>
                <button onclick="window.selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-6 rounded-[24px] border-2 border-blue-100 font-black uppercase text-xs">Aggiungi Nota <i data-lucide="clipboard-check"></i></button>
                <button onclick="window.closeModal('actionChoiceModal')" class="mt-4 text-slate-400 font-black uppercase text-[10px]">Annulla</button>
            </div>
        </div>
    </div>

    <!-- Modale Ricerca -->
    <div id="searchModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[32px] w-full max-w-xs p-8 shadow-2xl text-center">
            <h2 class="text-xl font-black text-slate-900 mb-5 uppercase tracking-tight">Cerca Luogo</h2>
            <input type="text" id="manualSearchInput" placeholder="Via o Coordinate..." class="w-full border border-slate-100 rounded-xl p-3.5 bg-slate-50 text-sm outline-none mb-5">
            <div class="flex gap-3"><button onclick="window.closeModal('searchModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Esci</button><button onclick="window.executeManualSearch()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase shadow-md active:scale-95">Trova</button></div>
        </div>
    </div>

    <!-- Modale Isolamento -->
    <div id="fieldModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 id="fieldModalTitle" class="text-xl font-black text-green-700 mb-5">Dati Area</h2>
            <div class="space-y-3">
                <input type="text" id="fieldNameInput" placeholder="Nome Campo" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-bold text-sm outline-none">
                <input type="text" id="fieldCodeInput" placeholder="Codice" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-bold text-sm uppercase outline-none">
                <select id="fieldCategoryInput" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-black text-sm"><option value="cipolle">Cipolle</option><option value="bunching">Bunching</option><option value="brassiche">Brassiche</option><option value="altro">Altro</option></select>
                <div class="flex gap-3 pt-3"><button onclick="window.closeModal('fieldModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Annulla</button><button onclick="window.confirmAddField()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-black text-xs uppercase shadow-md">Salva</button></div>
            </div>
        </div>
    </div>

    <!-- Modale Nota -->
    <div id="checkpointModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 class="text-xl font-black text-blue-800 mb-5 text-center">Nota Tecnica</h2>
            <input type="number" id="checkpointNumberInput" placeholder="Numero Nota" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-bold text-base mb-3 outline-none">
            <textarea id="checkpointNoteInput" rows="3" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 text-sm outline-none mb-4" placeholder="Dettagli..."></textarea>
            <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl mb-6 border border-slate-100"><input type="checkbox" id="checkpointCheckedInput" class="w-6 h-6 rounded-lg text-blue-600"><label class="text-xs font-black text-slate-700 uppercase">Isolamento OK</label></div>
            <div class="flex flex-col gap-2">
                <div class="flex gap-3"><button onclick="window.closeModal('checkpointModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Chiudi</button><button onclick="window.confirmAddCheckpoint()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs shadow-md">Salva</button></div>
                <button id="deleteCPBtn" onclick="window.deleteCheckpoint()" class="hidden py-3 text-red-500 font-bold text-[10px] uppercase border-t">Elimina Nota</button>
            </div>
        </div>
    </div>

    <!-- Modale Esito Sicuro -->
    <div id="notification" class="fixed top-20 left-1/2 -translate-x-1/2 z-[11000] opacity-0 transition-all duration-500 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black text-center min-w-[200px] pointer-events-none"><span id="notifText">In corso...</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE", authDomain: "isolamenti-923d0.firebaseapp.com", projectId: "isolamenti-923d0", storageBucket: "isolamenti-923d0.firebasestorage.app", messagingSenderId: "907661900494", appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f" };
        const appId = 'isolamenti-923d0';

        const categoryColors = { cipolle: '#f97316', bunching: '#22c55e', brassiche: '#a855f7', altro: '#64748b' };
        let db, auth, map, userMarker, watchId = null, fields = [], searchIndicator = null;
        let currentProjectName = null, isLocalMode = false, mapReady = false, isSaving = false, isInitialized = false, mapRotationEnabled = false;
        let tempFieldCoords = null, tempCheckpointCoords = null, isExpanded = false, lastLatlng = null, tempFieldId = null, isAdmin = false;

        window.openModal = (id) => { const el = document.getElementById(id); if (el) { el.classList.remove('hidden'); el.classList.add('flex'); } };
        window.closeModal = (id) => { const el = document.getElementById(id); if (el) { el.classList.add('hidden'); el.classList.remove('flex'); } };
        window.showNotification = (text) => { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = text; el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000); };

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        // --- AUTH & BYPASS BROWSER PER GPS ---
        window.handleLogin = async function() {
            const name = document.getElementById('projectInput').value.trim().toLowerCase(), pass = document.getElementById('passwordInput').value.trim();
            if (!name || !pass) { window.showNotification("Inserisci ID e Password"); return; }
            document.getElementById('loginStatus').classList.remove('hidden');

            // Richiediamo i permessi GPS proprio ADESSO, mentre l'utente ha appena premuto il tasto, aggirando i blocchi di Safari/Android
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    () => { if(!isTracking && mapReady) window.toggleTracking(); }, 
                    () => { window.showNotification("GPS Disabilitato dal telefono"); }
                );
            }

            try { 
                await signInAnonymously(auth); 
                if (name === 'admin' && pass === 'master25') { isAdmin = true; currentProjectName = 'admin'; } 
                else { currentProjectName = name.replace(/[^a-z0-9_]/g, ''); window.registerTeamInRegistry(pass); }
                localStorage.setItem('isolamenti_last_session', JSON.stringify({ name: currentProjectName, pass })); 
                isInitialized = true; window.enterApp(); 
            } catch (err) { window.showNotification("Lavoro Offline Attivato"); window.handleLocalMode(); }
        };

        window.handleLocalMode = () => { currentProjectName = document.getElementById('projectInput').value.trim().toLowerCase() || 'locale'; isLocalMode = true; isInitialized = true; window.enterApp(); };

        window.enterApp = () => {
            document.getElementById('displayProjName').innerText = currentProjectName.toUpperCase();
            if (isAdmin) document.getElementById('adminTools').classList.remove('hidden');
            document.getElementById('loginOverlay').style.display = 'none';
            if (mapReady) { 
                window.loadLocalCache(); 
                if (!isLocalMode) window.startSync(); 
            }
            lucide.createIcons();
        }

        window.registerTeamInRegistry = async (pass) => { if (isAdmin || isLocalMode) return; try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'team_registry', currentProjectName), { teamId: currentProjectName, password: pass, lastSeen: Date.now() }); } catch(e) {} }
        window.openAdminConsole = () => { onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'team_registry'), (snap) => { const list = document.getElementById('adminTeamList'); list.innerHTML = ""; snap.docs.forEach(d => { const data = d.data(); const card = document.createElement('div'); card.className = "p-4 bg-white rounded-2xl border shadow-sm flex justify-between items-center"; card.innerHTML = `<div class="flex flex-col"><span class="font-black uppercase text-xs">${data.teamId}</span><span class="text-[10px] text-blue-600 font-bold">${data.password}</span></div><div class="text-right text-[8px] text-slate-400 uppercase">${new Date(data.lastSeen).toLocaleDateString()}</div>`; list.appendChild(card); }); }); window.openModal('adminConsole'); };

        // --- MOTORE DATI TOTALMENTE PROTETTO ---
        window.mergeData = (newData, isInitialLoad) => {
            if (!mapReady || !Array.isArray(newData)) return;
            const localMap = new Map(fields.map(f => [f.id.toString(), f]));
            newData.forEach(cloudField => {
                if (!cloudField.id) return;
                const id = cloudField.id.toString(), existing = localMap.get(id);
                if (!existing || cloudField.lastUpdated > (existing.lastUpdated || 0) || isInitialLoad) {
                    const merged = { ...cloudField };
                    const p1 = window.parsePath(cloudField.pathCoords) || [];
                    const p2 = window.parsePath(cloudField.pathCoords2) || []; 
                    merged.pathCoords = [...p1, ...p2];
                    const pLocal = existing ? window.parsePath(existing.pathCoords) : [];
                    if (pLocal.length > merged.pathCoords.length) merged.pathCoords = pLocal;
                    merged.checkpoints = cloudField.checkpoints || []; // NOTE RIPRISTINATE E SALVATE
                    localMap.set(id, merged);
                }
            });
            fields.forEach(f => window.clearMapField(f));
            fields = Array.from(localMap.values()).map(f => { window.renderFieldOnMap(f); return f; });
            window.updateFieldUI(); window.saveToLocalStorage();
        }

        window.clearMapField = (f) => { if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline); if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); }); }
        window.saveToLocalStorage = () => { localStorage.setItem('isolamenti_db_' + currentProjectName, JSON.stringify(fields.map(f => { const c = {...f}; delete c.marker; delete c.circle; delete c.polyline; if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; }); return c; }))); }
        window.saveFieldToCloud = async (f) => { 
            if (isLocalMode || !isInitialized || isSaving) return; 
            isSaving = true; f.lastUpdated = Date.now(); window.saveToLocalStorage(); 
            try { 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, f.id.toString()), { 
                    id: f.id.toString(), name: f.name, code: f.code || "---", category: f.category || "altro", 
                    latlng: f.latlng, radius: f.radius || 300, 
                    pathCoords: JSON.stringify(f.pathCoords || []), 
                    checkpoints: (f.checkpoints || []).map(cp => ({ id: cp.id, latlng: cp.latlng, note: cp.note, checked: !!cp.checked, customNumber: cp.customNumber })), 
                    lastUpdated: f.lastUpdated 
                }); 
            } catch(e) {} finally { isSaving = false; } 
        }

        // --- DASHBOARD UI ---
        window.updateFieldUI = () => {
            const container = document.getElementById('fieldsSection'); if (!container) return; container.innerHTML = "";
            const valid = fields.filter(f => f.id && f.id !== 'field_gen');
            document.getElementById('fieldCount').innerText = valid.length + " Aree caricate";
            valid.forEach(f => {
                const div = document.createElement('div'); div.className = "p-4 bg-slate-50 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100";
                div.innerHTML = `<div class="flex items-center gap-3 cursor-pointer flex-1 py-1" onclick="window.zoomToField('${f.id}')"><div class="w-3 h-3 rounded-full" style="background:${categoryColors[f.category] || '#64748b'}"></div><span class="text-xs font-black uppercase text-slate-700">${f.name}</span></div><div class="flex gap-2"><button onclick="window.editField('${f.id}')" class="p-2 text-blue-600 bg-white rounded-lg shadow-sm"><i data-lucide="pencil" class="w-4 h-4"></i></button><button onclick="window.deleteField('${f.id}')" class="p-2 text-red-500 bg-white rounded-lg shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        };

        window.zoomToField = (id) => { const f = fields.find(x => x.id == id); if(f && f.latlng) { isFollowing = false; map.flyTo(f.latlng, 17); window.togglePanel(); } };

        // --- RENDER MAPPA RISOLTO (TOCCO BLINDATO CON L.DomEvent.stop) ---
        window.renderFieldOnMap = (f) => {
            if (!f) return;

            if (f.checkpoints && Array.isArray(f.checkpoints)) {
                f.checkpoints.forEach((cp, i) => window.renderCheckpointOnMap(cp, i, f.id));
            }

            if (f.id === 'field_gen' || !f.latlng || f.latlng[0] === 0) return;

            const color = categoryColors[f.category] || '#64748b';
            f.marker = L.marker(f.latlng, { icon: L.divIcon({ html: `<div style="background:${color};border-radius:30px;width:30px;height:30px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.2);"><i data-lucide="sprout" style="width:16px;height:16px;"></i></div>`, className: 'f-icon', iconSize:[30,30] }) }).addTo(map);
            
            // FIX DEFINITIVO TOCCO MARKER
            f.marker.on('click', (ev) => { 
                L.DomEvent.stop(ev); // Interrompe in modo nativo la propagazione alla mappa
                f.marker.bindPopup(`<div class="p-2 text-center text-xs font-black uppercase">${f.name}<br><button onclick="window.openNavigation(${f.latlng[0]},${f.latlng[1]})" class="bg-blue-600 text-white px-4 py-2 rounded-lg mt-2">VAI AL CAMPO</button></div>`).openPopup(); 
            });
            
            f.circle = L.circle(f.latlng, { radius: f.radius || 300, color: color, fillOpacity: 0.05, weight: 1.5, dashArray: '5,8' }).addTo(map);
            if (f.pathCoords?.length) f.polyline = L.polyline(f.pathCoords, { color: '#334155', weight: 4, opacity: 0.7, dashArray: '8, 8' }).addTo(map);
        }

        window.renderCheckpointOnMap = (cp, index, fieldId) => {
            const pinColor = cp.checked ? '#10b981' : '#ef4444';
            cp.marker = L.marker(cp.latlng, { icon: L.divIcon({ html: `<div class="cp-icon-wrapper"><svg viewBox="0 0 24 24" width="36" height="36" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))"><path d="M12 2 L22 21 L2 21 Z" fill="${pinColor}" stroke="#fff" stroke-width="2"/><text x="12" y="17" font-size="8" font-weight="900" fill="white" text-anchor="middle">${cp.customNumber || index+1}</text></svg></div>`, className: 'cp-marker', iconSize:[40,40], iconAnchor:[20,34] }) }).addTo(map);
            
            // FIX DEFINITIVO TOCCO NOTA
            cp.marker.on('click', (ev) => { 
                L.DomEvent.stop(ev); 
                tempCheckpointCoords = { checkpointId: cp.id, fieldId, cpRef: cp }; 
                document.getElementById('checkpointNumberInput').value = cp.customNumber || ""; 
                document.getElementById('checkpointNoteInput').value = cp.note || ""; 
                document.getElementById('checkpointCheckedInput').checked = !!cp.checked; 
                document.getElementById('deleteCPBtn').classList.remove('hidden'); 
                window.openModal('checkpointModal'); 
            });
        }

        // --- AZIONI CREAZIONE ---
        window.selectNewFieldAction = () => { tempFieldId = null; document.getElementById('fieldModalTitle').innerText = "Crea Isolamento"; document.getElementById('fieldNameInput').value = ""; document.getElementById('fieldCodeInput').value = ""; window.closeModal('actionChoiceModal'); window.openModal('fieldModal'); };
        window.selectNewCheckpoint = () => { tempCheckpointCoords = { lat: tempFieldCoords.lat, lng: tempFieldCoords.lng, fieldId: 'field_gen' }; document.getElementById('checkpointNumberInput').value = ""; document.getElementById('checkpointNoteInput').value = ""; document.getElementById('checkpointCheckedInput').checked = false; document.getElementById('deleteCPBtn').classList.add('hidden'); window.closeModal('actionChoiceModal'); window.openModal('checkpointModal'); };
        
        window.confirmAddField = async () => { 
            const n = document.getElementById('fieldNameInput').value, c = document.getElementById('fieldCodeInput').value, cat = document.getElementById('fieldCategoryInput').value;
            if (tempFieldId) { const f = fields.find(x => x.id == tempFieldId); if(f) { f.name = n; f.code = c; f.category = cat; window.clearMapField(f); window.renderFieldOnMap(f); await window.saveFieldToCloud(f); } } 
            else { const f = { id: Date.now(), name: n, code: c, category: cat, latlng: [tempFieldCoords.lat, tempFieldCoords.lng], radius: 300, pathCoords: [], checkpoints: [], lastUpdated: Date.now() }; fields.push(f); window.renderFieldOnMap(f); await window.saveFieldToCloud(f); }
            window.closeModal('fieldModal'); window.updateFieldUI(); tempFieldId = null;
        };

        window.confirmAddCheckpoint = async () => {
            const note = document.getElementById('checkpointNoteInput').value, checked = !!document.getElementById('checkpointCheckedInput').checked, num = document.getElementById('checkpointNumberInput').value;
            let tid = tempCheckpointCoords?.fieldId || 'field_gen', f = fields.find(x => x.id === tid);
            if(!f) { f = { id: 'field_gen', name: 'NOTE GENERALI', latlng: [0,0], radius: 0, checkpoints: [] }; fields.push(f); }
            f.checkpoints = f.checkpoints || [];
            if(tempCheckpointCoords && tempCheckpointCoords.checkpointId) { const cp = f.checkpoints.find(c => c.id === tempCheckpointCoords.checkpointId); if(cp) { cp.note = note; cp.checked = checked; cp.customNumber = num; } }
            else { f.checkpoints.push({ id: Date.now(), latlng: [tempCheckpointCoords.lat, tempCheckpointCoords.lng], note, checked, customNumber: num }); }
            f.checkpoints.forEach(c => { if(c.marker) map.removeLayer(c.marker); }); f.checkpoints.forEach((c, i) => window.renderCheckpointOnMap(c, i, f.id));
            await window.saveFieldToCloud(f); window.closeModal('checkpointModal');
        };

        window.editField = (id) => { const f = fields.find(x => x.id == id); if(!f) return; tempFieldId = id; document.getElementById('fieldModalTitle').innerText = "Modifica Isolamento"; document.getElementById('fieldNameInput').value = f.name; document.getElementById('fieldCodeInput').value = f.code; window.openModal('fieldModal'); };
        window.deleteField = async (id) => { if (confirm("Eliminare definitivamente?")) { const idx = fields.findIndex(f => f.id == id); if (idx !== -1) { window.clearMapField(fields[idx]); if (!isLocalMode) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, id.toString())); fields.splice(idx, 1); window.saveToLocalStorage(); window.updateFieldUI(); } } };
        window.deleteCheckpoint = async () => { if(confirm("Eliminare nota?")) { let tid = tempCheckpointCoords?.fieldId || 'field_gen', f = fields.find(x => x.id === tid); const idx = f.checkpoints.findIndex(c => c.id === tempCheckpointCoords.checkpointId); if(idx !== -1) { map.removeLayer(f.checkpoints[idx].marker); f.checkpoints.splice(idx, 1); await window.saveFieldToCloud(f); window.closeModal('checkpointModal'); } } };

        // --- GPS ENGINE ---
        window.toggleTracking = () => {
            if (isTracking) { navigator.geolocation.clearWatch(watchId); isTracking = false; document.getElementById('trackLabel').innerText = 'AVVIA GPS'; return; }
            isTracking = true; document.getElementById('trackLabel').innerText = 'STOP GPS';
            watchId = navigator.geolocation.watchPosition((pos) => {
                const ll = L.latLng(pos.coords.latitude, pos.coords.longitude); document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                if (!userMarker) userMarker = L.marker(ll, { icon: L.divIcon({ html: `<div style="transform: rotate(${pos.coords.heading || 0}deg)"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37, 99, 235, 0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` }) }).addTo(map);
                else userMarker.setLatLng(ll);
                if(isFollowing) { map.panTo(ll); if (mapRotationEnabled) document.getElementById('map').style.transform = `scale(1.3) rotate(${-pos.coords.heading || 0}deg)`; }
                fields.forEach(f => { if (f.id !== 'field_gen' && f.latlng && ll.distanceTo(L.latLng(f.latlng)) <= f.radius) { f.pathCoords = f.pathCoords || []; if (!f.pathCoords.length || ll.distanceTo(L.latLng(f.pathCoords[f.pathCoords.length-1][0], f.pathCoords[f.pathCoords.length-1][1])) > 5) { f.pathCoords.push([ll.lat, ll.lng]); if(!f.polyline) f.polyline = L.polyline(f.pathCoords, { color: '#334155', weight: 4, opacity: 0.7, dashArray: '8, 8' }).addTo(map); f.polyline.setLatLngs(f.pathCoords); window.saveFieldToCloud(f); } } });
            }, null, { enableHighAccuracy: true });
        };

        window.executeManualSearch = async () => { 
            const q = document.getElementById('manualSearchInput').value.trim(); if(!q) return;
            try { 
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`); const d = await res.json(); 
                if(d.length) { 
                    if(searchIndicator) map.removeLayer(searchIndicator); 
                    searchIndicator = L.marker([d[0].lat, d[0].lon], { icon: L.divIcon({ html: `<div class="bg-red-500 w-4 h-4 rounded-full border-2 border-white shadow-lg"></div>` }) }).addTo(map); 
                    isFollowing = false; map.flyTo([d[0].lat, d[0].lon], 17); window.closeModal('searchModal'); 
                } 
            } catch(e) {} 
        };

        window.toggleMapRotation = () => { mapRotationEnabled = !mapRotationEnabled; const btn = document.getElementById('rotationToggle'); if (mapRotationEnabled) { btn.classList.add('text-blue-600', 'bg-blue-50'); isFollowing = true; } else { btn.classList.remove('text-blue-600', 'bg-blue-50'); document.getElementById('map').style.transform = 'scale(1) rotate(0deg)'; } };
        window.togglePanel = () => { isExpanded = !isExpanded; document.getElementById('statusPanel').classList.toggle('expanded', isExpanded); document.getElementById('panelChevron').style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0)'; };
        window.recenterOnUser = () => { isFollowing = true; if(userMarker) map.flyTo(userMarker.getLatLng(), 17); };
        window.logoutProject = () => { if(confirm("Esci?")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        window.openNavigation = (lat, lng) => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank'); };
        window.parsePath = (p) => { if (!p) return []; if (Array.isArray(p)) return p; try { return JSON.parse(p); } catch(e) { return []; } }
        window.loadLocalCache = () => { const raw = localStorage.getItem('isolamenti_db_' + currentProjectName); if (raw) window.mergeData(JSON.parse(raw), true); }
        window.startSync = () => { onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName), (snap) => { if (!isSaving) window.mergeData(snap.docs.map(d => d.data()), false); }); }

        window.onload = () => { 
            // Inizializzazione Mappa pulita
            map = L.map('map', { zoomControl: false }).setView([44.5, 11.5], 6); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map); 
            
            // Rilevamento tocco sicuro
            map.on('click', (e) => { 
                tempFieldCoords = e.latlng; 
                isFollowing = false; 
                window.openModal('actionChoiceModal'); 
                lucide.createIcons(); 
            });
            
            mapReady = true; const s = localStorage.getItem('isolamenti_last_session'); 
            if(s) { const d = JSON.parse(s); document.getElementById('projectInput').value = d.name; document.getElementById('passwordInput').value = d.pass; window.handleLogin(); }
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
