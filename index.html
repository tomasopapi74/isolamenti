<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsolamenTom v2.8.4 - STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map-container { height: calc(100vh - 80px); width: 100%; position: relative; background: #e2e8f0; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Pannello Scorrevole */
        #statusPanel { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 6000; 
            max-height: 85vh; 
            transform: translateY(calc(100% - 85px)); 
        }
        #statusPanel.expanded { transform: translateY(0) !important; }
        
        /* UI Elements */
        .drag-handle { width: 50px; height: 6px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 10px auto; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 16px; padding: 5px; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <div id="loginOverlay">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md space-y-8 border border-slate-100">
            <div class="text-center">
                <div class="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200">
                    <i data-lucide="shield" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight leading-none">IsolamenTom</h1>
                <p class="text-blue-600 text-[10px] font-black uppercase tracking-[0.2em] mt-3">Versione PC Stable 2.8.4</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Identificativo Team</label>
                    <input type="text" id="projectInput" placeholder="es: team_nord" class="w-full border-2 border-slate-50 rounded-2xl p-4 text-lg outline-none focus:border-blue-600 bg-slate-50 font-bold transition-all uppercase">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Password</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" class="w-full border-2 border-slate-50 rounded-2xl p-4 text-lg outline-none focus:border-blue-600 bg-slate-50 font-bold transition-all">
                </div>
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 active:scale-95 transition-all">ACCEDI E SINCRONIZZA</button>
                <button onclick="handleLocalMode()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all text-sm">
                    <i data-lucide="smartphone" class="w-4 h-4"></i> LAVORA OFFLINE (SOLO LOCALE)
                </button>
            </div>
        </div>
    </div>

    <header class="bg-white shadow-lg p-4 sticky top-0 z-50 border-b h-[80px] flex items-center gap-4">
        <div class="flex items-center gap-3 shrink-0">
            <div class="bg-green-600 p-2.5 rounded-2xl shadow-lg shadow-green-100"><i data-lucide="map" class="text-white w-6 h-6"></i></div>
            <div class="hidden sm:flex flex-col">
                <h1 class="text-base font-black text-slate-900 leading-none">IsolamenTom</h1>
                <span id="displayProjName" class="text-[9px] font-black text-blue-600 uppercase tracking-tighter mt-1">Connessione...</span>
            </div>
        </div>
        <div class="flex-1 relative">
            <input type="text" id="searchInput" placeholder="Cerca indirizzo o campo..." class="w-full pl-4 pr-10 py-3 border-2 border-slate-50 rounded-2xl text-sm bg-slate-50 outline-none focus:border-blue-500 transition-all">
            <button onclick="handleSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><i data-lucide="search" class="w-5 h-5"></i></button>
        </div>
        <button onclick="logoutProject()" class="bg-slate-100 text-slate-500 p-3 rounded-2xl active:bg-red-50 active:text-red-600 transition-all">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </header>

    <main class="relative">
        <div id="map-container"><div id="map"></div></div>
        
        <div class="absolute top-4 left-4 z-[1000] flex flex-col gap-3">
            <button onclick="recenterOnUser()" class="bg-white p-4 rounded-2xl shadow-xl border border-slate-50 active:scale-90 text-slate-700">
                <i data-lucide="crosshair" class="w-6 h-6"></i>
            </button>
            <button id="rotationToggle" onclick="toggleMapRotation()" class="bg-white p-4 rounded-2xl shadow-xl border border-slate-50 active:scale-90 text-slate-700">
                <i data-lucide="compass" class="w-6 h-6"></i>
            </button>
        </div>

        <div id="telemetryPanel" class="absolute top-4 right-4 z-[1000] flex flex-col gap-2 items-end">
            <div class="bg-white/90 backdrop-blur px-4 py-2 rounded-2xl border border-slate-100 text-[10px] font-black text-slate-600 flex items-center gap-3 shadow-xl">
                <div class="flex flex-col items-center">
                    <span class="text-blue-600" id="accuracyVal">--m</span>
                    <span class="text-[8px] text-slate-400 font-bold uppercase">GPS</span>
                </div>
                <div id="syncIndicator" class="flex flex-col items-center border-l pl-3 border-slate-200">
                    <i data-lucide="cloud-off" id="syncIcon" class="w-4 h-4 text-slate-300"></i>
                    <span id="lastSyncTime" class="text-[8px] text-slate-400 font-bold uppercase">Locale</span>
                </div>
            </div>
            <button id="forceSyncBtn" onclick="manualSync()" class="hidden bg-orange-500 text-white px-4 py-1.5 rounded-full text-[9px] font-black shadow-lg">SINCRONIZZA ORA</button>
        </div>

        <div id="statusPanel" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-[40px] flex flex-col overflow-hidden border-t border-slate-100">
            <div id="dragArea" class="cursor-pointer p-6" onclick="togglePanel()">
                <div class="drag-handle"></div>
                <div class="flex items-center justify-between">
                    <div class="flex flex-col">
                        <span class="text-xs font-black uppercase text-slate-800 tracking-widest">Database Isolamenti</span>
                        <span id="fieldCount" class="text-[10px] font-bold text-slate-400 uppercase">Verifica dati in corso...</span>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl text-slate-400">
                        <i data-lucide="chevron-up" class="w-5 h-5 transition-transform duration-500" id="panelChevron"></i>
                    </div>
                </div>
            </div>
            
            <div id="panelContent" class="space-y-6 overflow-y-auto px-6 pb-12 transition-opacity duration-300 h-[70vh]">
                <div class="flex flex-col gap-3">
                    <button id="trackBtn" onclick="toggleTracking()" class="bg-slate-900 text-white py-5 rounded-[24px] font-black text-lg flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                        <i data-lucide="play" id="trackIcon" class="fill-white w-6 h-6"></i> <span id="trackLabel">AVVIA GPS</span>
                    </button>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="exportBackupJSON()" class="bg-blue-50 text-blue-700 py-4 rounded-2xl font-bold text-xs uppercase flex items-center justify-center gap-2 border border-blue-100">
                            <i data-lucide="download" class="w-4 h-4"></i> Export Backup
                        </button>
                        <button onclick="document.getElementById('importFile').click()" class="bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold text-xs uppercase flex items-center justify-center gap-2 border border-slate-200">
                            <i data-lucide="upload" class="w-4 h-4"></i> Import JSON
                        </button>
                        <input type="file" id="importFile" class="hidden" onchange="importBackupJSON(event)">
                    </div>
                </div>

                <div id="fieldsSection" class="space-y-4">
                    </div>

                <div class="p-6 bg-slate-50 rounded-[32px] border border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-1">System Status v2.8.4</p>
                    <p class="text-[10px] font-bold text-slate-400">Archiviazione locale: <span id="storageSize">0</span> KB</p>
                </div>
            </div>
        </div>
    </main>

    <div id="checkpointModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[40px] w-full max-w-md p-10 shadow-2xl border border-white/20">
            <h2 class="text-2xl font-black text-slate-900 mb-6">Dettagli Nota</h2>
            <textarea id="checkpointNoteInput" rows="4" class="w-full border-2 border-slate-100 rounded-[24px] p-5 bg-slate-50 text-base outline-none focus:border-blue-600 transition-all mb-6" placeholder="Inserisci osservazioni..."></textarea>
            <div class="flex items-center gap-4 p-5 bg-slate-50 rounded-[24px] mb-8 border border-slate-100">
                <input type="checkbox" id="checkpointCheckedInput" class="w-7 h-7 rounded-xl text-blue-600 border-2 border-slate-300">
                <label for="checkpointCheckedInput" class="text-sm font-black text-slate-700 uppercase">Isolamento OK (X)</label>
            </div>
            <div class="flex gap-4">
                <button onclick="closeCheckpointModal()" class="flex-1 py-5 text-slate-400 font-bold text-sm uppercase">Annulla</button>
                <button onclick="confirmAddCheckpoint()" class="flex-1 py-5 bg-blue-600 text-white rounded-[24px] font-black text-sm shadow-xl shadow-blue-200 uppercase tracking-widest">Salva</button>
            </div>
        </div>
    </div>

    <div id="actionChoiceModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[48px] w-full max-w-sm p-10 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-10 text-slate-900">Nuovo Elemento</h2>
            <div class="flex flex-col gap-4">
                <button onclick="selectNewField()" class="flex items-center justify-between bg-green-50 text-green-700 p-8 rounded-[32px] border-2 border-green-100 active:scale-95 transition-all">
                    <div class="flex items-center gap-5 text-left">
                        <div class="bg-green-600 p-3 rounded-2xl text-white shadow-lg"><i data-lucide="plus"></i></div>
                        <span class="font-black text-xl leading-tight text-slate-800">Crea<br>Isolamento</span>
                    </div>
                    <i data-lucide="chevron-right"></i>
                </button>
                <button onclick="selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-8 rounded-[32px] border-2 border-blue-100 active:scale-95 transition-all">
                    <div class="flex items-center gap-5 text-left">
                        <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg"><i data-lucide="clipboard-check"></i></div>
                        <span class="font-black text-xl leading-tight text-slate-800">Aggiungi<br>Nota</span>
                    </div>
                    <i data-lucide="chevron-right"></i>
                </button>
                <button onclick="closeActionChoiceModal()" class="mt-8 text-slate-400 font-black uppercase text-xs tracking-[0.3em]">Chiudi</button>
            </div>
        </div>
    </div>

    <div id="notification" class="fixed top-24 left-1/2 -translate-x-1/2 z-[9000] opacity-0 transition-all duration-500 bg-slate-900 text-white px-10 py-4 rounded-full shadow-2xl text-xs font-black pointer-events-none text-center">
        <span id="notifText">Sincronizzazione...</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE", authDomain: "isolamenti-923d0.firebaseapp.com", projectId: "isolamenti-923d0", storageBucket: "isolamenti-923d0.firebasestorage.app", messagingSenderId: "907661900494", appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f" };
        const appId = 'isolamenti-923d0';

        let db, auth, map, userMarker, watchId = null, fields = []; 
        let isTracking = false, isFollowing = true, currentProjectName = null, isLocalMode = false, mapReady = false;
        let isSaving = false, isInitialized = false, mapRotationEnabled = false;
        let tempFieldCoords = null, tempCheckpointCoords = null, isExpanded = false;

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        // --- AUTH ---
        window.handleLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const name = document.getElementById('projectInput').value.trim().toLowerCase();
            const pass = document.getElementById('passwordInput').value.trim();
            if (!name || !pass) return showNotification("Dati mancanti");
            
            btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
            
            try {
                await signInAnonymously(auth);
                const nameSafe = name.replace(/[^a-z0-9_]/g, '');
                currentProjectName = nameSafe;
                localStorage.setItem('isolamenti_last_session', JSON.stringify({ name: nameSafe, pass }));
                isInitialized = true; enterApp();
            } catch (err) { 
                showNotification("Errore di rete. Uso locale."); 
                handleLocalMode();
            }
        };

        window.handleLocalMode = () => { 
            currentProjectName = "locale"; 
            isLocalMode = true; 
            isInitialized = true; 
            enterApp(); 
        };

        function enterApp() {
            document.getElementById('displayProjName').innerText = "TEAM: " + currentProjectName.toUpperCase();
            document.getElementById('loginOverlay').style.display = 'none';
            if (mapReady) { 
                loadLocalCache(); 
                if (!isLocalMode) startSync(); 
                setTimeout(() => toggleTracking(), 1000); 
            }
        }

        // --- LOGICA DI SINCRONIZZAZIONE STABILE v2.8.4 ---
        function loadLocalCache() { 
            const raw = localStorage.getItem('isolamenti_db_' + currentProjectName); 
            if (raw) { 
                try { 
                    const data = JSON.parse(raw);
                    // Il caricamento iniziale dalla cache ha sempre la priorità
                    mergeData(data, true); 
                } catch(e) { console.error("Errore cache"); } 
            }
            updateStorageInfo();
        }

        function startSync() {
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName);
            onSnapshot(col, (snap) => {
                if (isSaving || snap.metadata.hasPendingWrites) return;
                const cloudData = snap.docs.map(d => d.data());
                if (cloudData.length > 0) {
                    // Integrazione intelligente dei dati Cloud senza cancellare il locale più recente
                    mergeData(cloudData, false); 
                    document.getElementById('syncIcon').classList.replace('text-slate-300', 'text-green-500');
                    document.getElementById('lastSyncTime').innerText = "SINCRONIZZATO";
                }
            }, (err) => {
                document.getElementById('syncIcon').classList.replace('text-green-500', 'text-orange-500');
                document.getElementById('forceSyncBtn').classList.remove('hidden');
            });
        }

        function mergeData(newData, isInitialLoad) {
            if (!mapReady || !Array.isArray(newData)) return;
            
            const localMap = new Map(fields.map(f => [f.id.toString(), f]));

            newData.forEach(cloudField => {
                const id = cloudField.id.toString();
                const existing = localMap.get(id);

                if (!existing) {
                    localMap.set(id, cloudField);
                } else {
                    // PROTEZIONE DATI: Confronta i timestamp se presenti, altrimenti unisci
                    const cloudTS = cloudField.lastUpdated || 0;
                    const localTS = existing.lastUpdated || 0;

                    if (cloudTS >= localTS || isInitialLoad) {
                        // Unione intelligente per non perdere i percorsi locali
                        const merged = { ...cloudField };
                        const p1 = (typeof existing.pathCoords === 'string' ? JSON.parse(existing.pathCoords) : existing.pathCoords) || [];
                        const p2 = (typeof cloudField.pathCoords === 'string' ? JSON.parse(cloudField.pathCoords) : cloudField.pathCoords) || [];
                        merged.pathCoords = p1.length > p2.length ? p1 : p2;
                        localMap.set(id, merged);
                    }
                }
            });

            // Refresh Mappa
            fields.forEach(f => {
                if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline);
                if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
            });

            fields = Array.from(localMap.values()).map(f => {
                if (typeof f.pathCoords === 'string') { try { f.pathCoords = JSON.parse(f.pathCoords); } catch(e) { f.pathCoords = []; } }
                renderFieldOnMap(f); return f;
            });
            
            window.updateFieldUI();
            saveToLocalStorage();
        }

        function saveToLocalStorage() {
            const clean = fields.map(f => {
                const c = {...f}; delete c.marker; delete c.circle; delete c.polyline; 
                if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; });
                return c;
            });
            localStorage.setItem('isolamenti_db_' + currentProjectName, JSON.stringify(clean));
            updateStorageInfo();
        }

        async function saveFieldToCloud(field) {
            field.lastUpdated = Date.now();
            saveToLocalStorage();
            if (isLocalMode || !isInitialized) return;
            isSaving = true;
            try {
                const prepared = {
                    id: field.id.toString(), name: field.name,
                    latlng: field.latlng, radius: field.radius || 500,
                    pathCoords: JSON.stringify(field.pathCoords || []),
                    checkpoints: (field.checkpoints || []).map(cp => ({ id: cp.id, latlng: cp.latlng, note: cp.note, checked: !!cp.checked })),
                    lastUpdated: field.lastUpdated
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, prepared.id), prepared);
                document.getElementById('forceSyncBtn').classList.add('hidden');
            } catch(e) { 
                document.getElementById('forceSyncBtn').classList.remove('hidden');
            } finally { setTimeout(() => isSaving = false, 500); }
        }

        // --- GPS E TRACCIAMENTO ---
        window.toggleTracking = () => {
            if (isTracking) { 
                navigator.geolocation.clearWatch(watchId); 
                isTracking = false; 
                document.getElementById('trackIcon').setAttribute('data-lucide', 'play');
                document.getElementById('trackLabel').innerText = 'AVVIA GPS';
                document.getElementById('trackBtn').classList.replace('bg-red-600', 'bg-slate-900');
                lucide.createIcons();
                return; 
            }
            
            watchId = navigator.geolocation.watchPosition((pos) => {
                const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
                document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                
                if (!isTracking) { 
                    isTracking = true; 
                    document.getElementById('trackIcon').setAttribute('data-lucide', 'square');
                    document.getElementById('trackLabel').innerText = 'STOP GPS';
                    document.getElementById('trackBtn').classList.replace('bg-slate-900', 'bg-red-600');
                    lucide.createIcons();
                }
                
                if (!userMarker) { 
                    userMarker = L.marker(ll, { 
                        icon: L.divIcon({ 
                            className: 'gps-arrow-container', 
                            html: `<div class="gps-arrow-icon" style="transform: rotate(${pos.coords.heading || 0}deg)"><svg viewBox="0 0 24 24" width="48" height="48"><circle cx="12" cy="12" r="8" fill="rgba(37, 99, 235, 0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` 
                        }) 
                    }).addTo(map); 
                } else { userMarker.setLatLng(ll); }
                
                if(isFollowing) map.panTo(ll);
                
                // Tracciamento semplificato: registra sempre nel campo più vicino
                updateTrajectory(ll);
            }, null, { enableHighAccuracy: true });
        };

        function updateTrajectory(up) {
            let activeField = null;
            let minDist = Infinity;
            fields.forEach(f => {
                const d = up.distanceTo(L.latLng(f.latlng));
                if(d < minDist) { minDist = d; activeField = f; }
            });

            if (activeField) {
                activeField.pathCoords = activeField.pathCoords || [];
                const last = activeField.pathCoords[activeField.pathCoords.length - 1];
                if (!last || up.distanceTo(L.latLng(last[0], last[1])) > 4) {
                    activeField.pathCoords.push([up.lat, up.lng]);
                    if (activeField.polyline) activeField.polyline.setLatLngs(activeField.pathCoords);
                    saveFieldToCloud(activeField);
                }
            }
        }

        function renderFieldOnMap(f) {
            if (f.latlng[0] !== 0) {
                f.marker = L.marker(f.latlng, { icon: L.divIcon({ html: `<div style="background:#f97316;border-radius:50%;width:30px;height:30px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.2);"><i data-lucide="map-pin" style="width:14px;height:14px;"></i></div>`, className: 'f-icon', iconSize:[30,30] }) }).addTo(map);
                f.circle = L.circle(f.latlng, { radius: f.radius, color: '#f97316', fillOpacity: 0.05, weight: 2, dashArray: '5,10' }).addTo(map);
                f.polyline = L.polyline(f.pathCoords || [], { color: '#334155', weight: 5, opacity: 0.6 }).addTo(map);
                f.marker.on('click', () => { map.flyTo(f.latlng, 17); togglePanel(); });
            }
            if (f.checkpoints) f.checkpoints.forEach(cp => renderCheckpointOnMap(cp));
            lucide.createIcons();
        }

        function renderCheckpointOnMap(cp) {
            const cross = cp.checked ? '<path d="M7 10 L17 20 M17 10 L7 20" stroke="black" stroke-width="4" opacity="0.8" />' : '';
            cp.marker = L.marker(cp.latlng, { 
                icon: L.divIcon({ 
                    html: `<div class="cp-icon-wrapper"><svg viewBox="0 0 24 24" width="38" height="38" style="filter:drop-shadow(0 3px 5px rgba(0,0,0,0.3))"><path d="M12 2 L22 21 L2 21 Z" fill="#ef4444" stroke="#fff" stroke-width="2"/>${cross}</svg></div>`, 
                    className: 'cp-marker', iconSize:[38,38], iconAnchor:[19,34] 
                }) 
            }).addTo(map);
            cp.marker.on('click', (ev) => { 
                L.DomEvent.stopPropagation(ev);
                tempCheckpointCoords = { checkpointId: cp.id, fieldId: 'field_gen' }; 
                document.getElementById('checkpointNoteInput').value = cp.note || ""; 
                document.getElementById('checkpointCheckedInput').checked = !!cp.checked; 
                document.getElementById('checkpointModal').classList.remove('hidden'); 
            });
        }

        // --- INTERFACCIA ---
        window.confirmAddCheckpoint = async () => {
            const note = document.getElementById('checkpointNoteInput').value.trim();
            const checked = document.getElementById('checkpointCheckedInput').checked;
            let field = fields.find(f => f.id === 'field_gen');
            if(!field) { field = { id: 'field_gen', name: 'NOTE GENERALI', latlng: [0,0], radius: 0, pathCoords: [], checkpoints: [] }; fields.push(field); }
            
            if(tempCheckpointCoords.checkpointId) {
                const cp = field.checkpoints.find(c => c.id === tempCheckpointCoords.checkpointId);
                cp.note = note; cp.checked = checked;
            } else {
                field.checkpoints.push({ id: Date.now(), latlng: [tempCheckpointCoords.lat, tempCheckpointCoords.lng], note, checked });
            }
            
            field.checkpoints.forEach(c => { if(c.marker) map.removeLayer(c.marker); });
            field.checkpoints.forEach(c => renderCheckpointOnMap(c));
            await saveFieldToCloud(field);
            closeCheckpointModal();
            showNotification("Nota Salvata");
        };

        window.updateFieldUI = () => {
            const container = document.getElementById('fieldsSection'); 
            container.innerHTML = "";
            const valid = fields.filter(f => f.id !== 'field_gen');
            document.getElementById('fieldCount').innerText = valid.length + " Campi In Database";
            valid.forEach(f => {
                const div = document.createElement('div');
                div.className = "p-5 bg-slate-50 border-2 border-transparent rounded-[28px] flex justify-between items-center active:border-blue-200 transition-all";
                div.onclick = () => { map.flyTo(f.latlng, 17); togglePanel(); };
                div.innerHTML = `<div class="flex items-center gap-4"><div class="bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="navigation-2" class="w-5 h-5 text-orange-500"></i></div><div><div class="text-xs font-black uppercase text-slate-800">${f.name}</div><div class="text-[9px] font-bold text-slate-400">AGGIORNATO: ${new Date(f.lastUpdated || 0).toLocaleTimeString()}</div></div></div><i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        };

        // --- UTILITY ---
        window.togglePanel = () => { isExpanded = !isExpanded; document.getElementById('statusPanel').classList.toggle('expanded', isExpanded); document.getElementById('panelContent').classList.toggle('opacity-0', !isExpanded); document.getElementById('panelChevron').style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0)'; };
        window.recenterOnUser = () => { isFollowing = true; if(userMarker) map.flyTo(userMarker.getLatLng(), 17); };
        window.manualSync = () => { showNotification("Forzo sincronizzazione..."); fields.forEach(f => saveFieldToCloud(f)); };
        window.selectNewField = () => { const f = { id: Date.now(), name: "CAMPO " + (fields.length), latlng: [tempFieldCoords.lat, tempFieldCoords.lng], radius: 300, pathCoords: [], checkpoints: [], lastUpdated: Date.now() }; fields.push(f); renderFieldOnMap(f); saveFieldToCloud(f); closeActionChoiceModal(); };
        window.selectNewCheckpoint = () => { tempCheckpointCoords = tempFieldCoords; document.getElementById('checkpointModal').classList.remove('hidden'); closeActionChoiceModal(); };
        window.exportBackupJSON = () => { const data = localStorage.getItem('isolamenti_db_' + currentProjectName); const blob = new Blob([data], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Backup_${currentProjectName}.json`; a.click(); };
        
        window.importBackupJSON = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    mergeData(data, true);
                    showNotification("Importazione completata!");
                } catch(err) { showNotification("File non valido"); }
            };
            reader.readAsDataURL(file);
        };

        window.handleSearch = async () => {
            const q = document.getElementById('searchInput').value.trim();
            if(!q) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
                const data = await res.json();
                if(data.length) map.flyTo([data[0].lat, data[0].lon], 16);
            } catch(e) { showNotification("Ricerca fallita"); }
        };

        function updateStorageInfo() { const size = (JSON.stringify(localStorage).length / 1024).toFixed(1); document.getElementById('storageSize').innerText = size; }
        function showNotification(t) { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = t; el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000); }
        window.logoutProject = () => { if(confirm("Vuoi uscire? I dati rimarranno su questo dispositivo.")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        window.closeCheckpointModal = () => document.getElementById('checkpointModal').classList.add('hidden');
        window.closeActionChoiceModal = () => document.getElementById('actionChoiceModal').classList.add('hidden');

        window.onload = () => { 
            map = L.map('map', { zoomControl: false, tap: false }).setView([44.5, 11.5], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            map.on('click', (e) => { tempFieldCoords = e.latlng; document.getElementById('actionChoiceModal').classList.remove('hidden'); lucide.createIcons(); });
            map.on('dragstart', () => { isFollowing = false; });
            mapReady = true; 
            const s = localStorage.getItem('isolamenti_last_session');
            if(s) { const d = JSON.parse(s); document.getElementById('projectInput').value = d.name; document.getElementById('passwordInput').value = d.pass; handleLogin(); }
            lucide.createIcons();
        };
    </script>
</body>
</html>
