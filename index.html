    <style>
        #map-container { height: calc(100vh - 60px); width: 100%; position: relative; background: #e2e8f0; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        #statusPanel { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 6000; 
            max-height: 85vh; 
            transform: translateY(calc(100% - 75px));

        #statusPanel.expanded { transform: translateY(0) !important; }
        
        .drag-handle { width: 40px; height: 4px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 8px auto; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .cp-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px !important;
            height: 44px !important;
        }

        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE", authDomain: "isolamenti-923d0.firebaseapp.com", projectId: "isolamenti-923d0", storageBucket: "isolamenti-923d0.firebasestorage.app", messagingSenderId: "907661900494", appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f" };
        const appId = 'isolamenti-923d0';

        const categoryColors = {
            cipolle: '#f97316',
            bunching: '#22c55e',
            brassiche: '#a855f7',
            cavoli: '#3b82f6',
            cicoria: '#059669',
            altro: '#64748b'
        };

        let db, auth, map, userMarker, watchId = null, fields = []; 
        let isTracking = false, isFollowing = true, currentProjectName = null, isLocalMode = false, mapReady = false;
        let isSaving = false, isInitialized = false, mapRotationEnabled = false;
        let tempFieldCoords = null, tempCheckpointCoords = null, isExpanded = false, tempFieldId = null;
        let isAdmin = false;

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        // --- AUTH ---
        window.handleLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const name = document.getElementById('projectInput').value.trim().toLowerCase();
            const pass = document.getElementById('passwordInput').value.trim();
            if (!name || !pass) return showNotification("Inserisci ID e Password");
            
            btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
            
            try {
                await signInAnonymously(auth);
                const nameSafe = name.replace(/[^a-z0-9_]/g, '');
                currentProjectName = nameSafe;
                
                // Funzione Admin: se la password è "ADMIN" attiva i privilegi
                if (pass.toUpperCase() === 'ADMIN') {
                    isAdmin = true;
                    document.getElementById('adminTools').classList.remove('hidden');
                    document.getElementById('displayProjName').classList.replace('text-blue-600', 'text-red-600');
                }

                localStorage.setItem('isolamenti_last_session', JSON.stringify({ name: nameSafe, pass }));
                isInitialized = true; enterApp();
            } catch (err) { 
                showNotification("Errore di rete. Uso locale."); 
                handleLocalMode();
            }
        };

        window.handleLocalMode = () => { currentProjectName = "locale"; isLocalMode = true; isInitialized = true; enterApp(); };

        function enterApp() {
            document.getElementById('displayProjName').innerText = (isAdmin ? "ADMIN: " : "") + currentProjectName.toUpperCase();
            document.getElementById('loginOverlay').style.display = 'none';
            if (mapReady) { 
                loadLocalCache(); 
                if (!isLocalMode) startSync(); 
                setTimeout(() => toggleTracking(), 1000); 
            }
        }

        // --- SYNC ---
        function loadLocalCache() { 
            const raw = localStorage.getItem('isolamenti_db_' + currentProjectName); 
            if (raw) { try { mergeData(JSON.parse(raw), true); } catch(e) {} }
            updateStorageInfo();
        }

        function startSync() {
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName);
            onSnapshot(col, (snap) => {
                if (isSaving || snap.metadata.hasPendingWrites) return;
                const cloudData = snap.docs.map(d => d.data());
                if (cloudData.length > 0) {
                    mergeData(cloudData, false); 
                    document.getElementById('syncIcon').classList.replace('text-slate-300', 'text-green-500');
                    document.getElementById('lastSyncTime').innerText = "LIVE";
                }
            }, (err) => {
                document.getElementById('syncIcon').classList.replace('text-green-500', 'text-orange-500');
            });
        }

        function mergeData(newData, isInitialLoad) {
            if (!mapReady || !Array.isArray(newData)) return;
            const localMap = new Map(fields.map(f => [f.id.toString(), f]));
            newData.forEach(cloudField => {
                const id = cloudField.id.toString();
                const existing = localMap.get(id);
                if (!existing) {
                    localMap.set(id, cloudField);
                } else {
                    const cloudTS = cloudField.lastUpdated || 0;
                    const localTS = existing.lastUpdated || 0;
                    if (cloudTS >= localTS || isInitialLoad) {
                        const merged = { ...cloudField };
                        const p1 = (typeof existing.pathCoords === 'string' ? JSON.parse(existing.pathCoords) : existing.pathCoords) || [];
                        const p2 = (typeof cloudField.pathCoords === 'string' ? JSON.parse(cloudField.pathCoords) : cloudField.pathCoords) || [];
                        merged.pathCoords = p1.length > p2.length ? p1 : p2;
                        localMap.set(id, merged);
                    }
                }
            });
            fields.forEach(f => {
                if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline);
                if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
            });
            fields = Array.from(localMap.values()).map(f => {
                if (typeof f.pathCoords === 'string') { try { f.pathCoords = JSON.parse(f.pathCoords); } catch(e) { f.pathCoords = []; } }
                renderFieldOnMap(f); return f;
            });
            window.updateFieldUI();
            saveToLocalStorage();
        }

        function saveToLocalStorage() {
            const clean = fields.map(f => {
                const c = {...f}; delete c.marker; delete c.circle; delete c.polyline; 
                if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; });
                return c;
            });
            localStorage.setItem('isolamenti_db_' + currentProjectName, JSON.stringify(clean));
            updateStorageInfo();
        }

        async function saveFieldToCloud(field) {
            field.lastUpdated = Date.now();
            saveToLocalStorage();
            if (isLocalMode || !isInitialized) return;
            isSaving = true;
            try {
                const prepared = {
                    id: field.id.toString(), name: field.name, code: field.code || "---", category: field.category || "altro",
                    latlng: field.latlng, radius: field.radius || 300,
                    pathCoords: JSON.stringify(field.pathCoords || []),
                    checkpoints: (field.checkpoints || []).map(cp => ({ id: cp.id, latlng: cp.latlng, note: cp.note, checked: !!cp.checked, customNumber: cp.customNumber })),
                    lastUpdated: field.lastUpdated
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, prepared.id), prepared);
                document.getElementById('forceSyncBtn').classList.add('hidden');
            } catch(e) { 
                document.getElementById('forceSyncBtn').classList.remove('hidden');
            } finally { setTimeout(() => isSaving = false, 500); }
        }

        // --- GPS ---
        window.toggleTracking = () => {
            if (isTracking) { 
                navigator.geolocation.clearWatch(watchId); 
                isTracking = false; 
                document.getElementById('trackIcon').setAttribute('data-lucide', 'play');
                document.getElementById('trackLabel').innerText = 'AVVIA GPS';
                document.getElementById('trackBtn').classList.replace('bg-red-600', 'bg-slate-900');
                lucide.createIcons();
                return; 
            }
            watchId = navigator.geolocation.watchPosition((pos) => {
                const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
                document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                if (!isTracking) { 
                    isTracking = true; 
                    document.getElementById('trackIcon').setAttribute('data-lucide', 'square');
                    document.getElementById('trackLabel').innerText = 'STOP GPS';
                    document.getElementById('trackBtn').classList.replace('bg-slate-900', 'bg-red-600');
                    lucide.createIcons();
                }
                if (!userMarker) { 
                    userMarker = L.marker(ll, { 
                        icon: L.divIcon({ 
                            className: 'gps-arrow-container', 
                            html: `<div class="gps-arrow-icon" style="transform: rotate(${pos.coords.heading || 0}deg)"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37, 99, 235, 0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` 
                        }) 
                    }).addTo(map); 
                } else { userMarker.setLatLng(ll); }
                if(isFollowing) map.panTo(ll);
                updateTrajectory(ll);
            }, null, { enableHighAccuracy: true });
        };

        function updateTrajectory(up) {
            fields.forEach(f => {
                if (f.id === 'field_gen') return;
                const dist = up.distanceTo(L.latLng(f.latlng));
                if (dist <= f.radius) {
                    f.pathCoords = f.pathCoords || [];
                    const last = f.pathCoords[f.pathCoords.length - 1];
                    if (!last || up.distanceTo(L.latLng(last[0], last[1])) > 5) {
                        f.pathCoords.push([up.lat, up.lng]);
                        if (activeFieldPolyline(f)) f.polyline.setLatLngs(f.pathCoords);
                        saveFieldToCloud(f);
                    }
                }
            });
        }

        function activeFieldPolyline(f) {
            if (!f.polyline) {
                f.polyline = L.polyline(f.pathCoords, { color: '#334155', weight: 4, opacity: 0.6 }).addTo(map);
            }
            return true;
        }

        // --- RENDERING MAPPA ---
        function renderFieldOnMap(f) {
            if (f.latlng[0] !== 0) {
                const color = categoryColors[f.category] || '#64748b';
                f.marker = L.marker(f.latlng, { icon: L.divIcon({ html: `<div style="background:${color};border-radius:50%;width:30px;height:30px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.2);"><i data-lucide="sprout" style="width:16px;height:16px;"></i></div>`, className: 'f-icon', iconSize:[30,30] }) }).addTo(map);
                
                f.marker.bindPopup(`
                    <div class="p-1 min-w-[140px]">
                        <h3 class="font-black text-slate-800 text-[11px] uppercase mb-1">${f.name}</h3>
                        <p class="text-[9px] text-slate-500 font-bold mb-2">COD: ${f.code} | RAD: ${f.radius}m</p>
                        <div class="flex gap-1.5">
                            <button onclick="window.openNavigation(${f.latlng[0]}, ${f.latlng[1]})" class="flex-1 bg-blue-600 text-white p-1.5 rounded-lg text-[9px] font-black uppercase flex items-center justify-center gap-1 shadow-md active:scale-95 transition-all">
                                <i data-lucide="navigation" style="width:10px;height:10px;"></i> Vai
                            </button>
                            <button onclick="window.editField('${f.id}')" class="bg-slate-100 text-slate-600 p-1.5 rounded-lg active:scale-95 transition-all">
                                <i data-lucide="pencil" style="width:12px;height:12px;"></i>
                            </button>
                            <button onclick="window.deleteField('${f.id}')" class="bg-red-50 text-red-600 p-1.5 rounded-lg active:scale-95 transition-all">
                                <i data-lucide="trash-2" style="width:12px;height:12px;"></i>
                            </button>
                        </div>
                    </div>
                `, { className: 'custom-popup' });

                f.circle = L.circle(f.latlng, { radius: f.radius, color: color, fillOpacity: 0.05, weight: 1.5, dashArray: '5,8' }).addTo(map);
                f.polyline = L.polyline(f.pathCoords || [], { color: '#334155', weight: 4, opacity: 0.6 }).addTo(map);
            }
            if (f.checkpoints) f.checkpoints.forEach((cp, i) => renderCheckpointOnMap(cp, i));
            lucide.createIcons();
        }

        function renderCheckpointOnMap(cp, index) {
            const label = cp.customNumber || (index + 1);
            const cross = cp.checked ? '<path d="M7 10 L17 20 M17 10 L7 20" stroke="black" stroke-width="3" opacity="0.7" />' : '';
            cp.marker = L.marker(cp.latlng, { 
                icon: L.divIcon({ 
                    html: `<div class="cp-icon-wrapper"><svg viewBox="0 0 24 24" width="36" height="36" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))">
                               <path d="M12 2 L22 21 L2 21 Z" fill="#ef4444" stroke="#fff" stroke-width="2"/>
                               ${cross}
                               <text x="12" y="18" font-size="8" font-weight="900" fill="white" text-anchor="middle">${label}</text>
                           </svg></div>`, 
                    className: 'cp-marker', iconSize:[40,40], iconAnchor:[20,34] 
                }) 
            }).addTo(map);
            cp.marker.on('click', (ev) => { 
                L.DomEvent.stopPropagation(ev);
                tempCheckpointCoords = { checkpointId: cp.id, fieldId: 'field_gen', cpRef: cp }; 
                document.getElementById('checkpointNumberInput').value = cp.customNumber || "";
                document.getElementById('checkpointNoteInput').value = cp.note || ""; 
                document.getElementById('checkpointCheckedInput').checked = !!cp.checked; 
                document.getElementById('deleteCPBtn').classList.remove('hidden');
                document.getElementById('checkpointModal').classList.remove('hidden'); 
            });
        }

        // --- ADMIN FUNCTIONS ---
        window.clearAllData = async () => {
            if (!isAdmin) return;
            if (!confirm("ATTENZIONE: Questa azione svuoterà COMPLETAMENTE il database di questo progetto. Continuare?")) return;
            if (!confirm("CONFERMA FINALE: Sei assolutamente sicuro? Tutti gli isolamenti e i percorsi verranno persi.")) return;

            showNotification("Svuotamento in corso...");
            
            try {
                // Rimuovi tutto da Firestore
                for (const field of fields) {
                    if (!isLocalMode) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, field.id.toString()));
                    }
                    if (field.marker) map.removeLayer(field.marker);
                    if (field.circle) map.removeLayer(field.circle);
                    if (field.polyline) map.removeLayer(field.polyline);
                    if (field.checkpoints) field.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
                }
                
                fields = [];
                saveToLocalStorage();
                window.updateFieldUI();
                showNotification("Database Svuotato");
            } catch (err) {
                showNotification("Errore durante lo svuotamento");
            }
        };

        // --- NAVIGAZIONE ---
        window.openNavigation = (lat, lng) => {
            const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
            window.open(url, '_blank');
        };

        // --- INTERFACCIA ---
        window.editField = (id) => {
            const f = fields.find(field => field.id == id);
            if (!f) return;
            tempFieldId = id;
            document.getElementById('fieldModalTitle').innerText = "Modifica Isolamento";
            document.getElementById('fieldNameInput').value = f.name;
            document.getElementById('fieldCodeInput').value = f.code;
            document.getElementById('fieldCategoryInput').value = f.category;
            document.getElementById('fieldRadiusInput').value = f.radius;
            document.getElementById('fieldModal').classList.remove('hidden');
            map.closePopup();
        };

        window.confirmAddField = async () => {
            const name = document.getElementById('fieldNameInput').value.trim() || "Area";
            const code = document.getElementById('fieldCodeInput').value.trim() || "---";
            const cat = document.getElementById('fieldCategoryInput').value;
            const rad = parseInt(document.getElementById('fieldRadiusInput').value) || 300;

            if (tempFieldId) {
                const f = fields.find(field => field.id == tempFieldId);
                if (f) {
                    f.name = name; f.code = code; f.category = cat; f.radius = rad;
                    if (f.marker) map.removeLayer(f.marker);
                    if (f.circle) map.removeLayer(f.circle);
                    if (f.polyline) map.removeLayer(f.polyline);
                    renderFieldOnMap(f);
                    await saveFieldToCloud(f);
                    showNotification("Modificato");
                }
            } else {
                if(!tempFieldCoords) return showNotification("Tocca la mappa prima!");
                const f = { id: Date.now(), name, code, category: cat, latlng: [tempFieldCoords.lat, tempFieldCoords.lng], radius: rad, pathCoords: [], checkpoints: [], lastUpdated: Date.now() }; 
                fields.push(f); 
                renderFieldOnMap(f); 
                await saveFieldToCloud(f); 
                showNotification("Creato");
            }
            
            closeFieldModal();
            closeActionChoiceModal();
            tempFieldId = null;
        };

        window.updateFieldUI = () => {
            const container = document.getElementById('fieldsSection'); container.innerHTML = "";
            const valid = fields.filter(f => f.id !== 'field_gen');
            document.getElementById('fieldCount').innerText = valid.length + " Aree";
            const categories = ['cipolle', 'bunching', 'brassiche', 'cavoli', 'cicoria', 'altro'];
            categories.forEach(cat => {
                const catFields = valid.filter(f => f.category === cat);
                if (catFields.length > 0) {
                    const group = document.createElement('div');
                    group.className = "mb-4";
                    group.innerHTML = `<h3 class="text-[9px] font-black uppercase text-slate-400 mb-1.5 border-l-2 border-blue-500 pl-1.5 tracking-widest">${cat}</h3>`;
                    const list = document.createElement('div');
                    list.className = "space-y-1.5";
                    catFields.forEach(f => {
                        const div = document.createElement('div');
                        const color = categoryColors[f.category] || '#64748b';
                        div.className = "p-3 bg-slate-50 border border-transparent rounded-xl flex justify-between items-center active:border-blue-200 transition-all shadow-sm";
                        div.onclick = () => { map.flyTo(f.latlng, 17); togglePanel(); };
                        div.innerHTML = `
                            <div class="flex items-center gap-2.5">
                                <div class="bg-white p-1.5 rounded-lg shadow-sm" style="color:${color}"><i data-lucide="sprout" class="w-4 h-4"></i></div>
                                <div class="text-[11px] font-black uppercase text-slate-800 tracking-tight">${f.name} <span class="text-slate-400 font-normal">(${f.code})</span></div>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <button onclick="event.stopPropagation(); window.editField('${f.id}')" class="p-2 text-blue-600 bg-white rounded-lg active:bg-blue-50 transition-all">
                                    <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                                </button>
                                <button onclick="event.stopPropagation(); window.deleteField('${f.id}')" class="p-2 text-red-500 bg-white rounded-lg active:bg-red-50 transition-all">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>`;
                        list.appendChild(div);
                    });
                    group.appendChild(list);
                    container.appendChild(group);
                }
            });
            lucide.createIcons();
        };

        window.deleteField = async (id) => {
            if (!confirm("Eliminare definitivamente?")) return;
            const idx = fields.findIndex(f => f.id == id);
            if (idx !== -1) {
                const f = fields[idx];
                if (f.marker) map.removeLayer(f.marker);
                if (f.circle) map.removeLayer(f.circle);
                if (f.polyline) map.removeLayer(f.polyline);
                if (f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
                if (!isLocalMode) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName, id.toString()));
                fields.splice(idx, 1);
                saveToLocalStorage(); window.updateFieldUI(); showNotification("Eliminato");
            }
        };

        window.confirmAddCheckpoint = async () => {
            const note = document.getElementById('checkpointNoteInput').value.trim();
            const checked = document.getElementById('checkpointCheckedInput').checked;
            const customNum = document.getElementById('checkpointNumberInput').value;
            let field = fields.find(f => f.id === 'field_gen');
            if(!field) { field = { id: 'field_gen', name: 'NOTE GENERALI', latlng: [0,0], radius: 0, pathCoords: [], checkpoints: [] }; fields.push(field); }
            if(tempCheckpointCoords.checkpointId) {
                const cp = field.checkpoints.find(c => c.id === tempCheckpointCoords.checkpointId);
                cp.note = note; cp.checked = checked; cp.customNumber = customNum;
            } else {
                field.checkpoints.push({ id: Date.now(), latlng: [tempCheckpointCoords.lat, tempCheckpointCoords.lng], note, checked, customNumber: customNum });
            }
            field.checkpoints.forEach(c => { if(c.marker) map.removeLayer(c.marker); });
            field.checkpoints.forEach((c, i) => renderCheckpointOnMap(c, i));
            await saveFieldToCloud(field);
            closeCheckpointModal();
            showNotification("Nota Salvata");
        };

        window.deleteCheckpoint = async () => {
            if(!confirm("Eliminare nota?")) return;
            let field = fields.find(f => f.id === 'field_gen');
            const idx = field.checkpoints.findIndex(c => c.id === tempCheckpointCoords.checkpointId);
            if(idx !== -1) {
                map.removeLayer(field.checkpoints[idx].marker);
                field.checkpoints.splice(idx, 1);
                await saveFieldToCloud(field);
                closeCheckpointModal();
                showNotification("Nota eliminata");
            }
        };

        // --- UTILITY ---
        window.togglePanel = () => { isExpanded = !isExpanded; document.getElementById('statusPanel').classList.toggle('expanded', isExpanded); document.getElementById('panelContent').classList.toggle('opacity-0', !isExpanded); document.getElementById('panelChevron').style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0)'; };
        window.recenterOnUser = () => { isFollowing = true; if(userMarker) map.flyTo(userMarker.getLatLng(), 17); };
        window.openSearchModal = () => document.getElementById('searchModal').classList.remove('hidden');
        window.closeSearchModal = () => document.getElementById('searchModal').classList.add('hidden');
        window.executeManualSearch = () => { handleSearch(document.getElementById('manualSearchInput').value); closeSearchModal(); };
        window.selectNewFieldAction = () => { 
            tempFieldId = null; 
            closeActionChoiceModal();
            document.getElementById('fieldModalTitle').innerText = "Dettagli Isolamento";
            document.getElementById('fieldNameInput').value = "";
            document.getElementById('fieldCodeInput').value = "";
            document.getElementById('fieldRadiusInput').value = "300";
            document.getElementById('fieldModal').classList.remove('hidden'); 
        };
        window.closeFieldModal = () => document.getElementById('fieldModal').classList.add('hidden');
        window.selectNewCheckpoint = () => { 
            tempCheckpointCoords = tempFieldCoords; 
            document.getElementById('checkpointNumberInput').value = ""; 
            document.getElementById('checkpointNoteInput').value = ""; 
            document.getElementById('deleteCPBtn').classList.add('hidden'); 
            closeActionChoiceModal();
            document.getElementById('checkpointModal').classList.remove('hidden'); 
        };
        window.exportBackupJSON = () => { 
            const data = localStorage.getItem('isolamenti_db_' + currentProjectName); 
            if (!data) return showNotification("Nessun dato da salvare");
            const blob = new Blob([data], {type: 'application/json'}); 
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(blob); 
            a.download = `Backup_${currentProjectName}.json`; 
            a.click(); 
        };
        window.importBackupJSON = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    mergeData(data, true);
                    showNotification("Importazione completata!");
                } catch(err) { showNotification("Errore nel file JSON"); }
            };
            reader.readAsText(file);
        };
        window.handleSearch = async (val) => {
            const q = val || document.getElementById('searchInput').value.trim();
            if(!q) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
                const data = await res.json();
                if(data.length) map.flyTo([data[0].lat, data[0].lon], 16);
            } catch(e) { showNotification("Ricerca fallita"); }
        };
        function updateStorageInfo() { const size = (JSON.stringify(localStorage).length / 1024).toFixed(1); document.getElementById('storageSize').innerText = size; }
        function showNotification(t) { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = t; el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000); }
        window.logoutProject = () => { if(confirm("Vuoi uscire?")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        window.closeCheckpointModal = () => document.getElementById('checkpointModal').classList.add('hidden');
        window.closeActionChoiceModal = () => document.getElementById('actionChoiceModal').classList.add('hidden');

        window.onload = () => { 
            map = L.map('map', { zoomControl: false, tap: false }).setView([44.5, 11.5], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            map.on('click', (e) => { 
                tempFieldCoords = e.latlng; 
                document.getElementById('actionChoiceModal').classList.remove('hidden'); 
                lucide.createIcons(); 
            });
            map.on('dragstart', () => { isFollowing = false; });
            mapReady = true; 
            const s = localStorage.getItem('isolamenti_last_session');
            if(s) { const d = JSON.parse(s); document.getElementById('projectInput').value = d.name; document.getElementById('passwordInput').value = d.pass; handleLogin(); }
            lucide.createIcons();
        };
    </script>
</body>
</html>
