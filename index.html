<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isolamenti Agricoli - Foto & Traiettorie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        #map { height: calc(100vh - 80px); width: 100%; z-index: 1; background: #cbd5e1; }
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 12px; }
        .custom-popup .leaflet-popup-content { margin: 0; width: 220px !important; }
        
        .gps-arrow-container { display: flex !important; align-items: center; justify-content: center; width: 44px !important; height: 44px !important; pointer-events: none; }
        .gps-arrow-icon { 
            transition: transform 0.3s ease-out; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        #statusPanel { 
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
            touch-action: none; 
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1001;
            max-height: 85vh;
        }
        .drag-handle { width: 40px; height: 5px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 4px auto; }
        
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #16a34a; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .photo-preview { width: 100%; height: 120px; border-radius: 12px; object-fit: cover; background: #f1f5f9; border: 2px dashed #cbd5e1; }
        .list-thumb { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; border: 1px solid #e2e8f0; }

        .chevron-rotate { transition: transform 0.4s ease; }
        .is-expanded .chevron-rotate { transform: rotate(180deg); }

        #panelContent::-webkit-scrollbar { width: 4px; }
        #panelContent::-webkit-scrollbar-track { background: transparent; }
        #panelContent::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .saving-pulse { animation: pulse-blue 1.5s infinite; }
        @keyframes pulse-blue { 0% { color: #3b82f6; } 50% { color: #94a3b8; } 100% { color: #3b82f6; } }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- ACCESSO -->
    <div id="loginOverlay">
        <div class="bg-white p-6 sm:p-8 rounded-[32px] shadow-2xl w-full max-w-md space-y-6 my-auto border border-slate-100">
            <div class="text-center space-y-2">
                <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><i data-lucide="shield-check" class="text-blue-600 w-8 h-8"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Accesso Isolamenti</h1>
                <p class="text-slate-500 text-sm italic leading-tight" id="configInfo">Verifica sistema in corso...</p>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border border-slate-100">
                    <input type="text" id="projectInput" placeholder="ID Gruppo (Team)" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm">
                    <input type="password" id="passwordInput" placeholder="Password" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm">
                    <button id="loginBtn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-100 active:scale-95 transition-all">ACCEDI AL CLOUD</button>
                </div>
                <button onclick="handleLocalMode()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-sm shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2"><i data-lucide="smartphone" class="w-4 h-4"></i> MODALITÀ LOCALE</button>
            </div>
            <p id="loginError" class="text-red-500 text-[11px] text-center font-bold hidden px-4 bg-red-50 py-2 rounded-lg mt-4"></p>
        </div>
    </div>

    <header class="bg-white shadow-md p-4 sticky top-0 z-50 border-b border-slate-100 h-[80px]">
        <div class="max-w-6xl mx-auto flex items-center gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <div class="bg-green-600 p-2 rounded-lg"><i data-lucide="sprout" class="text-white w-5 h-5"></i></div>
                <div class="hidden sm:block">
                    <h1 class="text-lg font-bold text-slate-800 leading-none" id="displayProjName">Isolamenti</h1>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400" id="syncStatusLabel">Pronto</span>
                </div>
            </div>
            <div class="flex-1 flex gap-2">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="searchInput" placeholder="Cerca campo..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50 shadow-inner">
                </div>
                <button onclick="handleSearch()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-semibold active:scale-95 shadow-md">Trova</button>
            </div>
        </div>
    </header>

    <main class="relative h-[calc(100vh-80px)] overflow-hidden">
        <div id="map"></div>
        <div class="absolute top-4 left-4 z-[1000] flex flex-col gap-2">
            <button onclick="recenterOnUser()" class="bg-white p-3 rounded-xl shadow-lg text-slate-700 active:scale-90 border border-slate-100"><i data-lucide="locate-fixed" class="w-5 h-5"></i></button>
            <button onclick="openManualCoordModal()" class="bg-white p-3 rounded-xl shadow-lg text-slate-700 active:scale-90 border border-slate-100"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
        </div>
        <div id="telemetryPanel" class="absolute top-4 right-4 z-[1000] hidden">
            <div class="bg-white/90 backdrop-blur px-3 py-2 rounded-xl shadow-lg border border-slate-100 text-[10px] font-bold text-slate-600 flex items-center gap-2">
                <div class="flex flex-col"><span class="text-slate-400 uppercase tracking-tighter">GPS</span><span id="accuracyVal">--m</span></div>
                <div id="syncIndicator" class="text-slate-400 transition-colors"><i data-lucide="cloud" class="w-4 h-4"></i></div>
            </div>
        </div>

        <!-- PANNELLO INFERIORE -->
        <div id="statusPanel" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_-5px_rgba(0,0,0,0.15)] rounded-t-[32px] flex flex-col translate-y-[calc(100%-85px)] z-[1001]">
            <div id="dragArea" class="cursor-pointer p-5 pb-2 shrink-0 select-none">
                <div class="drag-handle mb-4"></div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Elenco Campi</span>
                        <i data-lucide="chevron-up" class="w-4 h-4 text-slate-300 chevron-rotate"></i>
                    </div>
                    <div id="statusIndicator" class="flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-600 transition-all">
                        <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
                        <span id="statusText">GPS Spento</span>
                    </div>
                </div>
            </div>

            <div id="panelContent" class="space-y-6 overflow-y-auto px-5 pb-10 opacity-40 touch-pan-y" style="height: 70vh;">
                <div class="flex flex-col gap-3">
                    <div class="flex gap-2">
                        <button id="trackBtn" onclick="toggleTracking()" class="flex-1 flex items-center justify-center gap-2 bg-slate-900 text-white py-3.5 rounded-xl font-bold active:scale-95 shadow-md"><i data-lucide="navigation" class="w-4 h-4"></i> Attiva GPS</button>
                        <button onclick="logoutProject()" class="bg-slate-100 text-slate-500 p-3.5 rounded-xl hover:bg-slate-200"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="triggerExcelImport()" class="w-full flex items-center justify-center gap-2 bg-green-50 text-green-700 py-3 rounded-xl font-black text-[10px] border border-green-200 active:scale-95 shadow-sm uppercase"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Importa Excel</button>
                        <button onclick="triggerBackupImport()" class="w-full flex items-center justify-center gap-2 bg-indigo-50 text-indigo-700 py-3 rounded-xl font-black text-[10px] border border-indigo-200 active:scale-95 shadow-sm uppercase"><i data-lucide="upload" class="w-4 h-4"></i> Importa Backup</button>
                    </div>
                    <button onclick="exportBackup()" class="w-full flex items-center justify-center gap-2 bg-blue-50 text-blue-700 py-3.5 rounded-xl font-black text-[10px] border border-blue-200 active:scale-95 shadow-sm uppercase mt-1"><i data-lucide="download" class="w-4 h-4"></i> Esporta Backup (JSON)</button>
                    
                    <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls, .csv, .json" onchange="handleExcelFile(event)">
                </div>

                <div id="fieldsSection" class="space-y-6">
                    <div id="cat-cipolle" class="hidden">
                        <div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 bg-orange-500 rounded-full"></div><h3 class="text-xs font-black uppercase text-slate-600 tracking-wider">Cipolle</h3></div>
                        <div id="list-cipolle" class="space-y-2"></div>
                    </div>
                    <div id="cat-bunching" class="hidden">
                        <div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 bg-green-500 rounded-full"></div><h3 class="text-xs font-black uppercase text-slate-600 tracking-wider">Bunching</h3></div>
                        <div id="list-bunching" class="space-y-2"></div>
                    </div>
                    <div id="cat-brassiche" class="hidden">
                        <div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 bg-purple-500 rounded-full"></div><h3 class="text-xs font-black uppercase text-slate-600 tracking-wider">Brassiche</h3></div>
                        <div id="list-brassiche" class="space-y-2"></div>
                    </div>
                    <div id="cat-cavoli" class="hidden">
                        <div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 bg-blue-500 rounded-full"></div><h3 class="text-xs font-black uppercase text-slate-600 tracking-wider">Cavoli</h3></div>
                        <div id="list-cavoli" class="space-y-2"></div>
                    </div>
                    <div id="cat-cicoria" class="hidden">
                        <div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 bg-emerald-600 rounded-full"></div><h3 class="text-xs font-black uppercase text-slate-600 tracking-wider">Cicoria</h3></div>
                        <div id="list-cicoria" class="space-y-2"></div>
                    </div>
                    <div id="cat-altro" class="hidden">
                        <div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 bg-slate-500 rounded-full"></div><h3 class="text-xs font-black uppercase text-slate-600 tracking-wider">Altro / Note Libere</h3></div>
                        <div id="list-altro" class="space-y-2"></div>
                    </div>
                    <div id="emptyMsg" class="text-center py-10 text-slate-400 text-xs italic">Nessun punto registrato.</div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODALI -->
    <div id="actionChoiceModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl text-center animate-in zoom-in duration-200">
            <h2 class="text-lg font-bold text-slate-800 mb-6 tracking-tight">Nuovo Rilevamento</h2>
            <div class="flex flex-col gap-4">
                <button onclick="selectNewField()" class="flex items-center justify-between bg-green-50 text-green-700 p-4 rounded-2xl border border-green-200 active:scale-95 transition-all"><div class="flex items-center gap-3"><i data-lucide="plus-circle" class="w-6 h-6"></i><span class="font-bold">Crea Isolamento</span></div><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                <button onclick="selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-4 rounded-2xl border border-blue-200 active:scale-95 transition-all"><div class="flex items-center gap-3"><i data-lucide="clipboard-check" class="w-6 h-6"></i><span class="font-bold">Aggiungi Nota</span></div><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                <button onclick="closeActionChoiceModal()" class="mt-2 text-slate-400 text-sm font-bold">Annulla</button>
            </div>
        </div>
    </div>

    <div id="fieldModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-in zoom-in duration-200 max-h-[90vh] overflow-y-auto">
            <h2 id="fieldModalTitle" class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2 text-green-700"><i data-lucide="plus-circle"></i> Registra Isolamento</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="fieldNameInput" placeholder="Nome Campo" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-green-500">
                    <input type="text" id="fieldCodeInput" placeholder="Codice" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <select id="fieldCategoryInput" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-green-500">
                    <option value="cipolle">Cipolle</option>
                    <option value="bunching">Bunching</option>
                    <option value="brassiche">Brassiche</option>
                    <option value="cavoli">Cavoli</option>
                    <option value="cicoria">Cicoria</option>
                    <option value="altro">Altro</option>
                </select>
                <div id="coordsInputs" class="hidden grid grid-cols-2 gap-3">
                    <input type="number" id="fieldLatInput" step="any" placeholder="Lat" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none">
                    <input type="number" id="fieldLonInput" step="any" placeholder="Lon" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none">
                </div>
                <input type="number" id="fieldRadiusInput" value="1000" placeholder="Raggio (metri)" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-green-500">
                
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Foto del Campo</label>
                    <img id="fieldPhotoPreview" src="" class="photo-preview hidden">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="document.getElementById('fieldCameraInput').click()" class="py-3 bg-slate-900 text-white rounded-xl text-[11px] font-bold shadow-md active:scale-95 flex items-center justify-center gap-1.5 uppercase"><i data-lucide="camera" class="w-4 h-4"></i> Scatta</button>
                        <button onclick="document.getElementById('fieldPhotoInput').click()" class="py-3 bg-slate-100 text-slate-700 rounded-xl text-[11px] font-bold border border-slate-200 active:scale-95 flex items-center justify-center gap-1.5 uppercase"><i data-lucide="image" class="w-4 h-4"></i> Galleria</button>
                    </div>
                    <input type="file" id="fieldCameraInput" accept="image/*" capture="environment" class="hidden" onchange="previewPhoto(event, 'fieldPhotoPreview')">
                    <input type="file" id="fieldPhotoInput" accept="image/*" class="hidden" onchange="previewPhoto(event, 'fieldPhotoPreview')">
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="closeFieldModal()" class="flex-1 py-3.5 border border-slate-200 rounded-xl font-bold text-slate-400">Annulla</button>
                    <button onclick="confirmAddField()" id="fieldConfirmBtn" class="flex-1 py-3.5 bg-green-600 text-white rounded-xl font-bold">SALVA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="checkpointModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-in zoom-in duration-200 max-h-[90vh] overflow-y-auto">
            <h2 id="checkpointModalTitle" class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2 text-blue-700"><i data-lucide="clipboard-check"></i> Nota sul Campo</h2>
            <div class="space-y-4">
                <textarea id="checkpointNoteInput" rows="3" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Descrivi il rilevamento..."></textarea>
                <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-inner">
                    <input type="checkbox" id="checkpointCheckedInput" class="w-6 h-6 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    <label for="checkpointCheckedInput" class="text-sm font-black text-slate-700 cursor-pointer select-none uppercase">Controllato OK (Applica X)</label>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Foto del Rilevamento</label>
                    <img id="checkpointPhotoPreview" src="" class="photo-preview hidden">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="document.getElementById('checkpointCameraInput').click()" class="py-3 bg-slate-900 text-white rounded-xl text-[11px] font-bold shadow-md active:scale-95 flex items-center justify-center gap-1.5 uppercase"><i data-lucide="camera" class="w-4 h-4"></i> Scatta</button>
                        <button onclick="document.getElementById('checkpointPhotoInput').click()" class="py-3 bg-slate-100 text-slate-700 rounded-xl text-[11px] font-bold border border-slate-200 active:scale-95 flex items-center justify-center gap-1.5 uppercase"><i data-lucide="image" class="w-4 h-4"></i> Galleria</button>
                    </div>
                    <input type="file" id="checkpointCameraInput" accept="image/*" capture="environment" class="hidden" onchange="previewPhoto(event, 'checkpointPhotoPreview')">
                    <input type="file" id="checkpointPhotoInput" accept="image/*" class="hidden" onchange="previewPhoto(event, 'checkpointPhotoPreview')">
                </div>

                <div class="flex flex-col gap-2 pt-2">
                    <div class="flex gap-3">
                        <button onclick="closeCheckpointModal()" class="flex-1 py-3.5 border border-slate-200 rounded-xl font-bold text-slate-400">Annulla</button>
                        <button onclick="confirmAddCheckpoint()" id="checkpointConfirmBtn" class="flex-1 py-3.5 bg-blue-600 text-white rounded-xl font-bold uppercase">SALVA</button>
                    </div>
                    <button id="deleteCheckpointBtn" onclick="deleteCheckpoint()" class="w-full py-2.5 bg-slate-100 text-red-500 rounded-xl font-bold text-xs hidden flex items-center justify-center gap-2 mt-2"><i data-lucide="trash-2" class="w-4 h-4"></i> ELIMINA QUESTA NOTA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="fixed top-24 left-1/2 -translate-x-1/2 z-[3000] transform -translate-y-24 opacity-0 transition-all duration-500 bg-slate-900 text-white px-6 py-2.5 rounded-full shadow-2xl text-xs font-bold text-center min-w-[220px]">
        <span id="notifText"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configurazione Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE",
          authDomain: "isolamenti-923d0.firebaseapp.com",
          projectId: "isolamenti-923d0",
          storageBucket: "isolamenti-923d0.firebasestorage.app",
          messagingSenderId: "907661900494",
          appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'isolamenti-923d0';

        let db, auth;
        let map, userMarker, watchId = null, fields = []; 
        let isTracking = false, tempFieldCoords = null, tempCheckpointCoords = null, tempFieldId = null;
        let currentProjectName = null, currentPassword = null;
        let isLocalMode = false, mapReady = false, isSyncing = false; 
        let isInitialized = false; 
        let lastCloudSyncTime = 0; 
        let pendingSave = false; // CODA DI SALVATAGGIO
        let wakeLock = null;

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        const requestWakeLock = async () => {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        };

        const releaseWakeLock = async () => {
            if (wakeLock !== null) {
                try { await wakeLock.release(); wakeLock = null; } catch (err) {}
            }
        };

        window.handleLogin = async function() {
            const loginBtn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            const nameRaw = document.getElementById('projectInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            
            if (!nameRaw || !pass) { 
                showNotification("Nome Gruppo e Password obbligatori."); 
                return; 
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loader"></span> Accesso...';
            errorEl.classList.add('hidden');

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                const name = nameRaw.toLowerCase().replace(/[^a-z0-9_]/g, ''); 
                const projRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', name);
                
                isInitialized = false; 
                lastCloudSyncTime = 0;

                const docSnap = await getDoc(projRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.password !== pass) throw new Error("Password errata.");
                    mergeData(data.fields || []);
                    lastCloudSyncTime = data.lastSync ? new Date(data.lastSync).getTime() : 0;
                    isInitialized = true; 
                    showNotification("Dati caricati dal Cloud.");
                } else {
                    await setDoc(projRef, { password: pass, fields: [], lastSync: new Date().toISOString() });
                    isInitialized = true;
                    showNotification("Nuovo gruppo creato.");
                }

                enterApp(name, pass, false);
            } catch (err) { 
                errorEl.innerText = `Errore: ${err.message}`; 
                errorEl.classList.remove('hidden'); 
                loginBtn.disabled = false; 
                loginBtn.innerText = "ACCEDI AL CLOUD";
            }
        };

        window.handleLocalMode = () => {
            isInitialized = true;
            enterApp("LOCALE", "", true);
        };

        function enterApp(name, pass, local) {
            isLocalMode = local; 
            currentProjectName = name; 
            currentPassword = pass;
            isInitialized = true; // Sblocca forzatamente
            
            localStorage.setItem('isolamenti_last_session', JSON.stringify({ mode: local ? 'local' : 'cloud', name, pass }));
            document.getElementById('displayProjName').innerText = name.toUpperCase();
            document.getElementById('loginOverlay').style.display = 'none';
            
            const checkMap = setInterval(() => {
                if (mapReady) {
                    if (local) {
                        loadForensicData();
                        document.getElementById('syncStatusLabel').innerText = "Dati Locali";
                    } else {
                        startCloudSync();
                    }
                    setTimeout(() => toggleTracking(true), 500);
                    clearInterval(checkMap);
                }
            }, 100);
        }

        function loadForensicData() {
            const raw = localStorage.getItem('isolamenti_local_db');
            if (raw) mergeData(JSON.parse(raw));
        }

        function startCloudSync() {
            if (!auth.currentUser) return;
            const projRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', currentProjectName);
            
            onSnapshot(projRef, (doc) => {
                // Se stiamo attivamente scrivendo, ignoriamo gli aggiornamenti in arrivo (echo)
                if (isSyncing) return;

                if (doc.exists()) {
                    const data = doc.data();
                    const incomingSyncTime = data.lastSync ? new Date(data.lastSync).getTime() : 0;
                    
                    // Solo se il dato nel cloud è REALMENTE più nuovo di quello che abbiamo visualizzato
                    if (incomingSyncTime > lastCloudSyncTime) {
                        mergeData(data.fields || []);
                        lastCloudSyncTime = incomingSyncTime;
                    }
                    document.getElementById('syncIndicator').className = "text-green-500 transition-all";
                }
            });
        }

        function mergeData(newData) {
            if (!mapReady) return;
            
            fields.forEach(f => {
                if(f.marker) map.removeLayer(f.marker); 
                if(f.circle) map.removeLayer(f.circle);
                if(f.polyline) map.removeLayer(f.polyline);
                if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); });
            });
            fields = []; 
            
            newData.forEach(fData => {
                if (fData.pathCoords && typeof fData.pathCoords === 'string') {
                    try { fData.pathCoords = JSON.parse(fData.pathCoords); } catch(e) { fData.pathCoords = []; }
                }
                addFieldToMap(fData);
            }); 
            window.updateFieldUI();
        }

        async function saveData() {
            // SALVATAGGIO LOCALE: Sempre e comunque, nessuna condizione.
            const cleanFields = fields.map(f => {
                const latlng = Array.isArray(f.latlng) ? f.latlng : [f.latlng.lat, f.latlng.lng];
                return { 
                    id: f.id, 
                    name: f.name || "Campo", 
                    code: f.code || "---", 
                    category: (f.category || "cipolle").toLowerCase(), 
                    latlng: latlng, 
                    radius: Number(f.radius) || 1000, 
                    photo: f.photo || null,
                    pathCoords: typeof f.pathCoords === 'string' ? f.pathCoords : JSON.stringify(f.pathCoords || []), 
                    checkpoints: (f.checkpoints || []).map(cp => ({ 
                        id: cp.id, 
                        latlng: Array.isArray(cp.latlng) ? cp.latlng : [cp.latlng.lat, cp.latlng.lng], 
                        note: cp.note || "", 
                        date: cp.date || "", 
                        checked: cp.checked || false,
                        photo: cp.photo || null
                    })) 
                };
            });
            localStorage.setItem('isolamenti_local_db', JSON.stringify(cleanFields)); 

            // Se siamo già in fase di sincronizzazione, mettiamo in coda la richiesta e usciamo
            if (isSyncing) {
                pendingSave = true;
                return;
            }

            // SALVATAGGIO CLOUD: Solo se non siamo in locale
            if (!isLocalMode && auth.currentUser) {
                try {
                    isSyncing = true;
                    document.getElementById('syncIndicator').classList.add('saving-pulse');
                    const projRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', currentProjectName);
                    
                    const now = new Date().toISOString();
                    lastCloudSyncTime = new Date(now).getTime(); // Blocca immediatamente l'echo
                    
                    await setDoc(projRef, { password: currentPassword, fields: cleanFields, lastSync: now }, { merge: true });
                    document.getElementById('syncIndicator').className = "text-green-600";
                } catch (e) { 
                    console.error("Sync Error:", e);
                    document.getElementById('syncIndicator').className = "text-red-500"; 
                } finally { 
                    document.getElementById('syncIndicator').classList.remove('saving-pulse');
                    
                    // Rilasciamo il blocco dopo un secondo per sicurezza
                    setTimeout(async () => {
                        isSyncing = false;
                        // Se c'è un salvataggio in coda, lo eseguiamo ora
                        if (pendingSave) {
                            pendingSave = false;
                            await saveData();
                        }
                    }, 1000);
                }
            }
        }

        window.previewPhoto = async function(event, previewId) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 800;
                    const scale = MAX / Math.max(img.width, img.height);
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById(previewId).src = b64;
                    document.getElementById(previewId).classList.remove('hidden');
                };
            };
        };

        window.confirmAddField = async function() {
            const name = document.getElementById('fieldNameInput').value.trim() || "Campo";
            const code = document.getElementById('fieldCodeInput').value.trim() || "---";
            const category = document.getElementById('fieldCategoryInput').value;
            const radius = parseInt(document.getElementById('fieldRadiusInput').value) || 1000;
            const photo = document.getElementById('fieldPhotoPreview').src.startsWith('data:') ? document.getElementById('fieldPhotoPreview').src : null;
            
            try {
                if (tempFieldId) {
                    const idx = fields.findIndex(f => f.id.toString() === tempFieldId.toString());
                    if (idx !== -1) {
                        fields[idx].name = name; fields[idx].code = code; fields[idx].category = category; fields[idx].radius = radius;
                        if (photo) fields[idx].photo = photo;
                        if (fields[idx].marker) map.removeLayer(fields[idx].marker);
                        if (fields[idx].circle) map.removeLayer(fields[idx].circle);
                        if (fields[idx].polyline) map.removeLayer(fields[idx].polyline);
                        addFieldToMap(fields[idx]);
                    }
                } else {
                    let latlng = tempFieldCoords;
                    if(!latlng) { 
                        const lat = parseFloat(document.getElementById('fieldLatInput').value); 
                        const lon = parseFloat(document.getElementById('fieldLonInput').value); 
                        if(isNaN(lat) || isNaN(lon)) throw new Error("Coordinate non valide.");
                        latlng = L.latLng(lat, lon); 
                    }
                    const newField = { id: Date.now() + Math.floor(Math.random() * 1000), name, code, category, latlng: [latlng.lat, latlng.lng], radius, photo, pathCoords: [], checkpoints: [] };
                    addFieldToMap(newField);
                }
                
                await saveData(); 
                window.updateFieldUI();
                closeFieldModal(); 
                showNotification("Campo memorizzato.");
            } catch (err) {
                showNotification("Errore: " + err.message);
            }
        };

        window.confirmAddCheckpoint = async function() {
            const note = document.getElementById('checkpointNoteInput').value.trim(); if (!note) return;
            const checked = document.getElementById('checkpointCheckedInput').checked;
            const photo = document.getElementById('checkpointPhotoPreview').src.startsWith('data:') ? document.getElementById('checkpointPhotoPreview').src : null;
            
            let field = fields.find(f => f.id.toString() === tempCheckpointCoords.fieldId.toString());
            if (!field || tempCheckpointCoords.fieldId === 'generiche') {
                field = fields.find(f => f.id === 'field_generiche');
                if (!field) {
                    field = { id: 'field_generiche', name: 'Note Libere', code: 'GEN', category: 'altro', latlng: [0,0], radius: 0, photo: null, pathCoords: [], checkpoints: [] };
                    fields.push(field);
                }
            }

            if (field) { 
                if (tempCheckpointCoords.checkpointId) {
                    const cp = field.checkpoints.find(c => c.id.toString() === tempCheckpointCoords.checkpointId.toString());
                    if (cp) { 
                        cp.note = note; cp.checked = checked; if (photo) cp.photo = photo; cp.date = new Date().toLocaleString('it-IT') + " (Mod.)";
                        if (cp.marker) map.removeLayer(cp.marker); renderCheckpointOnMap(cp);
                    }
                } else {
                    const cpData = { id: Date.now() + Math.floor(Math.random() * 1000), latlng: [tempCheckpointCoords.latlng.lat, tempCheckpointCoords.latlng.lng], note, date: new Date().toLocaleString('it-IT'), checked, photo }; 
                    if (!field.checkpoints) field.checkpoints = []; field.checkpoints.push(cpData); renderCheckpointOnMap(cpData); 
                }
                await saveData(); 
                closeCheckpointModal(); 
                showNotification("Nota memorizzata.");
            }
        };

        window.deleteCheckpoint = async function() {
            if (confirm("Eliminare questa nota?")) {
                let found = false;
                fields.forEach(field => {
                    const cpIdx = field.checkpoints?.findIndex(c => c.id.toString() === tempCheckpointCoords.checkpointId.toString());
                    if (cpIdx !== undefined && cpIdx !== -1) {
                        const cp = field.checkpoints[cpIdx];
                        if (cp.marker) map.removeLayer(cp.marker);
                        field.checkpoints.splice(cpIdx, 1);
                        found = true;
                    }
                });
                if (found) {
                    closeCheckpointModal(); await saveData(); showNotification("Nota eliminata.");
                }
            }
        };

        function addFieldToMap(fData) {
            const cats = { cipolle: '#f97316', bunching: '#22c55e', brassiche: '#a855f7', cavoli: '#3b82f6', cicoria: '#059669', altro: '#64748b' };
            const color = cats[(fData.category || "cipolle").toLowerCase()] || '#64748b';
            
            if (fData.id !== 'field_generiche') {
                const marker = L.marker(fData.latlng, { icon: L.divIcon({ html: `<div style="background: ${color}; color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.2);"><i data-lucide="sprout" style="width: 14px; height: 14px;"></i></div>`, className: '', iconSize: [32, 32], iconAnchor: [16, 16] }) }).addTo(map);
                const circle = L.circle(fData.latlng, { radius: fData.radius || 1000, color, fillOpacity: 0.1, dashArray: '8, 8' }).addTo(map);
                let path = fData.pathCoords || [];
                if (typeof path === 'string') try { path = JSON.parse(path); } catch(e) { path = []; }
                const polyline = L.polyline(path, { color: '#334155', weight: 3, opacity: 0.7, dashArray: '5, 10' }).addTo(map);
                const p = fData.photo ? `<img src="${fData.photo}" class="w-full rounded-lg mt-2">` : '';
                marker.bindPopup(`<div class="text-[11px] font-bold">${fData.name}</div><div class="text-[9px] text-slate-400 font-mono">${fData.code}</div>${p}`, { className: 'custom-popup' });
                fData.marker = marker; fData.circle = circle; fData.polyline = polyline;
            }

            if (fields.findIndex(f => f.id.toString() === fData.id.toString()) === -1) {
                fields.push(fData);
            }
            
            if (fData.checkpoints) fData.checkpoints.forEach(renderCheckpointOnMap);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function renderCheckpointOnMap(cp) {
            const x = cp.checked ? '<path d="M7 10 L17 20 M17 10 L7 20" stroke="black" stroke-width="4" stroke-linecap="round" />' : '';
            const svg = `<svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 2 L22 21 L2 21 Z" fill="#ef4444" stroke="#ffffff" stroke-width="2.5"/>${x}</svg>`;
            const marker = L.marker(cp.latlng, { icon: L.divIcon({ html: svg, className: '', iconSize: [28, 28], iconAnchor: [14, 28] }), zIndexOffset: 500 }).addTo(map);
            const p = cp.photo ? `<img src="${cp.photo}" class="w-full rounded-lg mt-2 cursor-pointer" onclick="window.open('${cp.photo}')">` : '';
            marker.bindPopup(`<div class="text-[10px]"><b>RILEVAMENTO</b><br><span class="text-slate-400">${cp.date}</span><br><br>${cp.note}${p}</div>`);
            marker.on('click', (e) => { L.DomEvent.stopPropagation(e); openEditCheckpoint(cp); });
            cp.marker = marker;
        }

        window.openEditField = (id) => {
            const f = fields.find(f => f.id.toString() === id.toString()); if (!f || id === 'field_generiche') return;
            tempFieldId = f.id;
            document.getElementById('fieldModalTitle').innerText = "Modifica Isolamento";
            document.getElementById('fieldNameInput').value = f.name;
            document.getElementById('fieldCodeInput').value = f.code;
            document.getElementById('fieldCategoryInput').value = (f.category || "cipolle").toLowerCase();
            document.getElementById('fieldRadiusInput').value = f.radius;
            const p = document.getElementById('fieldPhotoPreview');
            if (f.photo) { p.src = f.photo; p.classList.remove('hidden'); } else { p.src = ""; p.classList.add('hidden'); }
            document.getElementById('fieldModal').classList.replace('hidden', 'flex');
            lucide.createIcons();
        };

        window.openEditCheckpoint = (cp) => {
            let fid = 'generiche'; 
            fields.forEach(f => { if (f.checkpoints?.some(c => c.id.toString() === cp.id.toString())) fid = f.id; });
            tempCheckpointCoords = { latlng: L.latLng(cp.latlng[0], cp.latlng[1]), fieldId: fid, checkpointId: cp.id };
            document.getElementById('checkpointModalTitle').innerText = "Modifica Nota";
            document.getElementById('checkpointNoteInput').value = cp.note;
            document.getElementById('checkpointCheckedInput').checked = cp.checked || false;
            document.getElementById('deleteCheckpointBtn').classList.remove('hidden'); 
            const p = document.getElementById('checkpointPhotoPreview');
            if (cp.photo) { p.src = cp.photo; p.classList.remove('hidden'); } else { p.src = ""; p.classList.add('hidden'); }
            document.getElementById('checkpointModal').classList.replace('hidden', 'flex');
            lucide.createIcons();
        };

        window.toggleTracking = (auto = false) => {
            if (isTracking && !auto) {
                if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                watchId = null; isTracking = false; releaseWakeLock();
                document.getElementById('trackBtn').innerHTML = '<i data-lucide="navigation" class="w-4 h-4"></i> Attiva GPS';
                document.getElementById('trackBtn').classList.replace('bg-rose-600', 'bg-slate-900');
                document.getElementById('telemetryPanel').classList.add('hidden');
                if(userMarker) { map.removeLayer(userMarker); userMarker = null; }
            } else if (!isTracking) {
                document.getElementById('trackBtn').innerHTML = '<span class="loader"></span> GPS...';
                requestWakeLock();
                const arrowSVG = `<div class="gps-arrow-icon"><svg viewBox="0 0 24 24" width="44" height="44"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>`;
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    document.getElementById('accuracyVal').innerText = pos.coords.accuracy.toFixed(0) + "m";
                    if (!userMarker) { 
                        userMarker = L.marker(latlng, { icon: L.divIcon({ className: 'gps-arrow-container', html: arrowSVG, iconSize: [44, 44], iconAnchor: [22, 22] }), zIndexOffset: 10000 }).addTo(map); 
                        map.flyTo(latlng, 17); 
                    } else { userMarker.setLatLng(latlng); }
                    if (pos.coords.heading !== null && pos.coords.heading !== undefined) {
                        const iconEl = userMarker.getElement().querySelector('.gps-arrow-icon');
                        if (iconEl) iconEl.style.transform = `rotate(${pos.coords.heading}deg)`;
                    }
                    updateTrajectory(latlng);
                    isTracking = true; 
                    document.getElementById('telemetryPanel').classList.remove('hidden');
                    document.getElementById('trackBtn').innerHTML = '<i data-lucide="square" class="w-4 h-4"></i> Stop GPS';
                    document.getElementById('trackBtn').classList.replace('bg-slate-900', 'bg-rose-600');
                    lucide.createIcons();
                }, (err) => { 
                    if(!auto) showNotification("GPS non disponibile."); 
                    isTracking = false; 
                }, { enableHighAccuracy: true, timeout: 20000 });
            }
        };

        function updateTrajectory(userPos) {
            let anyInside = false; 
            fields.forEach(f => {
                if (f.id === 'field_generiche') return;
                const dist = userPos.distanceTo(L.latLng(f.latlng));
                if (dist <= f.radius) { 
                    anyInside = true; 
                    f.circle.setStyle({ fillOpacity: 0.3, dashArray: '' }); 
                    let path = f.pathCoords || [];
                    if (typeof path === 'string') try { path = JSON.parse(path); } catch(e) { path = []; }
                    const last = path[path.length - 1];
                    if (!last || (Math.abs(last[0] - userPos.lat) > 0.00005 || Math.abs(last[1] - userPos.lng) > 0.00005)) { 
                        path.push([userPos.lat, userPos.lng]); 
                        f.pathCoords = path;
                        f.polyline.setLatLngs(path); 
                        saveData(); 
                    }
                } else if(f.circle) f.circle.setStyle({ fillOpacity: 0.05, dashArray: '8, 8' });
            });
            document.getElementById('statusDot').className = anyInside ? "w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse" : "w-2.5 h-2.5 rounded-full bg-slate-400";
            document.getElementById('statusText').innerText = anyInside ? "In Area" : "In Viaggio...";
        }

        window.updateFieldUI = function() {
            const cats = ['cipolle', 'bunching', 'brassiche', 'cavoli', 'cicoria', 'altro']; 
            let total = 0;
            cats.forEach(c => {
                const sec = document.getElementById(`cat-${c}`); const list = document.getElementById(`list-${c}`);
                const cfs = fields.filter(f => (f.category || "").toLowerCase() === c);
                if (cfs.length > 0) {
                    sec.classList.remove('hidden'); list.innerHTML = "";
                    cfs.forEach(f => {
                        total++; const item = document.createElement('div');
                        item.className = "flex items-center gap-3 p-3 bg-white border rounded-2xl shadow-sm active:scale-[0.98]";
                        item.onclick = () => { if(f.latlng[0]!==0) map.flyTo(f.latlng, 15); if(f.marker) f.marker.openPopup(); };
                        const thumb = f.photo ? `<img src="${f.photo}" class="list-thumb">` : `<div class="list-thumb bg-slate-100 flex items-center justify-center"><i data-lucide="${f.id==='field_generiche'?'clipboard-list':'image'}" class="w-4 h-4 text-slate-300"></i></div>`;
                        const delBtn = f.id !== 'field_generiche' ? `<button onclick="event.stopPropagation(); deleteField('${f.id}')" class="p-2 text-slate-300 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '';
                        const editBtn = f.id !== 'field_generiche' ? `<button onclick="event.stopPropagation(); openEditField('${f.id}')" class="p-2 text-slate-300 hover:text-blue-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : '';
                        item.innerHTML = `${thumb}<div class="flex-1 min-w-0"><p class="text-[11px] font-black uppercase leading-none truncate">${f.name}</p><p class="text-[9px] font-mono text-slate-400 mt-1">${f.code}</p></div><div class="flex gap-1">${editBtn}${delBtn}</div>`;
                        list.appendChild(item);
                    });
                } else sec.classList.add('hidden');
            });
            document.getElementById('emptyMsg').classList.toggle('hidden', total > 0); 
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.exportBackup = () => {
            if (fields.length === 0) { showNotification("Nessun dato."); return; }
            const backupData = fields.map(f => ({ ...f, marker: undefined, circle: undefined, polyline: undefined, checkpoints: (f.checkpoints || []).map(cp => ({ ...cp, marker: undefined })) }));
            const link = document.createElement('a');
            link.href = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(backupData));
            link.download = `isolamenti_${currentProjectName}.json`;
            link.click();
        };

        window.deleteField = async (id) => { 
            if (confirm("Eliminare definitivamente questo isolamento?")) { 
                const f = fields.find(f => f.id.toString() === id.toString()); 
                if (f) { 
                    if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline); 
                    fields = fields.filter(f => f.id.toString() !== id.toString()); 
                    await saveData(); 
                    window.updateFieldUI(); 
                } 
            } 
        };

        window.triggerExcelImport = () => document.getElementById('excelInput').click();
        window.triggerBackupImport = () => document.getElementById('excelInput').click();

        window.handleExcelFile = (event) => {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                if (file.name.endsWith('.json')) {
                    try { 
                        const imported = JSON.parse(e.target.result); 
                        isInitialized = true; 
                        lastCloudSyncTime = 0; 
                        isSyncing = false;
                        mergeData(imported); 
                        await saveData(); 
                        showNotification("Backup ripristinato."); 
                    } catch (err) { 
                        showNotification("Errore nel file JSON."); 
                    }
                } else {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    const newFields = json.map(item => ({ id: Date.now() + Math.random(), name: item.Nome || item.name || "Campo", code: item.Codice || item.code || "---", category: (item.Categoria || item.category || "cipolle").toLowerCase(), latlng: [parseFloat(item.Latitudine || item.lat), parseFloat(item.Longitudine || item.lng)], radius: parseInt(item.Raggio || item.radius) || 1000, photo: null, pathCoords: [], checkpoints: [] })).filter(f => !isNaN(f.latlng[0]) && !isNaN(f.latlng[1]));
                    isInitialized = true;
                    mergeData([...fields, ...newFields]); 
                    await saveData();
                }
            };
            if (file.name.endsWith('.json')) reader.readAsText(file); else reader.readAsArrayBuffer(file);
        };

        window.recenterOnUser = () => { if (userMarker) map.flyTo(userMarker.getLatLng(), 17); };
        window.closeFieldModal = () => { tempFieldId = null; tempFieldCoords = null; document.getElementById('fieldModal').classList.replace('flex', 'hidden'); document.getElementById('fieldPhotoPreview').src = ""; document.getElementById('fieldPhotoPreview').classList.add('hidden'); };
        window.closeCheckpointModal = () => { document.getElementById('checkpointModal').classList.replace('flex', 'hidden'); document.getElementById('checkpointPhotoPreview').src = ""; document.getElementById('deleteCheckpointBtn').classList.add('hidden'); };
        window.closeActionChoiceModal = () => document.getElementById('actionChoiceModal').classList.add('hidden');
        window.selectNewField = () => { closeActionChoiceModal(); tempFieldId = null; document.getElementById('fieldModalTitle').innerText = "Registra Isolamento"; document.getElementById('fieldModal').classList.replace('hidden', 'flex'); document.getElementById('fieldNameInput').focus(); };
        window.selectNewCheckpoint = () => { closeActionChoiceModal(); document.getElementById('checkpointModalTitle').innerText = "Nuova Nota"; document.getElementById('checkpointModal').classList.replace('hidden', 'flex'); document.getElementById('checkpointNoteInput').focus(); };
        window.logoutProject = () => { if (confirm("Uscire?")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        window.handleSearch = () => { const q = document.getElementById('searchInput').value.trim().toLowerCase(); const f = fields.find(f => (f.name?.toLowerCase().includes(q)) || (f.code?.toLowerCase().includes(q))); if (f) { if(f.latlng[0]!==0) map.flyTo(f.latlng, 15); if(f.marker) f.marker.openPopup(); expandPanel(); } };

        function initMap() {
            map = L.map('map', { zoomControl: false, tap: false }).setView([44.5, 11.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);
            map.on('click', (e) => { 
                let target = fields.find(f => f.id !== 'field_generiche' && e.latlng.distanceTo(L.latLng(f.latlng)) <= f.radius); 
                tempFieldCoords = e.latlng;
                tempCheckpointCoords = { 
                    latlng: e.latlng, 
                    fieldId: target ? target.id : 'generiche', 
                    checkpointId: null 
                };
                document.getElementById('actionChoiceModal').classList.remove('hidden');
            });
            mapReady = true; 
            const s = localStorage.getItem('isolamenti_last_session');
            if (s) { try { const d = JSON.parse(s); enterApp(d.name, d.pass, d.mode === 'local'); } catch(e) {} }
            lucide.createIcons();
        }

        const panel = document.getElementById('statusPanel'); const dragArea = document.getElementById('dragArea'); const panelContent = document.getElementById('panelContent');
        let startY, curY = 0, dragging = false, isExpanded = false;
        window.togglePanel = () => { if (dragging) return; isExpanded = !isExpanded; updatePanel(); };
        function updatePanel() { if (isExpanded) { panel.style.transform = 'translateY(0)'; panel.classList.add('is-expanded'); panelContent.style.opacity = '1'; curY = 0; } else { const hiddenY = panel.offsetHeight - 85; panel.style.transform = `translateY(${hiddenY}px)`; panel.classList.remove('is-expanded'); panelContent.style.opacity = '0.4'; curY = hiddenY; } }
        dragArea.addEventListener('click', togglePanel);
        dragArea.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; dragging = true; panel.style.transition = 'none'; }, {passive: true});
        window.addEventListener('touchmove', (e) => { if (!dragging) return; const delta = e.touches[0].clientY - startY; const n = curY + delta; if (n >= 0 && n <= panel.offsetHeight - 85) panel.style.transform = `translateY(${n}px)`; }, {passive: false});
        window.addEventListener('touchend', (e) => { if (!dragging) return; panel.style.transition = 'transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67)'; const d = e.changedTouches[0].clientY - startY; if (Math.abs(d) > 40) isExpanded = d < 0; updatePanel(); setTimeout(() => dragging = false, 50); }, {passive: true});
        function showNotification(t) { const el = document.getElementById('notification'); document.getElementById('notifText').innerText = t; el.classList.replace('opacity-0', 'opacity-100'); el.classList.replace('-translate-y-24', 'translate-y-0'); setTimeout(() => { el.classList.replace('opacity-100', 'opacity-0'); el.classList.replace('translate-y-0', '-translate-y-24'); }, 4000); }
        window.expandPanel = () => { isExpanded = true; updatePanel(); };
        window.onload = () => { 
            document.getElementById('configInfo').innerText = "Sistema pronto.";
            initMap(); 
            setTimeout(updatePanel, 600); 
        };
    </script>
</body>
</html>
