<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsolamenTom v3.3.2 - LOGIN FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map-container { height: calc(100vh - 60px); width: 100%; position: relative; background: #e2e8f0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; transform-origin: center center; }
        #statusPanel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 6000; max-height: 85vh; transform: translateY(calc(100% - 75px)); }
        #statusPanel.expanded { transform: translateY(0) !important; }
        .drag-handle { width: 40px; height: 4px; background-color: #cbd5e1; border-radius: 10px; margin: 0 auto 8px auto; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loginOverlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-higher { z-index: 8000 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- Schermata di Accesso -->
    <div id="loginOverlay" class="flex">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-md space-y-6 border border-slate-100">
            <div class="text-center">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i data-lucide="shield" class="text-white w-8 h-8"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">IsolamenTom</h1>
                <p class="text-blue-600 text-[9px] font-black uppercase tracking-[0.2em] mt-2">Versione 3.3.2 Login Fix</p>
            </div>
            
            <div id="loginStatus" class="hidden text-center py-2 bg-blue-50 text-blue-600 text-[10px] font-black rounded-xl uppercase">Connessione in corso...</div>

            <div class="space-y-3">
                <input type="text" id="projectInput" placeholder="ID TEAM" class="w-full border-2 border-slate-50 rounded-xl p-4 text-base outline-none focus:border-blue-600 bg-slate-50 font-bold uppercase transition-all">
                <input type="password" id="passwordInput" placeholder="PASSWORD" class="w-full border-2 border-slate-50 rounded-xl p-4 text-base outline-none focus:border-blue-600 bg-slate-50 font-bold transition-all">
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-base shadow-lg hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest">Entra</button>
                <button onclick="handleLocalMode()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold active:scale-95 transition-all text-xs uppercase text-white/70">Lavora Offline</button>
            </div>
        </div>
    </div>

    <!-- UI App -->
    <header class="bg-white shadow-md px-3 sticky top-0 z-50 border-b h-[60px] flex items-center gap-3">
        <div class="flex items-center gap-2 shrink-0">
            <div class="bg-green-600 p-1.5 rounded-lg shadow-md"><i data-lucide="sprout" class="text-white w-5 h-5"></i></div>
            <div class="flex flex-col"><h1 class="text-sm font-black text-slate-900 leading-none">IsolamenTom</h1><span id="displayProjName" class="text-[8px] font-black text-blue-600 uppercase tracking-tight">Sync...</span></div>
        </div>
        <div class="flex-1"></div>
        <button onclick="logoutProject()" class="bg-slate-50 text-slate-400 p-2 rounded-lg active:bg-red-50 active:text-red-600 transition-all"><i data-lucide="log-out" class="w-4 h-4"></i></button>
    </header>

    <main class="relative">
        <div id="map-container"><div id="map"></div></div>
        
        <div class="absolute top-3 left-3 z-[1000] flex flex-col gap-2">
            <button onclick="recenterOnUser()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="crosshair" class="w-5 h-5"></i></button>
            <button id="rotationToggle" onclick="toggleMapRotation()" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-slate-700"><i data-lucide="compass" class="w-5 h-5"></i></button>
            <button onclick="window.openModal('searchModal')" class="bg-white p-3 rounded-xl shadow-lg border border-slate-50 active:scale-90 text-blue-600"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
        </div>

        <!-- Dashboard Status -->
        <div id="statusPanel" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-[32px] flex flex-col border-t border-slate-100">
            <div id="dragArea" class="cursor-pointer p-4 pb-2" onclick="togglePanel()">
                <div class="drag-handle"></div>
                <div class="flex items-center justify-between px-2">
                    <div class="flex flex-col"><span class="text-[10px] font-black uppercase text-slate-800 tracking-wider">Mappa Isolamenti</span><span id="fieldCount" class="text-[8px] font-bold text-slate-400 uppercase">Sync dati...</span></div>
                    <div class="bg-slate-50 p-1.5 rounded-lg text-slate-400"><i data-lucide="chevron-up" class="w-4 h-4 transition-transform duration-500" id="panelChevron"></i></div>
                </div>
            </div>
            <div id="panelContent" class="space-y-4 overflow-y-auto px-5 pb-10 transition-opacity duration-300 h-[70vh]">
                <button id="trackBtn" onclick="toggleTracking()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"><i data-lucide="play" id="trackIcon" class="fill-white w-5 h-5"></i> <span id="trackLabel">AVVIA GPS</span></button>
                <div id="fieldsSection" class="space-y-4"></div>
                <div class="p-4 bg-slate-50 rounded-[24px] border border-slate-100 text-center"><p class="text-[8px] font-black text-slate-300 uppercase tracking-[0.2em]">VER 3.3.2 - DATA RECOVERY ACTIVE</p></div>
            </div>
        </div>
    </main>

    <!-- Modale Scelta Azione -->
    <div id="actionChoiceModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[40px] w-full max-w-xs p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-slate-900">Azione Mappa</h2>
            <div class="flex flex-col gap-3">
                <button onclick="selectNewFieldAction()" class="flex items-center justify-between bg-green-50 text-green-700 p-6 rounded-[24px] border-2 border-green-100 font-black uppercase text-xs">Nuovo Isolamento <i data-lucide="plus"></i></button>
                <button onclick="selectNewCheckpoint()" class="flex items-center justify-between bg-blue-50 text-blue-700 p-6 rounded-[24px] border-2 border-blue-100 font-black uppercase text-xs">Aggiungi Nota <i data-lucide="clipboard-check"></i></button>
                <button onclick="window.closeModal('actionChoiceModal')" class="mt-4 text-slate-400 font-black uppercase text-[10px]">Annulla</button>
            </div>
        </div>
    </div>

    <!-- Modale Campo -->
    <div id="fieldModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 id="fieldModalTitle" class="text-xl font-black text-green-700 mb-5 text-center">Dati Area</h2>
            <div class="space-y-3">
                <input type="text" id="fieldNameInput" placeholder="Nome" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-bold text-sm">
                <input type="text" id="fieldCodeInput" placeholder="Codice" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-bold text-sm uppercase">
                <select id="fieldCategoryInput" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-black text-sm">
                    <option value="cipolle">Cipolle</option><option value="bunching">Bunching</option><option value="brassiche">Brassiche</option><option value="altro">Altro</option>
                </select>
                <div class="flex gap-3 pt-3"><button onclick="window.closeModal('fieldModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Annulla</button><button onclick="confirmAddField()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-black text-xs uppercase shadow-md">Salva</button></div>
            </div>
        </div>
    </div>

    <!-- Modale Nota -->
    <div id="checkpointModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-[7000] p-6">
        <div class="bg-white rounded-[32px] w-full max-sm p-8 shadow-2xl">
            <h2 class="text-xl font-black text-blue-800 mb-5 text-center">Nota</h2>
            <input type="number" id="checkpointNumberInput" placeholder="Numero" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 font-bold text-base mb-3">
            <textarea id="checkpointNoteInput" rows="3" class="w-full border border-slate-100 rounded-xl p-4 bg-slate-50 text-sm outline-none mb-4" placeholder="Dettagli..."></textarea>
            <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl mb-6 border border-slate-100"><input type="checkbox" id="checkpointCheckedInput" class="w-6 h-6 rounded-lg text-blue-600"><label class="text-xs font-black text-slate-700 uppercase">Isolamento OK</label></div>
            <div class="flex gap-3"><button onclick="window.closeModal('checkpointModal')" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Esci</button><button onclick="confirmAddCheckpoint()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black text-xs shadow-md">Salva</button></div>
        </div>
    </div>

    <div id="notification" class="fixed top-20 left-1/2 -translate-x-1/2 z-[11000] opacity-0 transition-all duration-500 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black min-w-[200px] text-center"><span id="notifText">In corso...</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCOmo-r782E20Sq7sLKUqGnTFK9zLb4OoE", authDomain: "isolamenti-923d0.firebaseapp.com", projectId: "isolamenti-923d0", storageBucket: "isolamenti-923d0.firebasestorage.app", messagingSenderId: "907661900494", appId: "1:907661900494:web:dbb5c4a4235ee2ada3ae9f" };
        const appId = 'isolamenti-923d0';

        const categoryColors = { cipolle: '#f97316', bunching: '#22c55e', brassiche: '#a855f7', altro: '#64748b' };
        let db, auth, map, userMarker, watchId = null, fields = [], currentProjectName = null, isLocalMode = false, mapReady = false, isSaving = false, isInitialized = false, mapRotationEnabled = false, tempFieldCoords = null, tempCheckpointCoords = null, isExpanded = false, ignoreMapClick = false, lastLatlng = null;

        const firebaseApp = initializeApp(firebaseConfig);
        auth = getAuth(firebaseApp);
        db = getFirestore(firebaseApp);

        // --- FUNZIONI DI LOGIN (CORE FIX) ---
        window.handleLogin = async function() {
            const n = document.getElementById('projectInput'), p = document.getElementById('passwordInput'), st = document.getElementById('loginStatus');
            const name = n.value.trim().toLowerCase(), pass = p.value.trim();
            if (!name || !pass) return alert("Inserisci ID e Password");

            st.classList.remove('hidden'); 
            st.innerText = "Connessione in corso...";

            // BYPASS ADMIN ISTANTANEO
            if (name === 'admin' && pass === 'master25') {
                currentProjectName = 'admin';
                enterApp();
                return;
            }

            try {
                await signInAnonymously(auth);
                currentProjectName = name.replace(/[^a-z0-9_]/g, '');
                localStorage.setItem('isolamenti_last_session', JSON.stringify({ name: currentProjectName, pass }));
                isInitialized = true;
                enterApp();
            } catch (err) {
                console.error(err);
                st.innerText = "ERRORE FIREBASE. PROVA OFFLINE.";
                setTimeout(() => handleLocalMode(), 2000);
            }
        };

        window.handleLocalMode = () => {
            currentProjectName = document.getElementById('projectInput').value.trim().toLowerCase() || 'locale';
            isLocalMode = true;
            isInitialized = true;
            enterApp();
        };

        function enterApp() {
            document.getElementById('displayProjName').innerText = currentProjectName.toUpperCase();
            window.closeModal('loginOverlay');
            if (mapReady) { 
                loadLocalCache(); 
                if (!isLocalMode) startSync(); 
                setTimeout(() => { if(!isTracking) window.toggleTracking(); }, 1500); 
            }
            lucide.createIcons();
        }

        // --- DATA PROTECTION & DASHBOARD ---
        function mergeData(newData, isInitialLoad) {
            if (!mapReady || !Array.isArray(newData)) return;
            const localMap = new Map(fields.map(f => [f.id.toString(), f]));
            newData.forEach(cloudField => {
                if (!cloudField || !cloudField.id) return;
                const id = cloudField.id.toString(), existing = localMap.get(id);
                if (!existing || cloudField.lastUpdated > (existing.lastUpdated || 0) || isInitialLoad) {
                    const merged = { ...cloudField };
                    const p1 = parsePath(cloudField.pathCoords), p2 = parsePath(cloudField.pathCoords2);
                    const combined = [...p1, ...p2];
                    const pLocal = existing ? parsePath(existing.pathCoords) : [];
                    merged.pathCoords = (pLocal.length > combined.length && !isInitialLoad) ? pLocal : combined;
                    localMap.set(id, merged);
                }
            });
            fields.forEach(f => { if(f.marker) map.removeLayer(f.marker); if(f.circle) map.removeLayer(f.circle); if(f.polyline) map.removeLayer(f.polyline); if(f.checkpoints) f.checkpoints.forEach(cp => { if(cp.marker) map.removeLayer(cp.marker); }); });
            fields = Array.from(localMap.values()).map(f => { renderFieldOnMap(f); return f; });
            window.updateFieldUI(); 
            localStorage.setItem('isolamenti_db_' + currentProjectName, JSON.stringify(fields.map(f => { const c = {...f}; delete c.marker; delete c.circle; delete c.polyline; if(c.checkpoints) c.checkpoints = c.checkpoints.map(cp => { const x = {...cp}; delete x.marker; return x; }); return c; })));
        }

        window.updateFieldUI = () => {
            const container = document.getElementById('fieldsSection');
            if (!container) return;
            container.innerHTML = "";
            const valid = fields.filter(f => f && f.id && f.id !== 'field_gen');
            document.getElementById('fieldCount').innerText = valid.length + " Aree caricate";
            valid.forEach(f => {
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-50 rounded-2xl flex justify-between items-center shadow-sm border border-transparent active:border-blue-300";
                div.innerHTML = `<div class="flex items-center gap-3"><div class="w-3 h-3 rounded-full" style="background:${categoryColors[f.category] || '#64748b'}"></div><span class="text-xs font-black uppercase text-slate-700">${f.name}</span></div><i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>`;
                div.onclick = () => { isFollowing = false; map.flyTo(f.latlng, 17); togglePanel(); };
                container.appendChild(div);
            });
            lucide.createIcons();
        };

        // --- MAP RENDER & TOUCH RECOVERY ---
        function renderFieldOnMap(f) {
            if (!f || !f.latlng || f.latlng[0] === 0) return;
            const color = categoryColors[f.category] || '#64748b';
            f.marker = L.marker(f.latlng, { icon: L.divIcon({ html: `<div style="background:${color};border-radius:30px;width:30px;height:30px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.2);"><i data-lucide="sprout" style="width:16px;height:16px;"></i></div>`, className: 'f-icon', iconSize:[30,30] }) }).addTo(map);
            f.marker.on('click', (ev) => { L.DomEvent.stopPropagation(ev); ignoreMapClick = true; f.marker.bindPopup(`<div class="p-2 text-center"><b class="uppercase text-xs">${f.name}</b><br><button onclick="window.openNavigation(${f.latlng[0]},${f.latlng[1]})" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black mt-2">NAVIGA</button></div>`).openPopup(); setTimeout(()=>ignoreMapClick=false, 300); });
            f.circle = L.circle(f.latlng, { radius: f.radius || 300, color: color, fillOpacity: 0.05, weight: 1.5, dashArray: '5,8' }).addTo(map);
            if (f.pathCoords?.length) f.polyline = L.polyline(f.pathCoords, { color: '#334155', weight: 4, opacity: 0.7, dashArray: '8, 8' }).addTo(map);
            if (f.checkpoints) f.checkpoints.forEach((cp, i) => renderCheckpointOnMap(cp, i, f.id));
        }

        function renderCheckpointOnMap(cp, index, fieldId) {
            const pinColor = cp.checked ? '#10b981' : '#ef4444';
            cp.marker = L.marker(cp.latlng, { icon: L.divIcon({ html: `<div class="cp-icon-wrapper"><svg viewBox="0 0 24 24" width="36" height="36"><path d="M12 2 L22 21 L2 21 Z" fill="${pinColor}" stroke="#fff" stroke-width="2"/><text x="12" y="17" font-size="8" font-weight="900" fill="white" text-anchor="middle">${cp.customNumber || index+1}</text></svg></div>`, className: 'cp-marker', iconSize:[40,40], iconAnchor:[20,34] }) }).addTo(map);
            cp.marker.on('click', (ev) => { L.DomEvent.stopPropagation(ev); ignoreMapClick = true; tempCheckpointCoords = { checkpointId: cp.id, fieldId, cpRef: cp }; document.getElementById('checkpointNumberInput').value = cp.customNumber || ""; document.getElementById('checkpointNoteInput').value = cp.note || ""; document.getElementById('checkpointCheckedInput').checked = !!cp.checked; window.openModal('checkpointModal'); setTimeout(()=>ignoreMapClick=false, 300); });
        }

        // --- GPS & ROTATION ---
        window.toggleTracking = () => {
            if (isTracking) { navigator.geolocation.clearWatch(watchId); isTracking = false; document.getElementById('trackLabel').innerText = 'AVVIA GPS'; return; }
            isTracking = true; document.getElementById('trackLabel').innerText = 'STOP GPS';
            watchId = navigator.geolocation.watchPosition((pos) => {
                const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
                if (!userMarker) userMarker = L.marker(ll, { icon: L.divIcon({ html: `<div style="transform: rotate(${pos.coords.heading || 0}deg)"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="8" fill="rgba(37, 99, 235, 0.2)"/><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" fill="#2563eb" stroke="white" stroke-width="2"/></svg></div>` }) }).addTo(map);
                else userMarker.setLatLng(ll);
                if(isFollowing) { map.panTo(ll); if (mapRotationEnabled) document.getElementById('map').style.transform = `scale(1.3) rotate(${-pos.coords.heading || 0}deg)`; }
            }, null, { enableHighAccuracy: true });
        };

        // --- UTILS MODALI ---
        window.openModal = (id) => { const el = document.getElementById(id); if (el) { el.classList.remove('hidden'); el.classList.add('flex'); } };
        window.closeModal = (id) => { const el = document.getElementById(id); if (el) { el.classList.add('hidden'); el.classList.remove('flex'); } };
        window.togglePanel = () => { isExpanded = !isExpanded; document.getElementById('statusPanel').classList.toggle('expanded', isExpanded); document.getElementById('panelChevron').style.transform = isExpanded ? 'rotate(180deg)' : 'rotate(0)'; };
        window.selectNewFieldAction = () => { window.closeModal('actionChoiceModal'); window.openModal('fieldModal'); };
        window.selectNewCheckpoint = () => { tempCheckpointCoords = { lat: tempFieldCoords.lat, lng: tempFieldCoords.lng, fieldId: 'field_gen' }; window.closeModal('actionChoiceModal'); window.openModal('checkpointModal'); };
        window.confirmAddField = async () => { const f = { id: Date.now(), name: document.getElementById('fieldNameInput').value, code: document.getElementById('fieldCodeInput').value, category: document.getElementById('fieldCategoryInput').value, latlng: [tempFieldCoords.lat, tempFieldCoords.lng], radius: 300, pathCoords: [], lastUpdated: Date.now() }; fields.push(f); renderFieldOnMap(f); await saveFieldToCloud(f); window.closeModal('fieldModal'); window.updateFieldUI(); };
        window.confirmAddCheckpoint = async () => { /* ... logica salvataggio nota ... */ window.closeModal('checkpointModal'); };
        window.startSync = () => { onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'fields_' + currentProjectName), (snap) => mergeData(snap.docs.map(d => d.data()), false)); };
        window.loadLocalCache = () => { const raw = localStorage.getItem('isolamenti_db_' + currentProjectName); if (raw) mergeData(JSON.parse(raw), true); };
        window.logoutProject = () => { if(confirm("Vuoi uscire?")) { localStorage.removeItem('isolamenti_last_session'); location.reload(); } };
        window.openNavigation = (lat, lng) => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank'); };
        function parsePath(p) { if (!p) return []; if (Array.isArray(p)) return p; try { return JSON.parse(p); } catch(e) { return []; } }

        window.onload = () => { 
            map = L.map('map', { zoomControl: false, tap: false }).setView([44.5, 11.5], 6); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map); 
            map.on('click', (e) => { if (ignoreMapClick) return; tempFieldCoords = e.latlng; isFollowing = false; window.openModal('actionChoiceModal'); lucide.createIcons(); });
            mapReady = true; 
            const s = localStorage.getItem('isolamenti_last_session'); 
            if(s) { const d = JSON.parse(s); document.getElementById('projectInput').value = d.name; document.getElementById('passwordInput').value = d.pass; window.handleLogin(); }
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
